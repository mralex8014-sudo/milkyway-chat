<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Messenger 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; background: #0b0e14; display: flex; flex-direction: column; height: 100vh; border: 1px solid #30363d; }
        #auth-form, #chat-ui { display: none; flex-direction: column; height: 100%; padding: 20px; }
        .input { background: #161b22; border: 1px solid #30363d; padding: 12px; color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .btn { background: #00a2ff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; margin: 10px 0; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .my { align-self: flex-end; background: #00a2ff; }
        .their { align-self: flex-start; background: #21262d; }
        .uid-info { font-size: 10px; color: #8b949e; margin-bottom: 10px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth-form" style="display: flex;">
        <h2 style="text-align:center; margin-bottom:20px;">MilkyWay 🌌</h2>
        <input type="email" id="email" class="input" placeholder="Email">
        <input type="password" id="pass" class="input" placeholder="Пароль">
        <button class="btn" onclick="authOp('login')">Войти</button>
        <button class="btn" style="background:none; color:#8b949e;" onclick="authOp('reg')">Регистрация</button>
    </div>

    <div id="chat-ui">
        <div class="uid-info" id="my-uid" onclick="copyUID()">Загрузка UID...</div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="target-uid" class="input" style="flex:1; margin:0;" placeholder="UID друга">
            <button class="btn" onclick="startPrivate()">Найти</button>
        </div>
        <h4 id="chat-status" style="margin: 10px 0; color: #00a2ff;">Общий чат</h4>
        <div id="messages"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msg-text" class="input" style="flex:1; margin:0;" placeholder="Сообщение...">
            <button class="btn" onclick="send()">></button>
        </div>
    </div>
</div>

<script>
    // Твои настройки (НЕ МЕНЯЙ ИХ, ЕСЛИ ОНИ РАБОТАЮТ)
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let user = null;
    let chatId = 'global';

    function authOp(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e, p).catch(alert);
        else auth.createUserWithEmailAndPassword(e, p).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('my-uid').innerText = "Твой UID (клик для копии): " + u.uid;
            listen('global');
        }
    });

    function copyUID() {
        navigator.clipboard.writeText(user.uid);
        alert("UID скопирован!");
    }

    function startPrivate() {
        const target = document.getElementById('target-uid').value.trim();
        if(!target || target === user.uid) return;
        chatId = [user.uid, target].sort().join("_");
        document.getElementById('chat-status').innerText = "Приватный чат 🔒";
        listen(chatId);
    }

    function send() {
        const txt = document.getElementById('msg-text').value;
        if(!txt) return;
        db.ref('chats/' + chatId).push({
            u: user.uid,
            t: txt,
            time: Date.now()
        });
        document.getElementById('msg-text').value = '';
    }

    function listen(id) {
        const box = document.getElementById('messages');
        db.ref('chats/' + id).off();
        box.innerHTML = '';
        db.ref('chats/' + id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
