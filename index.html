<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0e14; color: #e9edef; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* ГЛАВНЫЙ КОНТЕЙНЕР - ОН НЕ СЛОМАЕТСЯ */
        .app { width: 360px; height: 640px; background: #111b21; position: relative; display: flex; flex-direction: column; border: 1px solid #2a3942; border-radius: 15px; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #111b21; }
        .active { display: flex; z-index: 10; }

        /* ВХОД */
        .auth-box { padding: 40px 20px; text-align: center; }
        input { width: 100%; background: #2a3942; border: 1px solid #3b4a54; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; outline: none; }
        .btn { background: #00a2ff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* СПИСОК */
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3942; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #1c222d; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: #202c33; }
        .avatar { width: 40px; height: 40px; background: #394145; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ЧАТ - ВЫЕЗЖАЕТ ПОВЕРХ */
        #chat-screen { transform: translateX(100%); transition: 0.3s; z-index: 20; }
        #chat-screen.open { transform: translateX(0); }
        .messages { flex: 1; overflow-y: auto; padding: 15px; background: #0b141a; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; color: white; }
        .bubble.me { background: #005c4b; align-self: flex-end; }
        .bubble.he { background: #202c33; align-self: flex-start; }
        
        .footer { background: #202c33; padding: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <h1 style="color:#00a2ff; margin-bottom:30px;">MilkyWay</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn" onclick="authAction(true)">ВОЙТИ</button>
            <p onclick="authAction(false)" style="color:#8696a0; font-size:12px; margin-top:15px; cursor:pointer;">Создать аккаунт</p>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <strong>Чаты</strong>
            <i class="fas fa-sign-out-alt" onclick="auth.signOut()"></i>
        </div>
        <div id="user-list" class="user-list"></div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <span onclick="closeChat()">⬅ Назад</span>
            <b id="chat-title">Чат</b>
            <span></span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="footer">
            <input type="text" id="m-input" placeholder="Сообщение..." style="margin:0;">
            <button class="btn" onclick="send()" style="width:50px;">➤</button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let selId = null;

    async function authAction(isLogin) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(e, p);
            else {
                const r = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + r.user.uid).set({ name: e.split('@')[0] });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(u) {
            document.getElementById('scr-main').classList.add('active');
            loadUsers();
        } else {
            document.getElementById('scr-auth').classList.add('active');
        }
    });

    function loadUsers() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            s.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    list.innerHTML += `<div class="user-item" onclick="openChat('${u.key}','${u.val().name || 'User'}')">
                        <div class="avatar">👤</div> <b>${u.val().name || 'User'}</b>
                    </div>`;
                }
            });
        });
    }

    function openChat(id, name) {
        selId = id; document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-screen').classList.add('active', 'open');
        const cId = [auth.currentUser.uid, id].sort().join('_');
        db.ref('msgs/' + cId).on('value', s => {
            const mBox = document.getElementById('messages'); mBox.innerHTML = '';
            s.forEach(m => {
                const isMe = m.val().f === auth.currentUser.uid;
                mBox.innerHTML += `<div class="bubble ${isMe?'me':'he'}">${m.val().t}</div>`;
            });
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-screen').classList.remove('open', 'active'); }

    function send() {
        const t = document.getElementById('m-input').value; if(!t) return;
        const cId = [auth.currentUser.uid, selId].sort().join('_');
        db.ref('msgs/' + cId).push({ f: auth.currentUser.uid, t: t });
        document.getElementById('m-input').value = '';
    }
</script>
</body>
</html>
