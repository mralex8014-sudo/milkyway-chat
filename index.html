<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ТВОЙ ЭЛИТНЫЙ ДИЗАЙН */
        body {
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 350px;
            height: 600px;
            background: rgba(20, 25, 35, 0.95);
            border: 1px solid #1f2a3d;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2a3d; }
        h1 { margin: 0; font-size: 24px; color: #00a2ff; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5); }

        .auth-box {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            height: 100%;
        }

        input {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
            text-align: center;
        }

        button {
            background: #00a2ff;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #0081cc; box-shadow: 0 0 15px rgba(0, 162, 255, 0.4); }

        /* СКРЫТЫЕ ЭЛЕМЕНТЫ */
        #scr-main, #scr-chat, #otp-group { display: none; }
        
        /* ЧАТЫ */
        .contact-item { display: flex; padding: 15px; border-bottom: 1px solid #161b22; cursor: pointer; align-items: center; }
        .avatar { width: 40px; height: 40px; background: #1f2a3d; border-radius: 50%; display: grid; place-items: center; margin-right: 15px; color: #00a2ff; }
        
        .msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: #004d7a; border-bottom-right-radius: 2px; }
        .th { align-self: flex-start; background: #1c2128; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="scr-auth" style="height: 100%;">
        <header><h1>MilkyWay</h1></header>
        <div class="auth-box">
            <input type="text" id="contact" placeholder="Email или +79001234567">
            <div id="recaptcha-container" style="margin: 0 auto;"></div>
            <button id="btn-send" onclick="handleAuth()">ПОЛУЧИТЬ КОД</button>

            <div id="otp-group" style="flex-direction: column; gap: 10px;">
                <input type="text" id="otp" placeholder="6-значный код">
                <button onclick="verifyCode()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main">
        <header><h1>Чаты</h1></header>
        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="auth.signOut()" style="margin:10px; background:#cc0000;">ВЫЙТИ</button>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Настройка Recaptcha (сделаем её видимой для отладки)
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'normal',
        'callback': (response) => { console.log("Капча пройдена"); }
    });

    async function handleAuth() {
        const val = document.getElementById('contact').value;
        if(!val) return alert("Поле не может быть пустым");

        try {
            if(val.includes('@')) {
                // ПОЧТА
                await auth.sendSignInLinkToEmail(val, {
                    url: window.location.href,
                    handleCodeInApp: true
                });
                window.localStorage.setItem('emailForSignIn', val);
                alert("Ссылка для входа отправлена на почту!");
            } else {
                // ТЕЛЕФОН
                const appVerifier = window.recaptchaVerifier;
                window.confirmationResult = await auth.signInWithPhoneNumber(val, appVerifier);
                document.getElementById('otp-group').style.display = 'flex';
                document.getElementById('btn-send').style.display = 'none';
                alert("SMS отправлено!");
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка: " + e.message);
            // Сброс капчи при ошибке
            window.recaptchaVerifier.render().then(id => grecaptcha.reset(id));
        }
    }

    async function verifyCode() {
        const code = document.getElementById('otp').value;
        try {
            await window.confirmationResult.confirm(code);
        } catch (e) { alert("Неверный код!"); }
    }

    // Вход по ссылке из Email
    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Введите email');
        auth.signInWithEmailLink(email, window.location.href).then(() => {
            window.localStorage.removeItem('emailForSignIn');
        });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('scr-main').style.display = 'flex';
            // Регистрация в базе
            db.ref('users/' + user.uid).set({ 
                name: user.email || user.phoneNumber,
                status: "online" 
            });
            loadContacts();
        } else {
            document.getElementById('scr-auth').style.display = 'flex';
            document.getElementById('scr-main').style.display = 'none';
        }
    });

    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            snap.forEach(child => {
                if(child.key !== auth.currentUser.uid) {
                    list.innerHTML += `
                        <div class="contact-item">
                            <div class="avatar">👤</div>
                            <div class="name">${child.val().name}</div>
                        </div>`;
                }
            });
        });
    }
</script>
</body>
</html>
