<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Galactic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-black: #020408;
            --nebula-purple: #6c5ce7;
            --star-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: var(--space-black); color: #fff; height: 100vh; overflow: hidden;
            display: flex; justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(108, 92, 231, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
        }

        /* Контейнер приложения */
        .app-shell {
            width: 100%; max-width: 500px; height: 100%; position: relative;
            background: rgba(5, 8, 15, 0.9); display: flex; flex-direction: column;
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border);
        }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 10; background: inherit; }
        .active { display: flex; }

        /* HEADER */
        .header {
            height: 70px; padding: 0 20px; display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); z-index: 50;
        }
        .header h1 { font-size: 22px; flex: 1; letter-spacing: 1px; font-weight: 800; color: var(--star-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        /* СПИСОК КОНТАКТОВ */
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .user-row {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.3s;
        }
        .user-row:hover { background: rgba(255, 255, 255, 0.05); }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; background: #1e272e;
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--star-blue);
            position: relative; font-size: 20px;
        }
        .online-status { 
            width: 12px; height: 12px; background: #00ff88; border: 2px solid #05080f;
            border-radius: 50%; position: absolute; bottom: 2px; right: 2px; box-shadow: 0 0 8px #00ff88;
        }

        /* НИЖНЯЯ ПАНЕЛЬ (WhatsApp Style) */
        .nav-bar {
            height: 70px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--glass-border); position: absolute; bottom: 0; width: 100%; z-index: 40;
        }
        .nav-item { text-align: center; color: #8696a0; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--star-blue); }

        /* ОКНО ЧАТА */
        #scr-chat { 
            z-index: 100; transform: translateX(100%); transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background-image: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg');
            background-size: cover;
        }
        #scr-chat.open { transform: translateX(0); }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.4); }

        /* ПУЗЫРИ СООБЩЕНИЙ */
        .msg {
            padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px;
            position: relative; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .msg.me { background: var(--nebula-purple); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.he { background: rgba(47, 54, 64, 0.9); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }
        
        .msg-meta { 
            font-size: 10px; color: rgba(255,255,255,0.6); align-self: flex-end; 
            margin-top: 4px; display: flex; align-items: center; gap: 4px;
        }
        .check-read { color: #00d2ff; } /* Голубые галочки */

        /* ВВОД СООБЩЕНИЯ */
        .input-area {
            padding: 15px; background: rgba(10, 15, 25, 0.98); display: flex; align-items: center; gap: 12px;
            border-top: 1px solid var(--glass-border);
        }
        .input-area input {
            flex: 1; background: #1e272e; border: 1px solid var(--glass-border);
            padding: 12px 20px; border-radius: 25px; color: #fff; outline: none;
        }

        /* OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--space-black); z-index: 200; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <h1 style="text-align:center; color:var(--star-blue); font-size:40px; margin-bottom:10px;">MILKYWAY</h1>
        <p style="text-align:center; color:#8696a0; margin-bottom:40px;">Вход в галактическую сеть</p>
        <input type="email" id="email" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; color:#fff; margin-bottom:15px;" placeholder="Космическая почта">
        <input type="password" id="pass" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; color:#fff; margin-bottom:20px;" placeholder="Пароль">
        <button onclick="authAction(true)" style="width:100%; padding:15px; background:var(--star-blue); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <p onclick="authAction(false)" style="text-align:center; color:var(--nebula-purple); margin-top:20px; cursor:pointer;">Регистрация нового пилота</p>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div class="avatar" onclick="showProfile('my')">👤</div>
            <h1>MilkyWay</h1>
            <i class="fas fa-search" style="color:#8696a0;"></i>
        </div>
        
        <div id="section-chats" class="main-content">
            <div id="user-list"></div>
        </div>
        
        <div id="section-status" class="main-content" style="display:none; padding:20px; text-align:center;">
            <p style="color:#8696a0;">У вас пока нет звездных статусов</p>
        </div>

        <div id="section-calls" class="main-content" style="display:none; padding:20px; text-align:center;">
            <p style="color:#8696a0;">Журнал межзвездных вызовов пуст</p>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchSection('chats', this)"><i class="fas fa-comment"></i>Чаты</div>
            <div class="nav-item" onclick="switchSection('status', this)"><i class="fas fa-circle-notch"></i>Статус</div>
            <div class="nav-item" onclick="switchSection('calls', this)"><i class="fas fa-phone-alt"></i>Звонки</div>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header">
            <i class="fas fa-arrow-left" style="cursor:pointer; color:var(--star-blue);" onclick="closeChat()"></i>
            <div class="avatar" style="width:38px; height:38px;" id="chat-ava-trigger">👤</div>
            <div style="flex:1" id="chat-info-trigger">
                <b id="peer-name">Загрузка...</b><br>
                <small id="peer-status" style="color:var(--star-blue); font-size:11px;">в сети</small>
            </div>
        </div>
        <div id="chat-box" class="chat-body"></div>
        <div class="input-area">
            <i class="far fa-smile" style="color:#8696a0; font-size:20px;"></i>
            <input type="text" id="msg-input" placeholder="Сообщение..." oninput="setTyping(true)">
            <i class="fas fa-paper-plane" style="color:var(--star-blue); font-size:22px;" onclick="sendMessage()"></i>
        </div>
    </div>

    <div id="ov-profile" class="overlay">
        <div class="header">
            <i class="fas fa-times" onclick="toggleOverlay('ov-profile', false)"></i>
            <h1 id="ov-title">Профиль</h1>
        </div>
        <div style="padding:40px; text-align:center;">
            <div class="avatar" style="width:120px; height:120px; margin:0 auto 20px; font-size:50px;">👤</div>
            <div id="my-profile-edit">
                <input type="text" id="new-name" style="width:100%; padding:15px; background:#1e272e; border:1px solid var(--glass-border); color:#fff; border-radius:10px;" placeholder="Ваше имя">
                <button onclick="saveName()" style="width:100%; padding:15px; background:var(--nebula-purple); border:none; color:#fff; border-radius:10px; margin-top:15px; font-weight:bold;">СОХРАНИТЬ</button>
                <button onclick="auth.signOut()" style="margin-top:40px; color:#ff4757; background:none; border:none; cursor:pointer;">Выйти из системы</button>
            </div>
            <div id="peer-profile-view" style="display:none;">
                <h2 id="view-name">Имя</h2>
                <p id="view-mail" style="color:#8696a0; margin-top:10px;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let selId = null, tTimer, peerInfo = {};

    // --- НАВИГАЦИЯ ---
    function switchSection(sect, el) {
        document.querySelectorAll('.main-content').forEach(s => s.style.display = 'none');
        document.getElementById('section-' + sect).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleOverlay(id, show) { document.getElementById(id).classList.toggle('active', show); }

    // --- AUTH ---
    async function authAction(isLog) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isLog) await auth.signInWithEmailAndPassword(e, p);
            else {
                const r = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + r.user.uid).set({ name: e.split('@')[0], email: e, status: 'online' });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) {
            db.ref('users/' + u.uid + '/status').set('online');
            db.ref('users/' + u.uid + '/status').onDisconnect().set('offline');
            loadUsers();
        }
    });

    // --- ПРОФИЛЬ ---
    function showProfile(type) {
        const isMy = type === 'my';
        document.getElementById('ov-title').innerText = isMy ? 'Мой Профиль' : 'О пилоте';
        document.getElementById('my-profile-edit').style.display = isMy ? 'block' : 'none';
        document.getElementById('peer-profile-view').style.display = isMy ? 'none' : 'block';
        if(!isMy) {
            document.getElementById('view-name').innerText = peerInfo.name;
            document.getElementById('view-mail').innerText = peerInfo.email;
        }
        toggleOverlay('ov-profile', true);
    }

    function saveName() {
        const n = document.getElementById('new-name').value;
        db.ref('users/' + auth.currentUser.uid).update({ name: n }).then(() => alert("Бортовой журнал обновлен!"));
    }

    // --- ЧАТЫ ---
    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    const d = u.val();
                    list.innerHTML += `
                    <div class="user-row" onclick="openChat('${u.key}','${d.name || d.email}')">
                        <div class="avatar">👤 ${d.status==='online'?'<div class="online-status"></div>':''}</div>
                        <div style="flex:1">
                            <b>${d.name || d.email}</b><br>
                            <small style="color:#8696a0">${d.status==='online'?'на связи':'вне зоны доступа'}</small>
                        </div>
                    </div>`;
                }
            });
        });
    }

    function openChat(id, name) {
        selId = id; document.getElementById('peer-name').innerText = name;
        document.getElementById('scr-chat').classList.add('open', 'active');
        db.ref('users/' + id).once('value', s => { peerInfo = s.val(); });

        const cid = [auth.currentUser.uid, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === auth.currentUser.uid;
                const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                // Галочки: если есть d.read — две, иначе одна
                const checks = isMe ? `<i class="fas fa-check-double check-read"></i>` : '';
                box.innerHTML += `
                <div class="msg ${isMe?'me':'he'}">
                    ${d.x}
                    <div class="msg-meta">${time} ${checks}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        db.ref('typing/' + id + '/' + auth.currentUser.uid).on('value', s => {
            document.getElementById('peer-status').innerText = s.val() ? 'печатает...' : 'в сети';
        });
    }

    function closeChat() { 
        document.getElementById('scr-chat').classList.remove('open');
        setTimeout(() => document.getElementById('scr-chat').classList.remove('active'), 350);
        selId = null;
    }

    function sendMessage() {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        const cid = [auth.currentUser.uid, selId].sort().join('_');
        db.ref('msgs/' + cid).push({ f: auth.currentUser.uid, x: inp.value, t: Date.now(), r: true });
        inp.value = '';
        setTyping(false);
    }

    function setTyping(v) {
        if(!selId) return;
        db.ref('typing/' + auth.currentUser.uid + '/' + selId).set(v);
        clearTimeout(tTimer);
        if(v) tTimer = setTimeout(() => setTyping(false), 2000);
    }

    // Слушатели для открытия профиля в чате
    document.getElementById('chat-ava-trigger').onclick = () => showProfile('peer');
    document.getElementById('chat-info-trigger').onclick = () => showProfile('peer');

</script>
</body>
</html>
