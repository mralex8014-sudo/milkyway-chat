<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #05070a; --panel: #0d1117; --border: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        .app { width: 100%; max-width: 450px; height: 100vh; background: var(--bg); position: relative; display: flex; flex-direction: column; }

        /* ИСПРАВЛЕННОЕ МЕНЮ */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: #0d1117; z-index: 9999; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border); padding: 40px 25px;
        }
        .sidebar.open { left: 0; box-shadow: 20px 0 80px rgba(0,0,0,0.9); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 9998; backdrop-filter: blur(4px); }

        header { padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo-neon { font-size: 22px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active { display: flex; }

        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-row { padding: 15px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .av { width: 45px; height: 45px; border-radius: 50%; background: var(--neon); display: grid; place-items: center; color: #000; font-weight: bold; }

        .fab { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--neon); border-radius: 50%; display: grid; place-items: center; font-size: 24px; color: #000; cursor: pointer; box-shadow: 0 0 20px var(--neon); z-index: 100; }

        /* СООБЩЕНИЯ С ПОДДЕРЖКОЙ МЕДИА */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .m { max-width: 85%; padding: 10px; border-radius: 15px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: #005c4b; }
        .th { align-self: flex-start; background: #202c33; }
        .m img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .m audio { width: 200px; height: 35px; margin-top: 5px; }

        .in-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .in-bar input { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .media-btn { font-size: 20px; color: var(--neon); cursor: pointer; transition: 0.2s; }
        .media-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="ovl" class="overlay" onclick="tglM()"></div>

<div id="side" class="sidebar">
    <div class="logo-neon" style="margin-bottom:40px;">MilkyWay</div>
    <div onclick="alert('Профиль')" style="margin-bottom:20px; cursor:pointer;"><i class="fas fa-user-astronaut"></i> Профиль</div>
    <div onclick="auth.signOut()" style="color: #ff4b4b; cursor:pointer;"><i class="fas fa-power-off"></i> Выйти из системы</div>
</div>

<div class="app">
    <div id="scr-a" class="screen active">
        <div style="padding:40px; display:flex; flex-direction:column; justify-content:center; height:100%;">
            <div class="logo-neon" style="font-size:40px; text-align:center; margin-bottom:40px;">MilkyWay</div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="authOp('login')" style="padding:15px; background:var(--neon); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
            <p onclick="authOp('reg')" style="text-align:center; margin-top:20px; color:var(--neon); cursor:pointer; font-size:13px;">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="scr-m" class="screen">
        <header>
            <i class="fas fa-bars" onclick="tglM()" style="cursor:pointer; font-size:20px; color:var(--neon);"></i>
            <div class="logo-neon">MilkyWay</div>
            <div style="width:20px;"></div>
        </header>
        <div id="chat-list"></div>
        <div class="fab" onclick="addU()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-c" class="screen">
        <header>
            <i class="fas fa-chevron-left" onclick="sh('scr-m')" style="color:var(--neon); cursor:pointer;"></i>
            <b id="c-tit">Чат</b>
            <i class="fas fa-video" style="opacity:0.5;"></i>
        </header>
        <div id="msgs"></div>
        <div class="in-bar">
            <label class="media-btn"><i class="fas fa-paperclip"></i><input type="file" id="f-in" style="display:none" onchange="sendF(this)"></label>
            <input type="text" id="m-in" placeholder="Сообщение...">
            <i class="fas fa-paper-plane media-btn" onclick="snd()"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let me = null, cur = null;

    function tglM() {
        const s = document.getElementById('side'), o = document.getElementById('ovl');
        const open = s.classList.toggle('open');
        o.style.display = open ? 'block' : 'none';
    }

    function sh(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('side').classList.remove('open');
        document.getElementById('ovl').style.display = 'none';
    }

    function authOp(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(t === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
            db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(u => { if(u){ me=u; sh('scr-m'); load(); } else sh('scr-a'); });

    function load() {
        const l = document.getElementById('chat-list');
        l.innerHTML = `<div class="chat-row" onclick="opC('global','Общий канал')"><div class="av">G</div><b>Общий канал</b></div>`;
        db.ref('users/'+me.uid+'/contacts').on('value', s => {
            s.forEach(c => {
                db.ref('users/'+c.key).once('value', us => {
                    const d = us.val();
                    const div = document.createElement('div'); div.className = 'chat-row';
                    div.onclick = () => opC(c.key, d.name);
                    div.innerHTML = `<div class="av">${d.name[0].toUpperCase()}</div><b>${d.name}</b>`;
                    l.appendChild(div);
                });
            });
        });
    }

    function opC(id, name) {
        cur = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('c-tit').innerText = name;
        sh('scr-c');
        db.ref('msgs/'+cur).off();
        const mBox = document.getElementById('msgs'); mBox.innerHTML = '';
        db.ref('msgs/'+cur).on('child_added', s => {
            const m = s.val();
            const d = document.createElement('div');
            d.className = `m ${m.f === me.uid ? 'my' : 'th'}`;
            if(m.type === 'img') d.innerHTML = `<img src="${m.data}">`;
            else if(m.type === 'audio') d.innerHTML = `<audio controls src="${m.data}"></audio>`;
            else d.innerText = m.t;
            mBox.appendChild(d); mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function snd() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        db.ref('msgs/'+cur).push({f: me.uid, t: i.value, type: 'text', time: Date.now()});
        i.value = '';
    }

    function sendF(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const type = file.type.startsWith('image') ? 'img' : (file.type.startsWith('audio') ? 'audio' : 'file');
            db.ref('msgs/'+cur).push({f: me.uid, type: type, data: e.target.result, time: Date.now()});
        };
        reader.readAsDataURL(file);
    }

    function addU() {
        const e = prompt("Email пилота:");
        if(e) db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+me.uid+'/contacts/'+s.val()).set(true);
        });
    }
</script>
</body>
</html>
