<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #020408; --panel: #0b0e14; --accent: #00a2ff; --border: #1c2128; --text: #e6edf3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 500px; background: var(--panel); display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg); position: absolute; top: 0; left: 0; }
        .active-screen { display: flex; z-index: 10; }

        /* Шапка */
        header { padding: 15px; background: #0f172a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .header-title { font-weight: 600; font-size: 18px; flex: 1; text-align: center; }

        /* Меню (Sidebar) - ТЕПЕРЬ ТОЧНО СКРЫТО */
        #sidebar { 
            position: absolute; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; 
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .sidebar-content {
            width: 280px; height: 100%; background: var(--panel); 
            padding: 30px 20px; transform: translateX(-100%); transition: 0.3s;
            border-right: 1px solid var(--border);
        }
        #sidebar.open { visibility: visible; opacity: 1; }
        #sidebar.open .sidebar-content { transform: translateX(0); }

        /* Главный экран */
        .chat-list-item { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; cursor: pointer; 
        }
        .avatar { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; }

        /* Чат */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #161b22; border-bottom-left-radius: 2px; border: 1px solid var(--border); }

        /* Футер */
        .input-area { padding: 15px; background: #0f172a; display: flex; align-items: center; gap: 10px; }
        .main-input { flex: 1; background: #161b22; border: 1px solid var(--border); padding: 12px; border-radius: 20px; color: white; outline: none; }
        .btn-send { background: var(--accent); width: 40px; height: 40px; border-radius: 50%; border: none; color: white; cursor: pointer; }

        .fab { position: absolute; bottom: 25px; right: 25px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; z-index: 50; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sidebar" onclick="toggleMenu()">
        <div class="sidebar-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>Профиль</h2>
                <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer; font-size: 20px;"></i>
            </div>
            <p style="color:#8b949e; font-size: 12px;">Твой UID:</p>
            <div id="my-uid" style="background:#161b22; padding:12px; border-radius:8px; margin: 10px 0; font-size:11px; cursor:pointer;" onclick="copyUID()">Загрузка...</div>
            <button onclick="auth.signOut()" style="width:100%; padding:12px; border-radius:8px; border:none; background:#da3633; color:white; font-weight:bold; margin-top: 20px;">Выйти</button>
        </div>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content: center; padding: 30px; text-align: center;">
        <i class="fas fa-user-astronaut" style="font-size: 60px; color: var(--accent); margin-bottom: 20px;"></i>
        <h1>MilkyWay</h1>
        <input type="email" id="email" class="main-input" style="margin-top:20px; width:100%;" placeholder="Email">
        <input type="password" id="pass" class="main-input" style="margin-top:10px; width:100%;" placeholder="Пароль">
        <button onclick="authOp('login')" style="width:100%; padding:15px; background:var(--accent); border:none; color:white; border-radius:12px; margin-top:20px; font-weight:bold;">Войти</button>
        <p onclick="authOp('reg')" style="color:#8b949e; margin-top:15px; cursor:pointer;">Регистрация</p>
    </div>

    <div id="screen-main" class="screen">
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer; font-size: 20px;"></i>
            <span class="header-title">Чаты</span>
            <i class="fas fa-search" onclick="startNewChat()"></i>
        </header>
        <div style="flex:1; overflow-y:auto;">
            <div class="chat-list-item" onclick="openChat('global_public_room', 'Общий чат')">
                <div class="avatar"><i class="fas fa-globe"></i></div>
                <div><div style="font-weight:bold;">Общий чат</div><div style="font-size:12px; color:#8b949e;">Напишите всем...</div></div>
            </div>
            <div id="contacts"></div>
        </div>
        <div class="fab" onclick="startNewChat()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" onclick="showScreen('screen-main')" style="cursor:pointer;"></i>
            <span id="chat-title" class="header-title">Чат</span>
            <div style="display:flex; gap:15px;"><i class="fas fa-phone"></i><i class="fas fa-video"></i></div>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <i class="fas fa-paperclip" style="color:#8b949e; font-size: 20px;"></i>
            <input type="text" id="msg-input" class="main-input" placeholder="Сообщение...">
            <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, activeChat = '';

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(alert);
        else auth.createUserWithEmailAndPassword(e,p).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) { user = u; document.getElementById('my-uid').innerText = u.uid; showScreen('screen-main'); }
        else { showScreen('screen-auth'); }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function startNewChat() {
        const id = prompt("Введите UID собеседника:");
        if(id && id !== user.uid) {
            activeChat = [user.uid, id].sort().join("_");
            document.getElementById('chat-title').innerText = "Приватный чат";
            showScreen('screen-chat');
            listen(activeChat);
        }
    }

    function openChat(id, name) {
        activeChat = id;
        document.getElementById('chat-title').innerText = name;
        showScreen('screen-chat');
        listen(id);
    }

    function send() {
        const t = document.getElementById('msg-input').value;
        if(!t) return;
        db.ref('chats/'+activeChat).push({ u: user.uid, t: t, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const m = document.getElementById('messages');
        db.ref('chats/'+id).off(); m.innerHTML = '';
        db.ref('chats/'+id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            m.appendChild(div); m.scrollTop = m.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("UID скопирован!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
