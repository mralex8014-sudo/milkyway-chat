<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Ultra Secure 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; background: #0b0e14; border: 1px solid #1a2a3d; display: flex; flex-direction: column; position: relative; }
        
        /* Стили авторизации */
        #auth-screen { padding: 40px 20px; text-align: center; z-index: 100; background: #020408; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .auth-input { width: 100%; background: #161b22; border: 1px solid #30363d; padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        .btn-primary { background: #00a2ff; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        
        /* Основной интерфейс */
        #main-wrapper { display: none; flex-direction: column; height: 100%; }
        header { padding: 15px; background: #0f172a; display: flex; align-items: center; border-bottom: 1px solid #1c2128; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .my-msg { align-self: flex-end; background: #00a2ff; color: white; border-bottom-right-radius: 2px; }
        .their-msg { align-self: flex-start; background: #161b22; color: #e6edf3; border-bottom-left-radius: 2px; }
        
        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        #msg-input { flex: 1; background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 20px; color: white; outline: none; }
        
        /* Поиск и UID */
        .search-box { padding: 10px; background: #161b22; display: flex; gap: 5px; }
        .uid-display { font-size: 10px; color: #8b949e; padding: 5px 15px; background: #0f172a; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <h1 style="margin-bottom: 20px;">MilkyWay 🌌</h1>
        <input type="email" id="email" class="auth-input" placeholder="Email">
        <input type="password" id="password" class="auth-input" placeholder="Пароль">
        <button class="btn-primary" onclick="handleAuth('login')">Войти</button>
        <button style="background:none; border:none; color:#8b949e; cursor:pointer;" onclick="handleAuth('signup')">Создать аккаунт</button>
    </div>

    <div id="main-wrapper">
        <header>
            <h3 id="chat-title">Общий чат</h3>
        </header>
        <div class="uid-display" onclick="copyUID()" id="my-uid-box">Ваш UID: загрузка...</div>
        <div class="search-box">
            <input type="text" id="target-uid" class="auth-input" style="margin:0; padding:8px;" placeholder="Введите UID друга">
            <button class="btn-primary" style="width:auto; margin:0; padding:8px 15px;" onclick="startPrivateChat()">Найти</button>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button class="btn-primary" style="width:auto; margin:0; padding:0 20px;" onclick="sendMsg()">></button>
        </div>
    </div>
</div>

<script>
    // ТВОИ ДАННЫЕ ИЗ FIREBASE CONSOLE (Вставь их сюда!)
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUser = null;
    let currentChatId = 'global';

    // Авторизация
    function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(type === 'login') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            document.getElementById('my-uid-box').innerText = "Ваш UID (нажми чтобы скопировать): " + user.uid;
            loadMessages('global');
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-wrapper').style.display = 'none';
        }
    });

    function copyUID() {
        navigator.clipboard.writeText(currentUser.uid);
        alert("UID скопирован!");
    }

    // Поиск друга и создание чата
    function startPrivateChat() {
        const targetUid = document.getElementById('target-uid').value.trim();
        if (!targetUid || targetUid === currentUser.uid) return;
        
        // Генерируем ID чата: всегда одинаковый для пары людей
        currentChatId = [currentUser.uid, targetUid].sort().join("_");
        document.getElementById('chat-title').innerText = "Приватный чат";
        loadMessages(currentChatId);
    }

    // Сообщения
    function sendMsg() {
        const text = document.getElementById('msg-input').value;
        if (!text) return;
        
        db.ref('chats/' + currentChatId).push({
            uid: currentUser.uid,
            text: text,
            timestamp: Date.now()
        });
        document.getElementById('msg-input').value = '';
    }

    function loadMessages(chatId) {
        const display = document.getElementById('chat-window');
        db.ref('chats/' + chatId).off(); // Очистить старые слушатели
        display.innerHTML = '';
        
        db.ref('chats/' + chatId).on('child_added', snap => {
            const data = snap.val();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(data.uid === currentUser.uid ? 'my-msg' : 'their-msg');
            msgDiv.innerText = data.text;
            display.appendChild(msgDiv);
            display.scrollTop = display.scrollHeight;
        });
    }

    // Отправка по Enter
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsg();
    });
</script>

</body>
</html>
