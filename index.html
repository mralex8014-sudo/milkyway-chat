<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #020408; --panel: #0b0e14; --border: #1c2128; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            color: white; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; display: flex; justify-content: center; overflow: hidden; 
        }

        .app-container { 
            width: 100%; max-width: 450px; background: rgba(11, 14, 20, 0.95); 
            display: flex; flex-direction: column; position: relative; 
            border-left: 1px solid var(--border); border-right: 1px solid var(--border); 
        }

        /* --- СКРЫТОЕ МЕНЮ --- */
        #sidebar {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .sidebar-drawer {
            width: 280px; height: 100%; background: #0f172a;
            transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        #sidebar.open { visibility: visible; opacity: 1; }
        #sidebar.open .sidebar-drawer { transform: translateX(0); }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; animation: fadeIn 0.3s; }
        .active-screen { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- ДИЗАЙН ШАПКИ --- */
        header { 
            padding: 15px 20px; background: rgba(15, 23, 42, 0.9); 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
        }
        .logo-text { font-size: 18px; font-weight: bold; color: var(--accent); }

        /* --- ГЛАВНАЯ (СПИСОК ЧАТОВ) --- */
        .chat-card {
            margin: 10px; padding: 15px; background: #161b22; 
            border-radius: 15px; display: flex; align-items: center; 
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .chat-card:hover { border-color: var(--accent); background: #1c2128; }
        .avatar-circle { width: 50px; height: 50px; background: linear-gradient(45deg, #00a2ff, #0044ff); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* --- ОКНО СООБЩЕНИЙ --- */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #21262d; border-bottom-left-radius: 2px; }

        /* --- ФУТЕР --- */
        .footer { padding: 15px; background: #0f172a; display: flex; align-items: center; gap: 10px; }
        .input-pill { flex: 1; background: #161b22; border: 1px solid var(--border); padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .send-rocket { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; font-size: 18px; }

        .fab-add { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 20px rgba(0,162,255,0.4); cursor: pointer; z-index: 99; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sidebar" onclick="closeMenu()">
        <div class="sidebar-drawer" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <h2 style="color:var(--accent)">MilkyWay 🌌</h2>
                <i class="fas fa-times" onclick="closeMenu()" style="cursor:pointer"></i>
            </div>
            <p style="color:#8b949e; font-size:12px;">Твой позывной (UID):</p>
            <div onclick="copyUID()" id="my-uid" style="background:#161b22; padding:12px; border-radius:10px; margin:10px 0; font-size:11px; cursor:pointer; border:1px solid #30363d;">Загрузка...</div>
            <button onclick="auth.signOut()" style="width:100%; padding:12px; border-radius:10px; border:none; background:#da3633; color:white; font-weight:bold; margin-top:20px; cursor:pointer;">Выход из системы</button>
        </div>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content:center; padding:40px; text-align:center;">
        <i class="fas fa-meteor" style="font-size:60px; color:var(--accent); margin-bottom:20px;"></i>
        <h1>MilkyWay</h1>
        <p style="color:#8b949e; margin-bottom:30px;">Твой личный космос</p>
        <input type="email" id="email" class="input-pill" style="margin-bottom:10px; width:100%;" placeholder="Email">
        <input type="password" id="pass" class="input-pill" style="margin-bottom:20px; width:100%;" placeholder="Пароль">
        <button onclick="authOp('login')" class="send-rocket" style="width:100%; border-radius:12px;">Войти</button>
        <p onclick="authOp('reg')" style="color:#8b949e; margin-top:20px; cursor:pointer; font-size:14px;">Создать аккаунт</p>
    </div>

    <div id="screen-main" class="screen">
        <header>
            <i class="fas fa-bars" onclick="openMenu()" style="cursor:pointer; font-size:20px;"></i>
            <span class="logo-text">Чаты</span>
            <i class="fas fa-search" onclick="newChat()"></i>
        </header>
        <div style="flex:1; overflow-y:auto; padding-top:10px;">
            <div class="chat-card" onclick="openChat('global_public_room', 'Общий чат 🌍')">
                <div class="avatar-circle">🚀</div>
                <div><div style="font-weight:bold;">Общий чат</div><div style="font-size:12px; color:#8b949e;">На борту все пользователи</div></div>
            </div>
            <div id="chat-list-dynamic"></div>
        </div>
        <div class="fab-add" onclick="newChat()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" onclick="showScreen('screen-main')" style="cursor:pointer;"></i>
            <span id="chat-title" class="logo-text">Чат</span>
            <div style="display:flex; gap:15px;"><i class="fas fa-phone"></i><i class="fas fa-video"></i></div>
        </header>
        <div id="messages"></div>
        <div class="footer">
            <i class="fas fa-paperclip" style="color:#8b949e; font-size:20px; cursor:pointer;"></i>
            <input type="text" id="msg-input" class="input-pill" placeholder="Сообщение...">
            <button class="send-rocket" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, activeChat = '';

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(alert);
        else auth.createUserWithEmailAndPassword(e,p).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) { user = u; document.getElementById('my-uid').innerText = u.uid; showScreen('screen-main'); }
        else { showScreen('screen-auth'); }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function openMenu() { document.getElementById('sidebar').classList.add('open'); }
    function closeMenu() { document.getElementById('sidebar').classList.remove('open'); }

    function newChat() {
        const id = prompt("Введите UID собеседника:");
        if(id && id !== user.uid) openChat([user.uid, id].sort().join("_"), "Приватный чат 🔒");
    }

    function openChat(id, name) {
        activeChat = id; document.getElementById('chat-title').innerText = name;
        showScreen('screen-chat'); listen(id);
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t) return;
        db.ref('chats/'+activeChat).push({ u: user.uid, t: t, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const m = document.getElementById('messages');
        db.ref('chats/'+id).off(); m.innerHTML = '';
        db.ref('chats/'+id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            m.appendChild(div); m.scrollTop = m.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("UID скопирован!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
