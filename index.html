<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay: Galactic Commander</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #020408;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --ai-glow: #00ff88;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- SCREENS --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; }
        .active { display: flex; }
        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 50; }

        /* --- CHAT ELEMENTS --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover; }
        
        .bubble { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; animation: slideIn 0.2s ease; word-wrap: break-word; }
        .m-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 2px; }
        .m-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        
        .m-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }
        .file-msg { display: flex; align-items: center; gap: 10px; color: var(--accent); text-decoration: none; cursor: pointer; }

        /* --- NAV --- */
        .nav { height: 70px; background: #080a0f; border-top: 1px solid var(--border); display: flex; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-t { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8696a0; gap: 4px; cursor: pointer; font-size: 10px; }
        .nav-t.active { color: var(--accent); }

        /* --- UI HELPERS --- */
        .cosmo-input { width: 100%; padding: 12px 15px; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; margin-bottom: 10px; }
        .ava { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; flex-shrink: 0; }
        .ava img { width: 100%; height: 100%; object-fit: cover; }
        .btn-prime { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <center><h2 style="color:var(--accent); margin-bottom:30px;"><i class="fas fa-meteor"></i> MILKYWAY</h2></center>
        
        <div id="auth-box">
            <input type="email" id="auth-email" class="cosmo-input" placeholder="Введите почту">
            <button onclick="handleAuthStep1()" class="btn-prime">ОТПРАВИТЬ КОД ПОДТВЕРЖДЕНИЯ</button>
            <p style="font-size: 12px; color:#8696a0; margin-top:15px; text-align:center;">Если вы уже подтвердили почту, введите пароль ниже после проверки ссылки в письме.</p>
        </div>

        <div id="password-box" style="display:none; margin-top:20px;">
            <input type="password" id="auth-pass" class="cosmo-input" placeholder="Установите/Введите пароль">
            <button onclick="handleAuthStep2()" class="btn-prime">ВОЙТИ В СИСТЕМУ</button>
        </div>
        <div id="auth-msg" style="color:var(--ai-glow); font-size:12px; margin-top:15px; text-align:center;"></div>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color:var(--accent)">MILKYWAY PRO</b>
                <i class="fas fa-cog" onclick="showSettings()" style="color:#8696a0; cursor:pointer;"></i>
            </div>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <input type="text" id="mainSearch" class="cosmo-input" style="margin:0; flex:1;" placeholder="Поиск по ID или Email...">
                <button onclick="globalSearch()" style="background:var(--accent); border:none; padding:0 15px; border-radius:10px;"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div id="view-chats" class="scroller"></div>
        <div id="view-contacts" class="scroller" style="display:none;"></div>

        <nav class="nav">
            <div class="nav-t active" onclick="tab('chats', this)"><i class="fas fa-comment"></i><span>Чаты</span></div>
            <div class="nav-t" onclick="tab('contacts', this)"><i class="fas fa-user-friends"></i><span>Контакты</span></div>
            <div class="nav-t" onclick="tab('calls', this)"><i class="fas fa-phone"></i><span>Звонки</span></div>
        </nav>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer;"></i>
            <div id="chat-ava" class="ava" style="width:35px; height:35px;"></div>
            <b id="chat-title" style="flex:1">Чат</b>
            <i class="fas fa-phone" style="color:var(--accent)"></i>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div style="padding:15px; background:#0a0f19; display:flex; gap:10px; align-items:center;">
            <label for="file-send" style="cursor:pointer; color:#8696a0;"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="file-send" style="display:none;" onchange="sendFile(this)">
            <input type="text" id="msg-input" class="cosmo-input" style="margin:0; flex:1; border-radius:20px;" placeholder="Сообщение...">
            <button class="ava" style="background:var(--accent); border:none; color:#000;" onclick="sendText()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="scr-settings" class="screen" style="z-index:1100; background:#05070c;">
        <div class="header"><i class="fas fa-arrow-left" onclick="hideSettings()"></i> <b>НАСТРОЙКИ</b></div>
        <div class="scroller" style="padding:25px; text-align:center;">
            <p id="my-id-display" style="font-size:10px; color:var(--accent); margin-bottom:20px;"></p>
            <input type="text" id="set-name" class="cosmo-input" placeholder="Ваше имя">
            <button onclick="saveProfile()" class="btn-prime">СОХРАНИТЬ</button>
            <button onclick="auth.signOut()" style="margin-top:30px; color:red; background:none; border:none;">ВЫХОД</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIG ---
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myId = null, selId = null, activeTab = 'chats', chatListener = null;

    // --- 1. AUTH LOGIC ---
    async function handleAuthStep1() {
        const email = document.getElementById('auth-email').value;
        if(!email) return;
        try {
            // Проверяем, есть ли пользователь. Если нет - создаем, если есть - шлем верификацию
            document.getElementById('password-box').style.display = 'block';
            document.getElementById('auth-msg').innerText = "Введите пароль. Если вы новый пилот, сначала подтвердите почту по ссылке, которую мы отправим после входа.";
        } catch(e) { alert(e.message); }
    }

    async function handleAuthStep2() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            let res;
            try { 
                res = await auth.signInWithEmailAndPassword(email, pass); 
            } catch { 
                res = await auth.createUserWithEmailAndPassword(email, pass);
                db.ref('users/' + res.user.uid).set({ name: 'Пилот', email: email, ava: '' });
            }
            
            if(!res.user.emailVerified) {
                await res.user.sendEmailVerification();
                alert("Код (ссылка) отправлен на почту! Пожалуйста, подтвердите её и обновите страницу.");
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) {
            myId = u.uid;
            document.getElementById('my-id-display').innerText = "ВАШ ID: " + myId;
            initNotifications();
            syncData();
        }
    });

    // --- 2. NOTIFICATIONS ---
    function initNotifications() {
        if ("Notification" in window) Notification.requestPermission();
    }

    function pushNotify(title, body) {
        if (Notification.permission === "granted" && document.hidden) {
            new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/9356/9356230.png' });
        }
    }

    // --- 3. DATA SYNC (ЗАКРЕПЛЕНИЕ ЧАТОВ) ---
    function syncData() {
        // Слушаем список активных чатов (Сортировка по времени)
        db.ref('active_dialogues/' + myId).orderByValue().on('value', async snap => {
            if(activeTab !== 'chats') return;
            const container = document.getElementById('view-chats');
            container.innerHTML = '';
            
            let chats = [];
            snap.forEach(c => { chats.push({id: c.key, t: c.val()}); });
            chats.reverse(); // Новые сверху

            for(let c of chats) {
                const u = (await db.ref('users/'+c.id).once('value')).val();
                if(u) container.innerHTML += renderUserItem(c.id, u, false);
            }
        });

        // Слушаем вкладку контактов
        db.ref('contacts/' + myId).on('value', async snap => {
            if(activeTab !== 'contacts') return;
            const container = document.getElementById('view-contacts');
            container.innerHTML = '';
            snap.forEach(async c => {
                const u = (await db.ref('users/'+c.key).once('value')).val();
                if(u) container.innerHTML += renderUserItem(c.key, u, false);
            });
        });
    }

    function renderUserItem(id, d, isSearch) {
        return `
        <div class="item">
            <div class="ava" onclick="openChat('${id}','${d.name}')">
                ${d.ava ? `<img src="${d.ava}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div style="flex:1" onclick="openChat('${id}','${d.name}')">
                <b>${d.name}</b><br><small style="color:#8696a0">${d.email}</small>
            </div>
            ${isSearch ? `<button onclick="addContact('${id}')" style="color:var(--accent); background:none; border:none; font-size:20px;"><i class="fas fa-user-plus"></i></button>` : ''}
        </div>`;
    }

    // --- 4. SEARCH (ПО ID И EMAIL) ---
    async function globalSearch() {
        const q = document.getElementById('mainSearch').value.trim();
        const container = document.getElementById('view-chats');
        container.innerHTML = '<p style="text-align:center; padding:20px;">Поиск в глубоком космосе...</p>';
        
        db.ref('users').once('value', snap => {
            container.innerHTML = '';
            snap.forEach(u => {
                const d = u.val();
                if(u.key === q || d.email === q) {
                    container.innerHTML += renderUserItem(u.key, d, true);
                }
            });
        });
    }

    function addContact(id) {
        db.ref('contacts/' + myId + '/' + id).set(true);
        alert("Пилот добавлен в контакты!");
    }

    // --- 5. MESSAGING CORE ---
    function openChat(id, name) {
        selId = id;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('scr-chat').classList.add('open');
        
        const cid = [myId, id].sort().join('_');
        if(chatListener) db.ref('msgs/'+chatListener).off();
        chatListener = cid;

        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                const time = new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const status = d.s === 2 ? '✓✓' : '✓';
                
                let content = d.type === 'file' ? 
                    `<a href="${d.x}" download="file" class="file-msg"><i class="fas fa-file-download"></i> Файл</a>` : d.x;

                box.innerHTML += `
                    <div class="bubble ${isMe ? 'm-me' : 'm-he'}">
                        ${content}
                        <div class="m-meta">${time} <span>${isMe ? status : ''}</span></div>
                    </div>`;
                
                // Если сообщение не моё и не прочитано - ставим статус "прочитано"
                if(!isMe && d.s === 1) db.ref('msgs/'+cid+'/'+m.key).update({s: 2});
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendText() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        pushMsg(inp.value, 'text');
        inp.value = '';
    }

    async function sendFile(input) {
        const file = input.files[0];
        if(!file) return;
        if(file.size > 20 * 1024 * 1024) { alert("Ошибка: Файл тяжелее 20 МБ!"); return; }

        const reader = new FileReader();
        reader.onload = (e) => pushMsg(e.target.result, 'file');
        reader.readAsDataURL(file);
    }

    function pushMsg(val, type) {
        const cid = [myId, selId].sort().join('_');
        const now = Date.now();
        const msg = { f: myId, x: val, t: now, s: 1, type: type };
        
        db.ref('msgs/' + cid).push(msg);
        // ЗАКРЕПЛЕНИЕ: Обновляем время активности для обоих
        db.ref('active_dialogues/' + myId + '/' + selId).set(now);
        db.ref('active_dialogues/' + selId + '/' + myId).set(now);
    }

    // --- 6. UTILS ---
    function tab(name, el) {
        activeTab = name;
        document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-chats').style.display = name === 'chats' ? 'block' : 'none';
        document.getElementById('view-contacts').style.display = name === 'contacts' ? 'block' : 'none';
        syncData();
    }

    function closeChat() { 
        document.getElementById('scr-chat').classList.remove('open'); 
        if(chatListener) db.ref('msgs/'+chatListener).off();
    }
    function showSettings() { document.getElementById('scr-settings').classList.add('active'); }
    function hideSettings() { document.getElementById('scr-settings').classList.remove('active'); }
    function saveProfile() {
        const n = document.getElementById('set-name').value;
        db.ref('users/'+myId).update({name: n}).then(() => hideSettings());
    }
</script>
</body>
</html>
