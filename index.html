<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #0b0e14; --panel: #161b22; --border: #30363d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 450px; background: var(--bg); display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Боковое меню */
        #sidebar { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; visibility: hidden; opacity: 0; transition: 0.3s; }
        #sidebar.open { visibility: visible; opacity: 1; }
        .sidebar-drawer { width: 300px; height: 100%; background: var(--panel); transform: translateX(-100%); transition: 0.3s; padding: 40px 20px; }
        #sidebar.open .sidebar-drawer { transform: translateX(0); }

        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active-screen { display: flex; }
        
        header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--panel); }
        
        /* Список чатов */
        .chat-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .chat-card { padding: 15px 20px; display: flex; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .chat-card:hover { background: #1c2128; }
        .avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* Сообщения */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        .msg { 
            max-width: 80%; padding: 10px 14px 22px 14px; border-radius: 18px; font-size: 15px; 
            line-height: 1.4; position: relative; min-width: 80px; word-wrap: break-word;
        }
        .my { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .their { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .msg-time { 
            position: absolute; bottom: 5px; right: 12px; font-size: 10px; 
            opacity: 0.7; font-weight: 500;
        }

        /* Поле ввода */
        .footer { padding: 15px; display: flex; align-items: center; gap: 10px; background: var(--panel); border-top: 1px solid var(--border); }
        .input-box { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 15px; }
        .btn-send { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .btn-main { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .fab { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 10; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sidebar" onclick="toggleMenu()">
        <div class="sidebar-drawer" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2>Настройки</h2>
                <i class="fas fa-times" onclick="toggleMenu()" style="cursor:pointer; font-size:20px;"></i>
            </div>
            <p style="font-size: 12px; color: #8b949e; margin-bottom: 5px;">Ваш позывной (UID):</p>
            <div id="my-uid" onclick="copyUID()" style="background: var(--bg); padding: 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); word-break: break-all; margin-bottom: 20px;">...</div>
            <button onclick="auth.signOut()" style="width: 100%; padding: 12px; background: #da3633; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Выйти из системы</button>
        </div>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content: center; padding: 40px; text-align: center;">
        <h1 style="color: var(--accent); margin-bottom: 10px; font-size: 42px; letter-spacing: -1px;">MilkyWay</h1>
        <p style="color: #8b949e; margin-bottom: 40px;">Межзвездная связь</p>
        <input type="email" id="email" class="input-box" style="margin-bottom: 15px; width: 100%;" placeholder="Email">
        <input type="password" id="pass" class="input-box" style="margin-bottom: 20px; width: 100%;" placeholder="Пароль">
        <button onclick="authOp('login')" class="btn-main">Войти</button>
        <p onclick="authOp('reg')" style="margin-top: 25px; color: #8b949e; cursor: pointer; font-size: 14px;">Создать новый аккаунт</p>
    </div>

    <div id="screen-main" class="screen">
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor: pointer; font-size: 20px;"></i>
            <span style="font-weight: bold; font-size: 18px;">Чаты</span>
            <i class="fas fa-search" onclick="newChat()" style="cursor: pointer; font-size: 18px;"></i>
        </header>
        <div class="chat-list">
            <div class="chat-card" onclick="openChat('global_public_room', 'Общий чат')">
                <div class="avatar" style="background: #f39c12;"><i class="fas fa-globe-americas"></i></div>
                <div><div style="font-weight: bold;">Общий чат</div><div style="font-size: 12px; color: #8b949e;">На борту все пользователи</div></div>
            </div>
            <div id="chat-list-dynamic"></div>
        </div>
        <div class="fab" onclick="newChat()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fas fa-arrow-left" onclick="showScreen('screen-main')" style="cursor: pointer;"></i>
                <span id="chat-title" style="font-weight: bold;">Чат</span>
            </div>
            <i class="fas fa-ellipsis-v"></i>
        </header>
        <div id="messages"></div>
        <div class="footer">
            <input type="text" id="msg-input" class="input-box" placeholder="Напишите сообщение...">
            <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, activeChat = '';

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Введите данные");
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users_by_email/' + btoa(e).replace(/=/g, "")).set(u.user.uid);
            alert("Аккаунт готов!");
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { 
            user = u; 
            document.getElementById('my-uid').innerText = u.uid; 
            showScreen('screen-main');
            loadContacts();
        } else { showScreen('screen-auth'); }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'screen-main') {
            if(activeChat) db.ref('chats/'+activeChat).off();
            activeChat = '';
        }
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function newChat() {
        const input = prompt("Введите почту или UID пилота:");
        if(!input) return;
        if(input.includes('@')) {
            db.ref('users_by_email/' + btoa(input).replace(/=/g, "")).once('value', s => {
                if(s.exists()) startChat(s.val());
                else alert("Пилот не найден");
            });
        } else { startChat(input); }
    }

    function startChat(id) {
        if(id === user.uid) return;
        db.ref('users/' + user.uid + '/contacts/' + id).set(true);
        openChat([user.uid, id].sort().join("_"), "Стыковка: " + id.substring(0,6));
    }

    function loadContacts() {
        db.ref('users/' + user.uid + '/contacts').on('value', snap => {
            const list = document.getElementById('chat-list-dynamic');
            list.innerHTML = '';
            snap.forEach(child => {
                const cid = child.key;
                const div = document.createElement('div');
                div.className = 'chat-card';
                div.onclick = () => openChat([user.uid, cid].sort().join("_"), "Пилот: " + cid.substring(0,6));
                div.innerHTML = `<div class="avatar">${cid[0].toUpperCase()}</div><div><div style="font-weight:bold;">Пилот ${cid.substring(0,6)}</div><div style="font-size:12px; color:#8b949e;">Защищенное соединение</div></div>`;
                list.appendChild(div);
            });
        });
    }

    function openChat(id, name) {
        activeChat = id; 
        document.getElementById('chat-title').innerText = name;
        showScreen('screen-chat');
        listen(id);
    }

    function formatTime(ts) {
        if(!ts) return "";
        const d = new Date(ts);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t || !activeChat) return;
        db.ref('chats/'+activeChat).push({ 
            u: user.uid, 
            t: t, 
            time: firebase.database.ServerValue.TIMESTAMP 
        });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const m = document.getElementById('messages');
        db.ref('chats/'+id).off(); 
        m.innerHTML = '';
        db.ref('chats/'+id).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerHTML = `<span></span><span class="msg-time">${formatTime(d.time)}</span>`;
            div.querySelector('span').innerText = d.t;
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("ID скопирован!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
