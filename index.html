<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 350px; height: 600px; background: #141923; border: 1px solid #1f2a3d; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2a3d; }
        h1 { margin: 0; font-size: 24px; color: #00a2ff; text-shadow: 0 0 10px rgba(0,162,255,0.3); }
        .screen { display: none; flex-direction: column; height: 100%; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        input { background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { background: #00a2ff; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        #recaptcha-container { margin-bottom: 10px; display: flex; justify-content: center; }
        .user-item { padding: 15px; border-bottom: 1px solid #1f2a3d; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active">
        <header style="position: absolute; top: 0; width: 100%; left: 0;"><h1>MilkyWay</h1></header>
        <div id="auth-form">
            <input type="text" id="login-input" placeholder="+7... или email@mail.ru">
            <div id="recaptcha-container"></div>
            <button id="btn-action" onclick="handleAuth()">ОТПРАВИТЬ</button>
            <div id="otp-group" style="display:none; margin-top:10px;">
                <input type="text" id="otp-input" placeholder="Код из SMS">
                <button onclick="confirmSms()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" class="screen" style="justify-content: flex-start; padding: 0;">
        <header><h1>Чаты</h1></header>
        <div id="user-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="auth.signOut()" style="background:#ff4b4b; border-radius:0;">ВЫЙТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'normal' });

    async function handleAuth() {
        const val = document.getElementById('login-input').value;
        try {
            if(val.includes('@')) {
                await auth.sendSignInLinkToEmail(val, { url: window.location.href, handleCodeInApp: true });
                window.localStorage.setItem('emailForSignIn', val);
                alert("Ссылка на почте! Проверь спам.");
            } else {
                window.confirmationResult = await auth.signInWithPhoneNumber(val, window.recaptchaVerifier);
                document.getElementById('otp-group').style.display = 'block';
                document.getElementById('btn-action').style.display = 'none';
            }
        } catch (e) { alert("Ошибка: " + e.message); }
    }

    async function confirmSms() {
        const code = document.getElementById('otp-input').value;
        try { await window.confirmationResult.confirm(code); } catch (e) { alert("Ошибка кода"); }
    }

    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Подтвердите email');
        auth.signInWithEmailLink(email, window.location.href).then(() => window.localStorage.removeItem('emailForSignIn'));
    }

    auth.onAuthStateChanged(user => {
        document.getElementById('scr-auth').classList.toggle('active', !user);
        document.getElementById('scr-main').classList.toggle('active', !!user);
        if(user) {
            db.ref('users/' + user.uid).update({ name: user.email || user.phoneNumber });
            loadUsers();
        }
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    list.innerHTML += `<div class="user-item">👤 ${u.val().name}</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
