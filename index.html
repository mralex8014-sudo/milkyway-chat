<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay Restoration</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #030508;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --ai-glow: #00ff88;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- ЛОГОТИП "КОМЕТА" --- */
        .logo-emblem { 
            width: 42px; height: 42px; background: linear-gradient(45deg, var(--accent), var(--nebula));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--accent); animation: comet-glow 2s infinite alternate; font-size: 18px;
        }
        @keyframes comet-glow {
            0% { box-shadow: 0 0 10px var(--accent); transform: scale(1); filter: hue-rotate(0deg); }
            100% { box-shadow: 0 0 25px var(--nebula); transform: scale(1.08); filter: hue-rotate(20deg); }
        }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; }
        .active { display: flex; }

        /* --- ШАПКА --- */
        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 50; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .search-container { background: var(--glass); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; border: 1px solid var(--border); }
        .search-container input { background: none; border: none; color: #fff; flex: 1; outline: none; margin-left: 10px; font-size: 14px; }

        /* --- СПИСКИ --- */
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .ava { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; background: #1a1f2b; flex-shrink: 0; }
        .ava img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ЧАТ --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover; }
        
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; position: relative; color: #fff; }
        .m-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 4px; }
        .m-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        .m-time { font-size: 10px; opacity: 0.7; margin-left: 8px; float: right; margin-top: 4px; }

        /* --- АНИМИРОВАННЫЕ ЗВЕЗДЫ --- */
        .stars-box { display: inline-block; margin-left: 5px; font-size: 10px; }
        .star-anim { animation: star-pulse 2s infinite ease-in-out; color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        @keyframes star-pulse {
            0% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.5; transform: scale(0.9); }
        }

        /* --- НАВИГАЦИЯ --- */
        .nav { height: 75px; background: #080a0f; border-top: 1px solid var(--border); display: flex; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-t { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8696a0; gap: 4px; cursor: pointer; font-size: 11px; }
        .nav-t.active { color: var(--accent); }

        .action-icon { font-size: 18px; color: #8696a0; cursor: pointer; transition: 0.2s; }
        .action-icon:hover { color: var(--accent); }
        .cosmo-input { width: 100%; padding: 14px; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <center><div class="logo-emblem"><i class="fas fa-meteor"></i></div></center>
        <input type="email" id="email" class="cosmo-input" placeholder="Email" style="margin-top:30px;">
        <input type="password" id="pass" class="cosmo-input" placeholder="Пароль" style="margin: 15px 0;">
        <button onclick="authRun()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; color:#000;">ЗАПУСК</button>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div class="header-top">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="logo-emblem" style="width:32px; height:32px; font-size:14px;"><i class="fas fa-meteor"></i></div>
                    <span style="font-weight:900; letter-spacing:2px;">MILKYWAY</span>
                </div>
                <div style="display:flex; gap:15px;">
                    <i class="fas fa-robot" onclick="openChat('gemini_ai', 'Gemini AI')" style="color:var(--ai-glow); cursor:pointer;"></i>
                    <i class="fas fa-cog action-icon" onclick="showSettings()"></i>
                </div>
            </div>
            <div class="search-container">
                <i class="fas fa-search" style="color:#8696a0;"></i>
                <input type="text" id="gSearch" placeholder="Поиск пилотов..." oninput="handleSearch()">
            </div>
        </div>

        <div id="view-chats" class="scroller"></div>
        <div id="view-contacts" class="scroller" style="display:none;"></div>
        <div id="view-calls" class="scroller" style="display:none; text-align:center; padding-top:60px; color:#8696a0;">История вызовов пуста</div>
        <div id="view-status" class="scroller" style="display:none; text-align:center; padding-top:60px; color:#8696a0;">Все системы работают штатно</div>

        <nav class="nav">
            <div class="nav-t active" onclick="tab('chats', this)"><i class="fas fa-comment-alt"></i><span>Чаты</span></div>
            <div class="nav-t" onclick="tab('contacts', this)"><i class="fas fa-user-friends"></i><span>Контакты</span></div>
            <div class="nav-t" onclick="tab('calls', this)"><i class="fas fa-phone-alt"></i><span>Звонки</span></div>
            <div class="nav-t" onclick="tab('status', this)"><i class="fas fa-star"></i><span>Статус</span></div>
        </nav>
    </div>

    <div id="scr-settings" class="screen" style="z-index:1100; background:#05070c;">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fas fa-arrow-left" onclick="hideSettings()" style="color:var(--accent); cursor:pointer;"></i>
                <span style="font-weight:900;">ПРОФИЛЬ</span>
            </div>
        </div>
        <div class="scroller" style="padding:25px; text-align:center;">
            <div class="ava" style="width:100px; height:100px; margin:0 auto 20px; font-size:40px;"><i class="fas fa-user-astronaut"></i></div>
            <input type="text" id="set-name" class="cosmo-input" placeholder="Ваш позывной" style="margin-bottom:15px;">
            <button onclick="saveProfile()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:#000; font-weight:bold;">СОХРАНИТЬ</button>
            <button onclick="auth.signOut()" style="margin-top:20px; background:none; border:none; color:var(--danger);">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer; font-size:20px;"></i>
            <div id="c-ava" class="ava" style="width:36px; height:36px;"></div>
            <b id="c-name" style="flex:1"></b>
            <i class="fas fa-trash-alt" style="color:var(--danger); cursor:pointer;" onclick="deleteChat()"></i>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div style="padding:15px; background:#0a0f19; display:flex; gap:10px;">
            <input type="text" id="msg-input" class="cosmo-input" placeholder="Введите сообщение..." style="border-radius:25px;">
            <button onclick="send()" style="width:45px; border-radius:50%; background:var(--accent); border:none;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let myId = null, selId = null, activeTab = 'chats';

    // --- AUTH ---
    async function authRun() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch {
            const r = await auth.createUserWithEmailAndPassword(e, p);
            db.ref('users/' + r.user.uid).set({ name: e.split('@')[0], email: e, pilotId: 'ID'+Math.floor(Math.random()*9999) });
        }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) { myId = u.uid; sync(); }
    });

    function sync() {
        loadList('view-chats', 'active_dialogues/' + myId);
        loadList('view-contacts', 'users/' + myId + '/contacts');
    }

    // --- NAVIGATION ---
    function tab(name, el) {
        ['chats', 'contacts', 'calls', 'status'].forEach(t => document.getElementById('view-'+t).style.display = 'none');
        document.getElementById('view-'+name).style.display = 'block';
        document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        activeTab = name;
    }

    function showSettings() { document.getElementById('scr-settings').classList.add('active'); }
    function hideSettings() { document.getElementById('scr-settings').classList.remove('active'); }

    // --- LOGIC ---
    function handleSearch() {
        const q = document.getElementById('gSearch').value.toLowerCase().trim();
        if(q.length < 3) { sync(); return; }
        db.ref('users').once('value', snap => {
            let html = '';
            snap.forEach(u => {
                const d = u.val();
                if(u.key !== myId && (d.email.includes(q) || (d.pilotId && d.pilotId.toLowerCase().includes(q)))) {
                    html += renderItem(u.key, d, true);
                }
            });
            document.getElementById('view-'+activeTab).innerHTML = html || '<p style="padding:20px;">Пилот не найден</p>';
        });
    }

    function loadList(viewId, path) {
        db.ref(path).on('value', snap => {
            const container = document.getElementById(viewId);
            container.innerHTML = '';
            if(!snap.exists()) { container.innerHTML = '<p style="padding:40px; text-align:center; color:#8696a0;">Пусто</p>'; return; }
            snap.forEach(c => {
                db.ref('users/' + c.key).once('value', u => {
                    container.innerHTML += renderItem(c.key, u.val(), false, viewId === 'view-contacts');
                });
            });
        });
    }

    function renderItem(id, d, isSearch, isContact) {
        return `
        <div class="item">
            <div class="ava" onclick="openChat('${id}','${d.name}')">${d.ava ? `<img src="${d.ava}">` : `<i class="fas fa-user-astronaut"></i>`}</div>
            <div style="flex:1" onclick="openChat('${id}','${d.name}')">
                <b>${d.name}</b><br><small style="color:#8696a0">${d.pilotId || '@pilot'}</small>
            </div>
            <div>
                ${isSearch ? `<i class="fas fa-user-plus" style="color:var(--accent)" onclick="addContact('${id}')"></i>` : ''}
                ${isContact ? `<i class="fas fa-user-minus" style="color:#8696a0" onclick="removeContact('${id}')"></i>` : ''}
            </div>
        </div>`;
    }

    function addContact(id) { db.ref(`users/${myId}/contacts/${id}`).set(true); alert("Добавлено!"); }
    function removeContact(id) { db.ref(`users/${myId}/contacts/${id}`).remove(); }

    // --- CHAT & STARS ---
    function openChat(id, name) {
        selId = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('scr-chat').classList.add('open', 'active');
        const cid = [myId, id].sort().join('_');

        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                const time = new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                let starMarkup = '';
                if(isMe) {
                    if(d.s === 0) starMarkup = '<span class="stars-box">★</span>';
                    if(d.s === 1) starMarkup = '<span class="stars-box">★★</span>';
                    if(d.s === 2) starMarkup = '<span class="stars-box star-anim">★★</span>';
                }

                box.innerHTML += `<div class="bubble ${isMe?'m-me':'m-he'}">
                    ${d.x}
                    <div class="m-time">${time} ${starMarkup}</div>
                </div>`;
                
                if(!isMe && d.s < 2) db.ref(`msgs/${cid}/${m.key}/s`).set(2);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        const cid = [myId, selId].sort().join('_');
        const mKey = db.ref('msgs/' + cid).push().key;
        db.ref(`msgs/${cid}/${mKey}`).set({ f: myId, x: inp.value, t: Date.now(), s: 0 });
        
        setTimeout(() => db.ref(`msgs/${cid}/${mKey}/s`).set(1), 1000);
        db.ref(`active_dialogues/${myId}/${selId}`).set(Date.now());
        db.ref(`active_dialogues/${selId}/${myId}`).set(Date.now());
        inp.value = '';
    }

    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }
    
    function deleteChat() {
        if(confirm("Удалить историю?")) {
            const cid = [myId, selId].sort().join('_');
            db.ref('msgs/'+cid).remove();
            db.ref(`active_dialogues/${myId}/${selId}`).remove();
            closeChat();
        }
    }
</script>
</body>
</html>
