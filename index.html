<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Ultra Secure 🌌</title>
    <style>
        /* Весь твой красивый стиль из прошлого сообщения остается здесь без изменений */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 360px; height: 640px; background: #0b0e14; border: 1px solid #1f2a3d; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
        .sidebar { position: absolute; left: -100%; top: 0; width: 280px; height: 100%; background: #161b22; z-index: 100; transition: 0.3s; border-right: 1px solid #30363d; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: absolute; display: none; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; }
        .sidebar-overlay.active { display: block; }
        .brand-header { padding: 15px 20px; display: flex; align-items: center; background: #0f172a; border-bottom: 1px solid #1c2128; z-index: 10; }
        .menu-toggle { font-size: 24px; cursor: pointer; color: #00a2ff; margin-right: 15px; background: none; border: none; }
        .brand-header h1 { font-size: 20px; color: #00a2ff; flex: 1; text-align: center; margin-right: 30px; }
        .auth-form { padding: 40px 30px; display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; }
        .auth-input { background: #161b22; border: 1px solid #30363d; padding: 14px; border-radius: 12px; color: white; outline: none; }
        .btn-primary { background: #00a2ff; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .chat-window { display: none; flex-direction: column; height: 100%; background: #05070a; position: absolute; top: 0; left: 0; width: 100%; z-index: 20; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg.my { align-self: flex-end; background: #004a87; }
        .msg.other { align-self: flex-start; background: #1f2a3d; }
        .input-area { padding: 15px; background: #0b0e14; display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 20px; color: white; outline: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="sidebar">
        <div style="padding: 40px 20px 20px; background: #0f172a; border-bottom: 1px solid #30363d;">
            <div style="width: 50px; height: 50px; background: #00a2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px;">👨‍🚀</div>
            <b id="u-name">Пользователь</b><br>
            <small id="u-id" style="color: #00a2ff; font-size: 10px; cursor:pointer;" onclick="copyId()">Нажмите, чтобы скопировать ID</small>
        </div>
        <div style="padding: 10px; flex: 1;">
            <div style="padding: 15px; cursor: pointer; color: #ff4d4d;" onclick="auth.signOut()">🚪 Выйти</div>
        </div>
    </div>

    <div id="main-content" style="display:none; flex-direction:column; height:100%;">
        <div class="brand-header">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <h1>MilkyWay 🌌</h1>
        </div>
        <div style="padding:15px; display:flex; gap:8px;">
            <input type="text" id="target-uid" class="auth-input" style="flex:1; padding:10px; font-size: 12px;" placeholder="Введите полный UID собеседника...">
            <button class="btn-primary" style="padding:0 15px; font-size: 12px;" onclick="searchUser()">Найти</button>
        </div>
        <div style="flex:1; overflow-y:auto; padding:15px;" id="c-list">
            <div style="background:#1c2128; padding:18px; border-radius:16px; cursor:pointer;" onclick="openChat('global', 'Общий чат')">
                <b>🌌 Общий чат</b><br><small style="color:#00a2ff">Доступно всем</small>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="auth-form">
        <h1 style="text-align:center; color:#00a2ff">MilkyWay 🌌</h1>
        <input type="email" id="email" class="auth-input" placeholder="Почта">
        <input type="password" id="pass" class="auth-input" placeholder="Пароль">
        <button class="btn-primary" onclick="loginEmail()">Войти</button>
        <button style="background:none; border:none; color:#8b949e; cursor:pointer;" onclick="register()">Регистрация</button>
    </div>

    <div id="chat-window" class="chat-window">
        <div class="brand-header">
            <button class="menu-toggle" onclick="closeChat()">←</button>
            <h1 id="chat-title" style="margin-right: 0; font-size: 16px;">Чат</h1>
        </div>
        <div class="messages" id="msg-container"></div>
        <div class="input-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Сигнал...">
            <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="sendMsg()">🚀</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        projectId: "wm-message",
        storageBucket: "wm-message.firebasestorage.app",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:b9d363affe1dea5eb7e077",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let user = null;
    let activeChatId = null;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function copyId() {
        navigator.clipboard.writeText(user.uid);
        alert("UID скопирован! Отправьте его другу.");
    }

    auth.onAuthStateChanged(u => {
        user = u;
        document.getElementById('auth-screen').style.display = u ? 'none' : 'flex';
        document.getElementById('main-content').style.display = u ? 'flex' : 'none';
        if(u) {
            document.getElementById('u-name').innerText = u.email.split('@')[0];
            document.getElementById('u-id').innerText = "Ваш UID: " + u.uid.substring(0,8) + "...";
            db.ref('users/' + u.uid).set({ name: u.email.split('@')[0], uid: u.uid });
        }
    });

    function loginEmail() { auth.signInWithEmailAndPassword(email.value, pass.value).catch(e => alert(e.message)); }
    function register() { auth.createUserWithEmailAndPassword(email.value, pass.value).catch(e => alert(e.message)); }

    function openChat(id, title) {
        activeChatId = id;
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-title').innerText = title;
        
        const ref = db.ref('chats/' + id + '/messages');
        ref.off();
        ref.on('value', s => {
            const cont = document.getElementById('msg-container');
            cont.innerHTML = "";
            if(s.val()) Object.values(s.val()).forEach(m => {
                const d = document.createElement('div');
                d.className = m.uid === user.uid ? 'msg my' : 'msg other';
                d.innerHTML = `<small style="font-size:9px; opacity:0.6">${m.user}</small><br>${m.text}`;
                cont.appendChild(d);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function sendMsg() {
        const val = document.getElementById('m-input').value;
        if(!val || !activeChatId) return;
        db.ref('chats/' + activeChatId + '/messages').push({
            uid: user.uid,
            user: user.email.split('@')[0],
            text: val,
            time: Date.now()
        });
        document.getElementById('m-input').value = "";
    }

    function searchUser() {
        const targetUid = document.getElementById('target-uid').value.trim();
        if(targetUid && targetUid !== user.uid) {
            // Создаем уникальный ID чата из двух UID
            const secureChatId = [user.uid, targetUid].sort().join("_");
            
            // Важный момент: прописываем участников перед открытием
            const chatRef = db.ref('chats/' + secureChatId + '/members');
            chatRef.child(user.uid).set(true);
            chatRef.child(targetUid).set(true);
            
            openChat(secureChatId, "Приватный чат");
        }
    }
</script>
</body>
</html>
