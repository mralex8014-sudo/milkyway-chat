<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #05070a; --panel: #0d1117; --border: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        .app { width: 100%; max-width: 450px; height: 100vh; background: var(--bg); position: relative; display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* ХЕДЕР С НЕОНОМ */
        header { 
            padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .logo-neon { 
            font-size: 24px; font-weight: 900; color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.7); letter-spacing: 1px;
        }

        /* БОКОВОЕ МЕНЮ (СКРЫТО ПО УМОЛЧАНИЮ) */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 300px; height: 100%;
            background: #0d1117; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border); padding: 40px 25px;
        }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        
        /* ЗАТЕМНЕНИЕ ПРИ ОТКРЫТОМ МЕНЮ */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1500; backdrop-filter: blur(3px);
        }

        /* ПЛЮСИК В КРУЖКЕ (FAB) */
        .fab {
            position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px;
            background: var(--neon); border-radius: 50%; display: grid; place-items: center;
            font-size: 24px; color: #fff; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); z-index: 100;
        }

        /* СПИСОК ЧАТОВ */
        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active { display: flex; }
        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-row { 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .av-circle { width: 45px; height: 45px; border-radius: 50%; background: var(--neon); display: grid; place-items: center; font-weight: bold; }

        /* ВХОД */
        .auth-screen { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center; }
        .auth-screen input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; }
        .btn-go { padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; color: #fff; cursor: pointer; }

        /* ЧАТ */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .my { align-self: flex-end; background: #005c4b; }
        .their { align-self: flex-start; background: #202c33; }
        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        .input-bar input { flex: 1; background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 20px; color: #fff; outline: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="side-menu" class="sidebar">
    <div class="logo-neon" style="margin-bottom:40px;">MilkyWay</div>
    <div style="display:flex; flex-direction:column; gap:25px;">
        <div onclick="alert('Профиль')"><i class="fas fa-user-circle"></i> Мой аккаунт</div>
        <div onclick="alert('Настройки')"><i class="fas fa-cog"></i> Настройки</div>
        <div onclick="auth.signOut()" style="color:#ff4b4b; margin-top:30px;"><i class="fas fa-power-off"></i> Выйти</div>
    </div>
</div>

<div class="app">
    <div id="scr-auth" class="screen active">
        <div class="auth-screen">
            <div class="logo-neon" style="font-size:40px; margin-bottom:40px;">MilkyWay</div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-go" onclick="handleAuth('login')">ВОЙТИ</button>
            <p onclick="handleAuth('reg')" style="margin-top:20px; color:var(--neon); cursor:pointer; font-size:13px;">Создать аккаунт</p>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <header>
            <i class="fas fa-bars" style="font-size:20px; cursor:pointer;" onclick="toggleMenu()"></i>
            <div class="logo-neon">MilkyWay</div>
            <div style="width:20px;"></div>
        </header>
        <div id="chat-list"></div>
        <div class="fab" onclick="addUser()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <i class="fas fa-chevron-left" onclick="show('scr-main')" style="cursor:pointer;"></i>
            <b id="chat-title">Чат</b>
            <div style="width:20px;"></div>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Сообщение...">
            <i class="fas fa-paper-plane" onclick="send()" style="color:var(--neon); font-size:22px; cursor:pointer;"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let me = null, activeId = null;

    function toggleMenu() {
        const m = document.getElementById('side-menu');
        const o = document.getElementById('overlay');
        const isOpen = m.classList.toggle('open');
        o.style.display = isOpen ? 'block' : 'none';
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // Закрываем меню при переключении экрана
        document.getElementById('side-menu').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }

    function handleAuth(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(t === 'login') auth.signInWithEmailAndPassword(e,p).catch(a => alert(a.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
            db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
        });
    }

    auth.onAuthStateChanged(u => {
        if(u) { me = u; show('scr-main'); loadChats(); }
        else show('scr-auth');
    });

    function loadChats() {
        const list = document.getElementById('chat-list');
        list.innerHTML = `<div class="chat-row" onclick="openChat('global','Общий чат')"><div class="av-circle">G</div><b>Общий чат</b></div>`;
        db.ref('users/'+me.uid+'/contacts').on('value', s => {
            s.forEach(c => {
                db.ref('users/'+c.key).once('value', us => {
                    const d = us.val();
                    const div = document.createElement('div'); div.className = 'chat-row';
                    div.onclick = () => openChat(c.key, d.name);
                    div.innerHTML = `<div class="av-circle">${d.name[0].toUpperCase()}</div><b>${d.name}</b>`;
                    list.appendChild(div);
                });
            });
        });
    }

    function openChat(id, name) {
        activeId = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = name;
        show('scr-chat');
        db.ref('msgs/'+activeId).off();
        const area = document.getElementById('messages'); area.innerHTML = '';
        db.ref('msgs/'+activeId).on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = `bubble ${m.from === me.uid ? 'my' : 'their'}`;
            div.innerText = m.txt;
            area.appendChild(div); area.scrollTop = area.scrollHeight;
        });
    }

    function send() {
        const i = document.getElementById('m-input');
        if(!i.value.trim()) return;
        db.ref('msgs/'+activeId).push({from: me.uid, txt: i.value, time: Date.now()});
        i.value = '';
    }

    function addUser() {
        const e = prompt("Email пилота:");
        if(e) db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+me.uid+'/contacts/'+s.val()).set(true);
        });
    }
    document.getElementById('m-input').onkeypress = e => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
