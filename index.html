<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Fix Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ВОЗВРАЩАЕМ ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН */
        body {
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 350px;
            height: 600px;
            background: rgba(20, 25, 35, 0.95);
            border: 1px solid #1f2a3d;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2a3d; }
        h1 { margin: 0; font-size: 24px; color: #00a2ff; }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active { display: flex; }

        .content-box {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        input {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: #00a2ff;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #recaptcha-container { margin: 0 auto; scale: 0.85; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active">
        <header><h1>MilkyWay</h1></header>
        <div class="content-box">
            <input type="text" id="login-val" placeholder="Email или +7...">
            <div id="recaptcha-container"></div>
            <button id="btn-main" onclick="startAuth()">ПОЛУЧИТЬ КОД</button>
            
            <div id="otp-area" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <input type="text" id="otp-val" placeholder="Код из SMS">
                <button onclick="confirmSms()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <header><h1>Чаты</h1></header>
        <div id="user-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="auth.signOut()" style="margin:15px; background:#ff4b4b">ВЫЙТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Фикс капчи
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'normal' });

    async function startAuth() {
        const val = document.getElementById('login-val').value;
        try {
            if(val.includes('@')) {
                // Вход по почте (нужно включить Email Link в консоли!)
                await auth.sendSignInLinkToEmail(val, { url: window.location.href, handleCodeInApp: true });
                window.localStorage.setItem('emailForSignIn', val);
                alert("Ссылка отправлена на почту!");
            } else {
                // Вход по телефону
                window.confirmationResult = await auth.signInWithPhoneNumber(val, window.recaptchaVerifier);
                document.getElementById('otp-area').style.display = 'flex';
                document.getElementById('btn-main').style.display = 'none';
            }
        } catch (e) { alert("Ошибка: " + e.message); }
    }

    async function confirmSms() {
        const code = document.getElementById('otp-val').value;
        try {
            await window.confirmationResult.confirm(code);
        } catch (e) { alert("Неверный код!"); }
    }

    // Обработка ссылки из почты
    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Введите email');
        auth.signInWithEmailLink(email, window.location.href).then(() => window.localStorage.removeItem('emailForSignIn'));
    }

    auth.onAuthStateChanged(user => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(user) {
            document.getElementById('scr-main').classList.add('active');
            db.ref('users/' + user.uid).update({ name: user.email || user.phoneNumber });
            loadUsers();
        } else {
            document.getElementById('scr-auth').classList.add('active');
        }
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #161b22">👤 ${u.val().name}</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
