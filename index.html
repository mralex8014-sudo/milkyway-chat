<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #020408; --panel: #0b0e14; --accent: #00a2ff; --border: #1c2128; --text: #e6edf3; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 500px; background: var(--panel); display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 10; }
        .active-screen { display: flex; }

        /* Шапка */
        header { padding: 18px; background: #0f172a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .header-title { font-weight: 600; font-size: 18px; }

        /* Главный экран (Список чатов) */
        #main-list { padding: 10px; flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-radius: 12px; background: var(--panel); margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .chat-item:hover { border-color: var(--accent); background: #161b22; }
        .chat-avatar { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Окно чата */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #161b22; border-bottom-left-radius: 2px; border: 1px solid var(--border); }

        /* Поле ввода */
        .input-area { padding: 15px; background: #0f172a; display: flex; align-items: center; gap: 10px; }
        .main-input { flex: 1; background: #161b22; border: 1px solid var(--border); padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* Меню (Sidebar) */
        #sidebar { position: absolute; left: -100%; top: 0; width: 85%; height: 100%; background: var(--panel); z-index: 100; transition: 0.3s; padding: 30px 20px; border-right: 1px solid var(--border); }
        .sidebar-active { left: 0 !important; }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 90; }

        /* FAB (Кнопка добавить) */
        .fab { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,162,255,0.4); cursor: pointer; z-index: 20; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <h2 style="margin-bottom: 25px;">Настройки</h2>
        <p style="color:#8b949e; font-size: 12px;">Твой позывной (UID):</p>
        <div style="background:#161b22; padding:12px; border-radius:8px; margin: 10px 0; font-size:11px; cursor:pointer;" onclick="copyUID()" id="my-uid">Загрузка...</div>
        <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
        <button onclick="auth.signOut()" style="width:100%; padding:12px; border-radius:8px; border:none; background:#da3633; color:white; font-weight:bold;">Выход</button>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content: center; padding: 40px; text-align: center;">
        <i class="fas fa-rocket" style="font-size: 50px; color: var(--accent); margin-bottom: 20px;"></i>
        <h1 style="margin-bottom: 10px;">MilkyWay</h1>
        <p style="color:#8b949e; margin-bottom: 30px;">Войдите, чтобы начать полет</p>
        <input type="email" id="email" class="main-input" style="margin-bottom:15px; border-radius:12px;" placeholder="Email">
        <input type="password" id="pass" class="main-input" style="margin-bottom:20px; border-radius:12px;" placeholder="Пароль">
        <button class="btn-circle" style="width:100%; border-radius:12px;" onclick="authOp('login')">Войти</button>
        <p style="margin-top:20px; font-size:14px; color:#8b949e; cursor:pointer;" onclick="authOp('reg')">Регистрация</p>
    </div>

    <div id="screen-main" class="screen">
        <header>
            <i class="fas fa-bars" style="cursor:pointer;" onclick="toggleMenu()"></i>
            <span class="header-title">Чаты</span>
            <i class="fas fa-search" onclick="showSearch()"></i>
        </header>
        <div id="main-list">
            <div class="chat-item" onclick="openChat('global_public_room', 'Общий чат')">
                <div class="chat-avatar">🌍</div>
                <div>
                    <div style="font-weight:bold;">Общий чат</div>
                    <div style="font-size:12px; color:#8b949e;">Все пользователи здесь</div>
                </div>
            </div>
            <div id="private-chats-list"></div>
        </div>
        <div class="fab" onclick="showSearch()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="showScreen('screen-main')"></i>
            <span class="header-title" id="chat-name">Чат</span>
            <div style="display:flex; gap:15px;">
                <i class="fas fa-phone"></i>
                <i class="fas fa-video"></i>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <i class="fas fa-paperclip" style="color:#8b949e;"></i>
            <input type="text" id="msg-input" class="main-input" placeholder="Сообщение...">
            <button class="btn-circle" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let user = null, currentChatId = '';

    function authOp(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(t === 'login') auth.signInWithEmailAndPassword(e, p).catch(alert);
        else auth.createUserWithEmailAndPassword(e, p).then(() => alert("Успех!")).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('my-uid').innerText = u.uid;
            showScreen('screen-main');
        } else {
            showScreen('screen-auth');
        }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('sidebar-active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('sidebar-active') ? 'block' : 'none';
    }

    function showSearch() {
        const target = prompt("Введите UID друга для начала чата:");
        if(target && target !== user.uid) {
            const id = [user.uid, target].sort().join("_");
            openChat(id, "Приватный чат");
        }
    }

    function openChat(id, name) {
        currentChatId = id;
        document.getElementById('chat-name').innerText = name;
        showScreen('screen-chat');
        listen(id);
    }

    function send() {
        const txt = document.getElementById('msg-input').value.trim();
        if(!txt) return;
        db.ref('chats/' + currentChatId).push({ u: user.uid, t: txt, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const box = document.getElementById('messages');
        db.ref('chats/' + id).off();
        box.innerHTML = '';
        db.ref('chats/' + id).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("Скопировано!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
