<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #05070a; --panel: #0d1117; --border: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        /* Главный экран */
        .app { width: 100%; max-width: 450px; height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        /* Боковое меню - теперь оно ПОВЕРХ всего */
        .sidebar {
            position: absolute; top: 0; left: -100%; width: 80%; height: 100%;
            background: var(--panel); z-index: 1000; transition: 0.3s;
            border-right: 1px solid var(--border); padding: 30px;
        }
        .sidebar.open { left: 0; box-shadow: 10px 0 50px #000; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 999; }

        header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 20px; font-weight: bold; color: var(--neon); text-shadow: 0 0 8px var(--neon); }

        .screen { display: none; height: 100%; flex-direction: column; }
        .active { display: flex; }

        /* Список чатов */
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--neon); color: #000; display: grid; place-items: center; font-weight: bold; }

        /* Чат */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; word-wrap: break-word; }
        .my { align-self: flex-end; background: #005c4b; }
        .th { align-self: flex-start; background: #202c33; }
        .bubble img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }

        /* Ввод */
        .input-bar { padding: 10px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 20px; color: #fff; outline: none; }
        .btn-icon { color: var(--neon); font-size: 20px; cursor: pointer; }

        /* Авторизация */
        .auth-box { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .auth-box input { margin-bottom: 10px; border-radius: 8px; }
        .btn-main { padding: 12px; background: var(--neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .fab { position: absolute; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--neon); border-radius: 50%; display: grid; place-items: center; color: #000; font-size: 24px; box-shadow: 0 4px 12px rgba(0,210,255,0.4); cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div id="ovl" class="overlay" onclick="toggleMenu()"></div>
    <div id="side" class="sidebar">
        <h2 class="logo">Меню</h2>
        <p onclick="alert('Профиль')" style="margin: 20px 0; cursor:pointer;"><i class="fas fa-user"></i> Мой аккаунт</p>
        <p onclick="firebase.auth().signOut()" style="color:red; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Выйти</p>
    </div>

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <h1 class="logo" style="text-align:center; font-size:32px; margin-bottom:30px;">MilkyWay</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-main" onclick="handleAuth('login')">ВОЙТИ</button>
            <p onclick="handleAuth('reg')" style="text-align:center; margin-top:15px; color:var(--neon); cursor:pointer; font-size:12px;">Регистрация</p>
        </div>
    </div>

    <div id="scr-list" class="screen">
        <header>
            <i class="fas fa-bars btn-icon" onclick="toggleMenu()"></i>
            <span class="logo">MilkyWay</span>
            <div style="width:20px;"></div>
        </header>
        <div id="chat-list"></div>
        <div class="fab" onclick="addNewUser()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left btn-icon" onclick="showScreen('scr-list')"></i>
            <b id="chat-title">Чат</b>
            <i class="fas fa-video btn-icon" style="opacity:0.3"></i>
        </header>
        <div id="msgs"></div>
        <div class="input-bar">
            <i class="fas fa-camera btn-icon" onclick="sendMedia()"></i>
            <input type="text" id="m-text" placeholder="Сообщение...">
            <i class="fas fa-paper-plane btn-icon" onclick="sendMsg()"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let me = null;
    let activeChat = null;

    function toggleMenu() {
        const s = document.getElementById('side');
        const o = document.getElementById('ovl');
        s.classList.toggle('open');
        o.style.display = s.classList.contains('open') ? 'block' : 'none';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('side').classList.remove('open');
        document.getElementById('ovl').style.display = 'none';
    }

    function handleAuth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(!e || !p) return alert("Заполни поля");
        if(type === 'login') {
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Ошибка: " + err.message));
        } else {
            auth.createUserWithEmailAndPassword(e, p).then(u => {
                db.ref('users/' + u.user.uid).set({ name: e.split('@')[0], email: e });
                db.ref('lookup/' + btoa(e).replace(/=/g,"")).set(u.user.uid);
            }).catch(err => alert("Ошибка: " + err.message));
        }
    }

    auth.onAuthStateChanged(u => {
        if(u) { me = u; showScreen('scr-list'); loadChats(); }
        else { showScreen('scr-auth'); }
    });

    function loadChats() {
        const container = document.getElementById('chat-list');
        container.innerHTML = `<div class="chat-item" onclick="openChat('global','Общий канал')"><div class="avatar">G</div><b>Общий канал</b></div>`;
        db.ref('users/' + me.uid + '/contacts').on('value', snap => {
            snap.forEach(c => {
                db.ref('users/' + c.key).once('value', usnap => {
                    const u = usnap.val();
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => openChat(c.key, u.name);
                    div.innerHTML = `<div class="avatar">${u.name[0].toUpperCase()}</div><b>${u.name}</b>`;
                    container.appendChild(div);
                });
            });
        });
    }

    function openChat(id, name) {
        activeChat = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = name;
        showScreen('scr-chat');
        db.ref('messages/' + activeChat).off();
        const msgBox = document.getElementById('msgs');
        msgBox.innerHTML = '';
        db.ref('messages/' + activeChat).limitToLast(50).on('child_added', snap => {
            const m = snap.val();
            const d = document.createElement('div');
            d.className = `bubble ${m.from === me.uid ? 'my' : 'th'}`;
            if(m.type === 'img') d.innerHTML = `<img src="${m.url}">`;
            else d.innerText = m.text;
            msgBox.appendChild(d);
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('m-text');
        if(!i.value.trim()) return;
        db.ref('messages/' + activeChat).push({ from: me.uid, text: i.value, type: 'text' });
        i.value = '';
    }

    function sendMedia() {
        const url = prompt("Вставь ссылку на картинку или видео:");
        if(url) db.ref('messages/' + activeChat).push({ from: me.uid, url: url, type: 'img' });
    }

    function addNewUser() {
        const e = prompt("Email нового пользователя:");
        if(e) db.ref('lookup/' + btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/' + me.uid + '/contacts/' + s.val()).set(true);
            else alert("Пользователь не найден");
        });
    }
</script>
</body>
</html>
