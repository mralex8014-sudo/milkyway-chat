<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay: Final Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #020408;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --ai-glow: #00ff88;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app { width: 100%; max-width: 500px; height: 100dvh; position: relative; background: #05070c; display: flex; flex-direction: column; border: 1px solid var(--border); }

        /* --- EFFECTS --- */
        .comet { width: 40px; height: 40px; background: linear-gradient(45deg, var(--accent), var(--nebula)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; z-index: 10; background: inherit; }
        .active { display: flex; }

        /* --- LISTS --- */
        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 50; }
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 85px; }
        .item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .item:active { background: var(--glass); }

        /* --- CHAT --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.3s; background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .wall { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover; }
        
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; line-height: 1.4; }
        .msg-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-he { background: #1e272e; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 10px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }

        /* --- INPUTS --- */
        .cosmo-input { width: 100%; padding: 12px; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-main:active { transform: scale(0.98); }

        .nav { height: 75px; background: #080a0f; border-top: 1px solid var(--border); display: flex; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-t { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8696a0; font-size: 11px; gap: 4px; }
        .nav-t.active { color: var(--accent); }

        .ava { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); background: #111; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .ava img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <center>
            <div class="comet" style="margin-bottom: 20px;"><i class="fas fa-rocket"></i></div>
            <h1 style="color:var(--accent); margin-bottom:30px; letter-spacing:3px;">MILKYWAY</h1>
        </center>
        <input type="email" id="auth-email" class="cosmo-input" placeholder="Космо-почта">
        <input type="password" id="auth-pass" class="cosmo-input" placeholder="Пароль">
        <button onclick="handleLogin()" class="btn btn-main">ВОЙТИ В СИСТЕМУ</button>
        <p id="auth-err" style="color:var(--danger); font-size:11px; margin-top:10px; text-align:center;"></p>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="comet" style="width:30px; height:30px;"><i class="fas fa-user-astronaut"></i></div>
                    <b id="display-name" style="color:var(--accent)">Пилот</b>
                </div>
                <div style="display:flex; gap:15px;">
                    <i class="fas fa-robot" onclick="openChat('gemini_ai', 'Gemini AI')" style="color:var(--ai-glow); font-size:20px; cursor:pointer;"></i>
                    <i class="fas fa-cog" onclick="toggleScreen('scr-set', true)" style="color:#8696a0; font-size:20px; cursor:pointer;"></i>
                </div>
            </div>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <input type="text" id="searchInput" class="cosmo-input" style="margin:0;" placeholder="ID или Email друга...">
                <button onclick="findUser()" style="background:var(--accent); border:none; padding:0 15px; border-radius:10px;"><i class="fas fa-search"></i></button>
            </div>
        </div>
        
        <div id="chat-list" class="scroller"></div>

        <nav class="nav">
            <div class="nav-t active"><i class="fas fa-comments"></i><span>Чаты</span></div>
            <div class="nav-t" onclick="alert('История звонков в разработке')"><i class="fas fa-phone"></i><span>Звонки</span></div>
            <div class="nav-t" onclick="toggleScreen('scr-set', true)"><i class="fas fa-user"></i><span>Профиль</span></div>
        </nav>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-chevron-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer;"></i>
            <div id="chat-ava-head" class="ava" style="width:35px; height:35px;"></div>
            <b id="chat-with-name">...</b>
        </div>
        <div id="msg-box" class="wall"></div>
        <div style="padding:15px; background:#0a0f19; display:flex; gap:10px;">
            <label for="file-up" style="cursor:pointer; padding:10px; color:#8696a0;"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="file-up" style="display:none;" onchange="uploadFile(this)">
            <input type="text" id="msg-input" class="cosmo-input" style="margin:0; flex:1; border-radius:20px;" placeholder="Сообщение...">
            <button onclick="sendMsg()" class="ava" style="background:var(--accent); border:none; color:#000;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="scr-set" class="screen" style="z-index:1100;">
        <div class="header"><i class="fas fa-times" onclick="toggleScreen('scr-set', false)"></i> <b style="margin-left:15px;">Настройки</b></div>
        <div class="scroller" style="padding:20px; text-align:center;">
            <div class="ava" style="width:80px; height:80px; margin: 0 auto 20px;"><i class="fas fa-user-astronaut" style="font-size:30px;"></i></div>
            <p id="my-full-id" style="font-size:10px; color:var(--accent); margin-bottom:20px;"></p>
            <input type="text" id="new-name" class="cosmo-input" placeholder="Ваше Имя">
            <button onclick="updateProfile()" class="btn btn-main">ОБНОВИТЬ ПРОФИЛЬ</button>
            <button onclick="firebase.auth().signOut()" style="margin-top:40px; color:var(--danger); background:none; border:none; cursor:pointer;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE ---
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myId = null, activePeer = null, msgSub = null;

    // --- AUTH LOGIC ---
    function handleLogin() {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        if(!e || !p) return;
        auth.signInWithEmailAndPassword(e, p).catch(err => {
            if(err.code === 'auth/user-not-found') {
                auth.createUserWithEmailAndPassword(e, p).then(res => {
                    db.ref('users/' + res.user.uid).set({ email: e, name: 'Пилот' });
                });
            } else { document.getElementById('auth-status').innerText = err.message; }
        });
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            myId = u.uid;
            document.getElementById('scr-auth').classList.remove('active');
            document.getElementById('scr-main').classList.add('active');
            document.getElementById('my-full-id').innerText = "ID: " + myId;
            loadMyData();
            loadChatList();
        } else {
            document.getElementById('scr-auth').classList.add('active');
            document.getElementById('scr-main').classList.remove('active');
        }
    });

    function loadMyData() {
        db.ref('users/' + myId).on('value', snap => {
            const d = snap.val();
            if(d) document.getElementById('display-name').innerText = d.name || 'Пилот';
        });
    }

    // --- SEARCH ---
    function findUser() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!q) return loadChatList();
        const list = document.getElementById('chat-list');
        list.innerHTML = '<p style="text-align:center; padding:20px;">Поиск в глубоком космосе...</p>';

        db.ref('users').once('value', snap => {
            list.innerHTML = '';
            let found = false;
            snap.forEach(u => {
                const d = u.val();
                if(u.key === q || (d.email && d.email.toLowerCase().includes(q))) {
                    list.innerHTML += renderUserItem(u.key, d.name, d.email, true);
                    found = true;
                }
            });
            if(!found) list.innerHTML = '<p style="text-align:center; padding:20px;">Пилот не найден</p>';
        });
    }

    // --- CHAT LIST PERSISTENCE ---
    function loadChatList() {
        db.ref('user_chats/' + myId).on('value', async snap => {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            // Всегда добавляем Gemini если его нет
            if(!snap.hasChild('gemini_ai')) {
                list.innerHTML += renderUserItem('gemini_ai', 'Gemini AI', 'Система ИИ', false);
            }

            snap.forEach(c => {
                const peerId = c.key;
                db.ref('users/' + peerId).once('value', uSnap => {
                    const u = uSnap.val() || (peerId === 'gemini_ai' ? {name:'Gemini AI', email:'System'} : null);
                    if(u) list.innerHTML += renderUserItem(peerId, u.name, u.email, false);
                });
            });
        });
    }

    function renderUserItem(id, name, email, isSearch) {
        return `
        <div class="item">
            <div class="ava" onclick="openChat('${id}', '${name}')"><i class="fas fa-user-astronaut"></i></div>
            <div style="flex:1" onclick="openChat('${id}', '${name}')">
                <b>${name}</b><br><small style="color:#8696a0">${email}</small>
            </div>
            ${!isSearch ? `<i class="fas fa-trash" onclick="deleteChat('${id}')" style="color:#333; font-size:14px;"></i>` : ''}
        </div>`;
    }

    function deleteChat(id) {
        if(confirm("Удалить чат из списка?")) db.ref('user_chats/'+myId+'/'+id).remove();
    }

    // --- MESSAGING ---
    function openChat(id, name) {
        activePeer = id;
        document.getElementById('chat-with-name').innerText = name;
        document.getElementById('scr-chat').classList.add('open');
        
        const chatId = [myId, id].sort().join('_');
        if(msgSub) db.ref('msgs/'+msgSub).off();
        msgSub = chatId;

        db.ref('msgs/' + chatId).on('value', snap => {
            const box = document.getElementById('msg-box');
            box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const status = d.s === 2 ? '✓✓' : '✓';

                let body = d.type === 'file' ? `<a href="${d.x}" download style="color:var(--accent)">📎 Файл (скачать)</a>` : d.x;

                box.innerHTML += `
                <div class="msg ${isMe ? 'msg-me' : 'msg-he'}">
                    ${body}
                    <div class="msg-info">${time} ${isMe ? `<span>${status}</span>` : ''}</div>
                </div>`;
                if(!isMe && d.s === 1) db.ref('msgs/'+chatId+'/'+m.key).update({s: 2});
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim() || !activePeer) return;
        
        const chatId = [myId, activePeer].sort().join('_');
        const now = Date.now();
        
        db.ref('msgs/' + chatId).push({ f: myId, x: inp.value, t: now, s: 1, type: 'text' });
        db.ref('user_chats/' + myId + '/' + activePeer).set(now);
        db.ref('user_chats/' + activePeer + '/' + myId).set(now);

        if(activePeer === 'gemini_ai') {
            setTimeout(() => {
                db.ref('msgs/'+chatId).push({ f:'gemini_ai', x: "Сигнал получен. Анализирую данные...", t: Date.now(), s:2, type:'text' });
            }, 800);
        }
        inp.value = '';
    }

    function uploadFile(el) {
        const file = el.files[0];
        if(!file || file.size > 20 * 1024 * 1024) return alert("Максимум 20МБ!");
        const reader = new FileReader();
        reader.onload = (e) => {
            const chatId = [myId, activePeer].sort().join('_');
            db.ref('msgs/' + chatId).push({ f: myId, x: e.target.result, t: Date.now(), s: 1, type: 'file' });
        };
        reader.readAsDataURL(file);
    }

    // --- UI UTILS ---
    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }
    function toggleScreen(id, show) { document.getElementById(id).classList.toggle('active', show); }
    function updateProfile() {
        const n = document.getElementById('new-name').value;
        if(n) db.ref('users/'+myId).update({name: n}).then(() => toggleScreen('scr-set', false));
    }
</script>
</body>
</html>
