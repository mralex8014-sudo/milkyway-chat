<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Ultra Secure 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 450px; background: #0b0e14; display: flex; flex-direction: column; border-left: 1px solid #1c2128; border-right: 1px solid #1c2128; position: relative; }
        
        /* Авторизация */
        #auth-screen { padding: 40px 20px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; background: radial-gradient(circle at top, #1a2a3d 0%, #020408 100%); }
        .auth-input { width: 100%; background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        .btn-main { background: #00a2ff; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #0081cc; transform: translateY(-2px); }

        /* Шапка */
        header { padding: 15px 20px; background: #0f172a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1c2128; }
        .header-btns { display: flex; gap: 15px; font-size: 18px; color: #8b949e; }
        .header-btns i { cursor: pointer; }
        .header-btns i:hover { color: #00a2ff; }

        /* Список сообщений */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .my { align-self: flex-end; background: #00a2ff; border-bottom-right-radius: 4px; }
        .their { align-self: flex-start; background: #161b22; border-bottom-left-radius: 4px; border: 1px solid #30363d; }

        /* Подвал (Кнопки!) */
        .footer { padding: 15px; background: #0f172a; display: flex; align-items: center; gap: 12px; }
        .input-box { flex: 1; background: #161b22; border: 1px solid #30363d; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .icon-btn { color: #8b949e; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: #00a2ff; }
        .send-btn { background: #00a2ff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }

        /* Боковое меню */
        #sidebar { position: absolute; left: -100%; top: 0; width: 80%; height: 100%; background: #0b0e14; z-index: 1000; transition: 0.4s; padding: 30px 20px; border-right: 1px solid #30363d; }
        .sidebar-active { left: 0 !important; }
        .uid-tag { background: #161b22; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 20px; cursor: pointer; word-break: break-all; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <i class="fas fa-user-astronaut" style="font-size: 60px; color: #00a2ff; margin-bottom: 20px;"></i>
        <h1>MilkyWay 🌌</h1>
        <p style="color: #8b949e; margin-bottom: 30px;">Твой личный космос для общения</p>
        <input type="email" id="email" class="auth-input" placeholder="Космическая почта">
        <input type="password" id="pass" class="auth-input" placeholder="Пароль доступа">
        <button class="btn-main" onclick="authOp('login')">Войти в систему</button>
        <button style="background:none; border:none; color:#8b949e; margin-top:15px; cursor:pointer;" onclick="authOp('reg')">Зарегистрировать новый борт</button>
    </div>

    <div id="sidebar">
        <i class="fas fa-times" style="float:right; cursor:pointer;" onclick="toggleMenu()"></i>
        <h2>Профиль</h2>
        <div class="uid-tag" onclick="copyUID()">
            <p style="color:#8b949e; margin-bottom:5px;">Твой позывной (UID):</p>
            <span id="my-uid-val">загрузка...</span>
        </div>
        <button class="btn-main" style="width:100%; margin-top:20px; background:#da3633;" onclick="auth.signOut()">Выйти</button>
    </div>

    <div id="chat-ui" style="display:none; flex-direction:column; height:100%;">
        <header>
            <i class="fas fa-bars icon-btn" onclick="toggleMenu()"></i>
            <h3 id="status">Общий чат</h3>
            <div class="header-btns">
                <i class="fas fa-phone" onclick="alert('Вызов...')"></i>
                <i class="fas fa-video" onclick="alert('Видеосвязь...')"></i>
            </div>
        </header>

        <div style="padding:10px; background:#161b22; display:flex; gap:8px;">
            <input type="text" id="target-uid" class="auth-input" style="margin:0; padding:8px; font-size:12px;" placeholder="Вставь UID друга">
            <button class="btn-main" style="padding:0 15px;" onclick="startPrivate()">Стыковка</button>
        </div>

        <div id="chat-window"></div>

        <div class="footer">
            <i class="fas fa-paperclip icon-btn" onclick="document.getElementById('file-input').click()"></i>
            <input type="file" id="file-input" style="display:none">
            <input type="text" id="msg-input" class="input-box" placeholder="Написать сообщение...">
            <button class="send-btn" onclick="send()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let user = null;
    let chatId = 'global_public_room';

    function authOp(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e, p).catch(alert);
        else auth.createUserWithEmailAndPassword(e, p).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('my-uid-val').innerText = u.uid;
            listen(chatId);
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-ui').style.display = 'none';
        }
    });

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar-active'); }
    function copyUID() { navigator.clipboard.writeText(user.uid); alert("Позывной скопирован!"); }

    function startPrivate() {
        const target = document.getElementById('target-uid').value.trim();
        if(!target || target === user.uid) return;
        chatId = [user.uid, target].sort().join("_");
        document.getElementById('status').innerText = "🔒 Секретный канал";
        listen(chatId);
    }

    function send() {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        db.ref('chats/' + chatId).push({ u: user.uid, t: txt, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const box = document.getElementById('chat-window');
        db.ref('chats/' + id).off();
        box.innerHTML = '';
        db.ref('chats/' + id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
