<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Ultra 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --bg: #020408; --glass: rgba(15, 23, 42, 0.8); --border: rgba(0, 210, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at center, #0a192f 0%, #020408 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; justify-content: center; overflow: hidden;
        }

        /* Звездное небо на фоне */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; pointer-events: none; z-index: 0; }

        .app-container { 
            width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.7); 
            display: flex; flex-direction: column; position: relative; 
            backdrop-filter: blur(25px); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            z-index: 10;
        }

        /* --- ЛОГОТИП НАД ЧАТАМИ --- */
        .header-brand {
            padding: 25px 15px 15px; text-align: center;
            background: linear-gradient(to bottom, rgba(0,210,255,0.1), transparent);
        }
        .milky-logo {
            font-size: 28px; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(45deg, #00d2ff, #00ffcc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(0,210,255,0.5));
        }

        /* --- СКРЫТОЕ МЕНЮ --- */
        #sidebar {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            visibility: hidden; opacity: 0; transition: 0.4s;
        }
        .sidebar-drawer {
            width: 80%; max-width: 300px; height: 100%; background: #050a14;
            transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px; border-right: 2px solid var(--accent);
        }
        #sidebar.open { visibility: visible; opacity: 1; }
        #sidebar.open .sidebar-drawer { transform: translateX(0); }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .active-screen { display: flex; }

        header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.03); }

        /* --- КАРТОЧКИ ЧАТОВ --- */
        .chat-scroll { flex: 1; overflow-y: auto; padding: 10px 0; }
        .chat-card {
            margin: 8px 15px; padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 18px; display: flex; align-items: center; 
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .chat-card:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--accent); }
        .avatar { width: 50px; height: 50px; background: linear-gradient(135deg, #00d2ff, #0076ff); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 15px rgba(0,210,255,0.3); }

        /* --- ЧАТ --- */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; }
        .my { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #1c2128; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* --- ВВОД --- */
        .footer { padding: 15px; background: #050a14; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .input-pill { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--border); padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .btn-send { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: #000; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-send:hover { transform: scale(1.1); filter: brightness(1.2); }

        .fab { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; box-shadow: 0 8px 25px rgba(0,210,255,0.4); cursor: pointer; z-index: 99; transition: 0.3s; }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="app-container">
    <div id="sidebar" onclick="toggleMenu()">
        <div class="sidebar-drawer" onclick="event.stopPropagation()">
            <div class="milky-logo" style="margin-bottom:40px; font-size: 22px;">MILKYWAY</div>
            <p style="color:#8b949e; font-size:12px;">Ваш бортовой номер (UID):</p>
            <div onclick="copyUID()" id="my-uid" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; font-size:11px; cursor:pointer; border:1px solid var(--border); margin:10px 0; word-break: break-all;">...</div>
            <button onclick="auth.signOut()" style="width:100%; padding:15px; border-radius:12px; border:none; background:#ff4b2b; color:white; font-weight:bold; margin-top:40px; cursor:pointer;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content:center; padding:40px; text-align:center;">
        <div class="milky-logo" style="font-size: 45px; margin-bottom: 10px;">MilkyWay</div>
        <p style="color: var(--accent); letter-spacing: 2px; margin-bottom: 40px; font-size: 12px;">INTERSTELLAR CHAT</p>
        <input type="email" id="email" class="input-pill" style="margin-bottom:12px; width:100%;" placeholder="Космическая почта">
        <input type="password" id="pass" class="input-pill" style="margin-bottom:25px; width:100%;" placeholder="Пароль доступа">
        <button onclick="authOp('login')" class="btn-send" style="width:100%; border-radius:15px; font-weight:bold;">ВОЙТИ</button>
        <p onclick="authOp('reg')" style="color:#8b949e; margin-top:25px; cursor:pointer; font-size:14px;">Стать новым пилотом</p>
    </div>

    <div id="screen-main" class="screen">
        <div class="header-brand">
            <div class="milky-logo">MILKYWAY</div>
        </div>
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer; font-size:20px; color:var(--accent);"></i>
            <span style="font-size:14px; color:#8b949e; text-transform:uppercase;">Активные каналы</span>
            <i class="fas fa-search" onclick="newChat()" style="color:var(--accent);"></i>
        </header>
        <div class="chat-scroll">
            <div class="chat-card" onclick="openChat('global_public_room', 'Общий канал 🌍')">
                <div class="avatar">🌍</div>
                <div><div style="font-weight:bold;">Общий чат</div><div style="font-size:12px; color:#8b949e;">Связь со всей галактикой</div></div>
            </div>
            <div id="chat-list-dynamic"></div>
        </div>
        <div class="fab" onclick="newChat()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <i class="fas fa-chevron-left" onclick="showScreen('screen-main')" style="cursor:pointer; font-size:20px; color:var(--accent);"></i>
            <span id="chat-title" style="font-weight:bold; color:var(--accent);">Связь...</span>
            <div style="display:flex; gap:15px;"><i class="fas fa-video"></i><i class="fas fa-phone"></i></div>
        </header>
        <div id="messages"></div>
        <div class="footer">
            <i class="fas fa-paperclip" style="color:#8b949e; font-size:20px;"></i>
            <input type="text" id="msg-input" class="input-pill" placeholder="Введите сообщение...">
            <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, activeChat = '';

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert("Ошибка: " + err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(() => alert("Пилот зарегистрирован!")).catch(err => alert("Ошибка: " + err.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { 
            user = u; 
            document.getElementById('my-uid').innerText = u.uid; 
            showScreen('screen-main');
            loadHistory();
        } else { showScreen('screen-auth'); }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function newChat() {
        const id = prompt("Введите UID пилота:");
        if(id && id !== user.uid) {
            db.ref('users/' + user.uid + '/history/' + id).set(true);
            openChat([user.uid, id].sort().join("_"), "Приватный канал 🔒");
        }
    }

    function loadHistory() {
        const list = document.getElementById('chat-list-dynamic');
        db.ref('users/' + user.uid + '/history').on('value', snap => {
            list.innerHTML = '';
            snap.forEach(child => {
                const cid = child.key;
                const chatId = [user.uid, cid].sort().join("_");
                const div = document.createElement('div');
                div.className = 'chat-card';
                div.onclick = () => openChat(chatId, "Пилот: " + cid.substring(0,8));
                div.innerHTML = `<div class="avatar">📡</div><div><div style="font-weight:bold;">Пилот ${cid.substring(0,6)}</div><div style="font-size:12px; color:#8b949e;">Защищенное соединение</div></div>`;
                list.appendChild(div);
            });
        });
    }

    function openChat(id, name) {
        activeChat = id; document.getElementById('chat-title').innerText = name;
        showScreen('screen-chat'); listen(id);
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t) return;
        db.ref('chats/'+activeChat).push({ u: user.uid, t: t, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const m = document.getElementById('messages');
        db.ref('chats/'+id).off(); m.innerHTML = '';
        db.ref('chats/'+id).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            m.appendChild(div); m.scrollTop = m.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("Бортовой номер скопирован!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
