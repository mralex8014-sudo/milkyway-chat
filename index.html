<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Elite Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0b0e14; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Тот самый контейнер из твоих первых скринов */
        .app-container { 
            width: 360px; 
            height: 640px; 
            background: #141923; 
            border: 1px solid #1f2a3d; 
            border-radius: 25px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 50px rgba(0, 162, 255, 0.1);
            overflow: hidden;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 30px; 
        }
        .active { display: flex; }

        .logo { 
            font-size: 32px; 
            font-weight: bold; 
            color: #00a2ff; 
            margin-bottom: 40px; 
            text-shadow: 0 0 15px rgba(0, 162, 255, 0.6); 
        }

        input { 
            width: 100%; 
            background: #1c222d; 
            border: 1px solid #30363d; 
            padding: 15px; 
            border-radius: 12px; 
            color: white; 
            margin-bottom: 15px; 
            outline: none; 
            text-align: center;
        }

        button { 
            width: 100%; 
            background: #00a2ff; 
            border: none; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { background: #0081cc; box-shadow: 0 0 20px rgba(0, 162, 255, 0.4); }

        #recaptcha-container { margin: 10px 0; transform: scale(0.85); }
        
        .user-list { width: 100%; flex: 1; overflow-y: auto; }
        .user-item { padding: 20px; border-bottom: 1px solid #1c222d; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: #1c222d; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active">
        <div class="logo">MilkyWay</div>
        <input type="text" id="login-field" placeholder="Email или +7900...">
        <div id="recaptcha-container"></div>
        <button id="main-btn" onclick="sendRequest()">ПОЛУЧИТЬ КОД</button>

        <div id="otp-group" style="display:none; width: 100%; margin-top: 15px;">
            <input type="text" id="otp-field" placeholder="Код подтверждения">
            <button onclick="verify()">ВОЙТИ</button>
        </div>
    </div>

    <div id="scr-main" class="screen" style="padding: 0; justify-content: flex-start;">
        <div style="padding: 20px; border-bottom: 1px solid #1f2a3d; width: 100%; text-align: center;">
            <h2 style="margin: 0; color: #00a2ff;">Мессенджер</h2>
        </div>
        <div class="user-list" id="users"></div>
        <button onclick="auth.signOut()" style="background: #ff4b4b; border-radius: 0;">ВЫЙТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Капча для телефона
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'normal' });

    async function sendRequest() {
        const val = document.getElementById('login-field').value;
        if(!val) return alert("Введите данные");

        try {
            if(val.includes('@')) {
                // Вход по почте
                await auth.sendSignInLinkToEmail(val, {
                    url: window.location.href,
                    handleCodeInApp: true
                });
                window.localStorage.setItem('emailForSignIn', val);
                alert("Ссылка для входа на почте!");
            } else {
                // Вход по телефону
                window.confirmationResult = await auth.signInWithPhoneNumber(val, window.recaptchaVerifier);
                document.getElementById('otp-group').style.display = 'block';
                document.getElementById('main-btn').style.display = 'none';
            }
        } catch (e) {
            alert("Ошибка Firebase: " + e.message + "\n\nПРОВЕРЬТЕ НАСТРОЙКИ В КОНСОЛИ!");
        }
    }

    async function verify() {
        const code = document.getElementById('otp-field').value;
        try {
            await window.confirmationResult.confirm(code);
        } catch (e) { alert("Ошибка кода!"); }
    }

    // Слушатель ссылки из письма
    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Подтвердите Email');
        auth.signInWithEmailLink(email, window.location.href).then(() => {
            window.localStorage.removeItem('emailForSignIn');
        });
    }

    // Переключение экранов
    auth.onAuthStateChanged(user => {
        document.getElementById('scr-auth').classList.toggle('active', !user);
        document.getElementById('scr-main').classList.toggle('active', !!user);
        if(user) {
            db.ref('users/' + user.uid).set({ name: user.email || user.phoneNumber });
            loadUsers();
        }
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    list.innerHTML += `<div class="user-item">👤 ${u.val().name}</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
