<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Gold 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ==========================================
           1. ГЛОБАЛЬНЫЙ КАРКАС (НЕ ТРОГАТЬ!)
           ========================================== */
        :root { 
            --accent: #00a2ff; 
            --bg: #0b0e14; 
            --panel: #161b22; 
            --border: #30363d; 
            --text: #e6edf3; 
            --my-bubble: #056162;
            --their-bubble: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #010409; 
            color: var(--text); 
            font-family: -apple-system, sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; /* Запрещает скролл всей страницы */
        }

        /* Тот самый контейнер, который держит дизайн */
        .app-container {
            width: 100%; 
            max-width: 450px; /* Фикс ширины для ПК */
            height: 100%; 
            background: var(--bg);
            display: flex; 
            flex-direction: column; 
            position: relative;
            border-left: 1px solid var(--border); 
            border-right: 1px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* ==========================================
           2. ЭКРАНЫ И ИНТЕРФЕЙС
           ========================================== */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .active { display: flex; }

        header { 
            padding: 15px 20px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        /* Список чатов */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            border-bottom: 1px solid var(--border); 
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #1c2128; }

        /* Сообщения */
        #msg-flow { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #0d1117; 
        }

        .bubble { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 14px; 
            font-size: 14px; 
            position: relative;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .bubble.my { align-self: flex-end; background: var(--my-bubble); border-bottom-right-radius: 2px; }
        .bubble.their { align-self: flex-start; background: var(--their-bubble); border-bottom-left-radius: 2px; }

        .time { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        .ticks { color: var(--accent); margin-left: 4px; }

        /* Поле ввода */
        .footer { 
            padding: 10px 15px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .input-box { 
            flex: 1; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            padding: 12px 20px; 
            border-radius: 25px; 
            color: white; 
            outline: none;
            font-size: 15px;
        }

        /* Аватары */
        .user-av { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
        }

        .fab {
            position: absolute; bottom: 85px; right: 25px; width: 56px; height: 56px;
            border-radius: 50%; background: var(--accent); display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); cursor: pointer; z-index: 5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content: center; padding: 40px; text-align: center;">
        <h1 style="color: var(--accent); font-size: 42px; margin-bottom: 40px;">MilkyWay</h1>
        <input type="email" id="email" class="input-box" placeholder="Email" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass" class="input-box" placeholder="Пароль" style="width:100%; margin-bottom:20px;">
        <button onclick="authAction('login')" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <p onclick="authAction('reg')" style="margin-top:25px; font-size:13px; opacity:0.5; cursor:pointer;">Регистрация пилота</p>
    </div>

    <div id="scr-list" class="screen">
        <header>
            <div style="font-weight:bold; font-size:20px;">MilkyWay</div>
            <i class="fas fa-power-off" style="opacity:0.6;" onclick="auth.signOut()"></i>
        </header>
        <div id="chats-box" class="chat-list">
            </div>
        <div class="fab" onclick="addNewPilot()"><i class="fas fa-user-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <i class="fas fa-chevron-left" onclick="showScreen('scr-list')"></i>
                <div class="user-av" id="header-av" style="width:36px; height:36px; font-size:14px;">?</div>
                <div>
                    <div id="header-name" style="font-weight:bold; font-size:15px;">Загрузка...</div>
                    <small id="typing-label" style="color:#25d366; font-size:11px;">в сети</small>
                </div>
            </div>
            <div style="display:flex; gap:18px; opacity:0.8;">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
            </div>
        </header>
        <div id="msg-flow"></div>
        <div class="footer">
            <i class="fas fa-paperclip" style="opacity:0.5;"></i>
            <input type="text" id="m-input" class="input-box" placeholder="Сообщение" oninput="reportTyping()">
            <div id="send-btn" onclick="fireMessage()">
                <i class="fas fa-paper-plane" style="color:var(--accent); font-size:22px;"></i>
            </div>
        </div>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ (НЕ МЕНЯТЬ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let me = null, activeRoom = null;

    // --- ЛОГИКА ЭКРАНОВ ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- АВТОРИЗАЦИЯ ---
    function authAction(mode) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Заполни все поля!");
        if(mode === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/' + u.user.uid).set({ name: e.split('@')[0], email: e });
            db.ref('emails_map/' + btoa(e).replace(/=/g, "")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) { me = user; showScreen('scr-list'); syncChats(); }
        else showScreen('scr-auth');
    });

    // --- РАБОТА С КОНТАКТАМИ ---
    function syncChats() {
        const box = document.getElementById('chats-box');
        box.innerHTML = `<div class="chat-item" onclick="enterRoom('global', 'Общий чат')"><div class="user-av" style="background:#f39c12">🚀</div><div><b>Общий чат</b><br><small>Все пользователи на связи</small></div></div>`;
        
        db.ref('users/' + me.uid + '/contacts').on('value', snap => {
            snap.forEach(c => {
                db.ref('users/' + c.key).once('value', uSnap => {
                    const u = uSnap.val();
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => enterRoom(c.key, u.name);
                    div.innerHTML = `<div class="user-av">${u.name[0].toUpperCase()}</div><div><b>${u.name}</b><br><small>Личный канал</small></div>`;
                    box.appendChild(div);
                });
            });
        });
    }

    function addNewPilot() {
        const email = prompt("Введите Email пилота для стыковки:");
        if(email) {
            db.ref('emails_map/' + btoa(email).replace(/=/g, "")).once('value', s => {
                if(s.exists()) db.ref('users/' + me.uid + '/contacts/' + s.val()).set(true);
                else alert("Пилот не найден в базе");
            });
        }
    }

    // --- ЧАТ И СООБЩЕНИЯ ---
    function enterRoom(id, name) {
        activeRoom = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('header-name').innerText = name;
        document.getElementById('header-av').innerText = name[0].toUpperCase();
        showScreen('scr-chat');
        watchMessages();
        watchTyping(id);
    }

    function watchMessages() {
        const flow = document.getElementById('msg-flow');
        db.ref('msgs/' + activeRoom).off(); 
        flow.innerHTML = '';
        
        db.ref('msgs/' + activeRoom).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const bubble = document.createElement('div');
            bubble.className = `bubble ${d.from === me.uid ? 'my' : 'their'}`;
            const time = new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            bubble.innerHTML = `${d.txt} <span class="time">${time} ${d.from === me.uid ? '<i class="fas fa-check-double ticks"></i>' : ''}</span>`;
            flow.appendChild(bubble);
            flow.scrollTop = flow.scrollHeight;
        });
    }

    function fireMessage() {
        const inp = document.getElementById('m-input');
        if(!inp.value.trim()) return;
        db.ref('msgs/' + activeRoom).push({
            from: me.uid,
            txt: inp.value,
            time: Date.now()
        });
        inp.value = '';
    }

    // --- WHATSAPP ФИШКИ ---
    function reportTyping() {
        db.ref('typing/' + activeRoom + '/' + me.uid).set(true);
        setTimeout(() => db.ref('typing/' + activeRoom + '/' + me.uid).remove(), 2000);
    }

    function watchTyping(otherId) {
        if(otherId === 'global') return;
        db.ref('typing/' + activeRoom + '/' + otherId).on('value', s => {
            document.getElementById('typing-label').innerText = s.exists() ? 'печатает...' : 'в сети';
            document.getElementById('typing-label').style.color = s.exists() ? '#00a2ff' : '#25d366';
        });
    }

    // Слушатель Enter
    document.getElementById('m-input').onkeypress = e => { if(e.key === 'Enter') fireMessage(); };

</script>
</body>
</html>
