<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay Turbo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #030508;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --nav-h: 70px;
        }

        /* Оптимизация производительности */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--space-bg); color: #fff; 
            height: 100dvh; overflow: hidden; display: flex; justify-content: center; 
        }

        .app {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            contain: strict; /* Ускоряет рендеринг контейнера */
        }

        /* ЭКРАНЫ С GPU УСКОРЕНИЕМ */
        .screen { 
            display: none; flex-direction: column; height: 100%; width: 100%; 
            position: absolute; top: 0; background: inherit; z-index: 10;
            will-change: transform, opacity; 
        }
        .active { display: flex; }

        /* ИСПРАВЛЕННОЕ НИЖНЕЕ МЕНЮ */
        .nav-bar {
            height: var(--nav-h); background: #080a0f; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: stretch;
            position: absolute; bottom: 0; width: 100%; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #8696a0; cursor: pointer; flex: 1; transition: color 0.2s;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; height: 24px; line-height: 24px; }
        .nav-item span { font-size: 11px; font-weight: 500; display: block; }
        .nav-item.active { color: var(--accent); }

        /* ЧАТ (ПЛАВНЫЙ ВЫЕЗД) */
        #scr-chat { 
            z-index: 1000; transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            background: #000; 
        }
        #scr-chat.open { transform: translateX(0); }
        
        .chat-bg { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px;
            background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover;
            background-attachment: local;
        }

        /* ПОИСК */
        .search-wrap { 
            background: var(--glass); border-radius: 12px; padding: 8px 12px; 
            display: flex; align-items: center; border: 1px solid var(--border); margin: 10px 0;
        }
        .search-wrap input { background: none; border: none; color: #fff; flex: 1; outline: none; margin-left: 10px; font-size: 14px; }

        /* АВАТАРЫ */
        .ava-box {
            width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: #1a1f2b; flex-shrink: 0; contain: content;
        }
        .ava-box img { width: 100%; height: 100%; object-fit: cover; }
        .ava-box i { font-size: 20px; color: var(--accent); }

        /* ЛОГОТИП */
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-emblem { 
            width: 30px; height: 30px; background: linear-gradient(45deg, var(--accent), var(--nebula));
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        /* КНОПКИ */
        .btn-send {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
            border: none; color: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s;
        }
        .btn-send:active { transform: scale(0.9); }

        .bubble { 
            padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; 
            line-height: 1.4; word-wrap: break-word; position: relative;
        }
        .me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 4px; }
        .he { background: rgba(30,40,50,0.92); align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-auth" class="screen active" style="padding:40px; justify-content:center;">
        <div style="text-align:center; margin-bottom:30px;">
            <div class="logo-emblem" style="width:70px; height:70px; font-size:30px; margin:0 auto 15px;"><i class="fas fa-rocket"></i></div>
            <h1 style="letter-spacing:5px; color:var(--accent);">MILKYWAY</h1>
        </div>
        <div id="auth-ui">
            <input type="text" id="login-val" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:10px;" placeholder="Email или Телефон">
            <button onclick="simulateAuth()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div style="padding:15px 20px; background:rgba(10,15,25,0.95); border-bottom:1px solid var(--border);">
            <div class="logo-box">
                <div class="logo-emblem"><i class="fas fa-star"></i></div>
                <h2 style="color:var(--accent); letter-spacing:2px; font-size:20px;">MilkyWay</h2>
            </div>
            <div class="search-wrap">
                <i class="fas fa-search" style="color:#8696a0;"></i>
                <input type="text" id="globalSearch" placeholder="Поиск по ID или контактам..." oninput="debouncedSearch()">
            </div>
        </div>

        <div id="chats-container" style="flex:1; overflow-y:auto; padding-bottom:80px; contain: content;"></div>

        <nav class="nav-bar">
            <div class="nav-item active" id="nav-chats" onclick="switchNav('chats')">
                <i class="fas fa-comment-alt"></i>
                <span>Чаты</span>
            </div>
            <div class="nav-item" id="nav-status" onclick="switchNav('status')">
                <i class="fas fa-circle-notch"></i>
                <span>Статус</span>
            </div>
            <div class="nav-item" id="nav-calls" onclick="switchNav('calls')">
                <i class="fas fa-phone-alt"></i>
                <span>Звонки</span>
            </div>
        </nav>
    </div>

    <div id="scr-chat" class="screen">
        <div style="padding:10px 15px; display:flex; align-items:center; gap:12px; background:rgba(10,15,25,0.98); border-bottom:1px solid var(--border); height:70px;">
            <i class="fas fa-arrow-left" style="color:var(--accent); font-size:20px; cursor:pointer; padding:10px;" onclick="closeChat()"></i>
            <div id="peer-ava" class="ava-box" style="width:40px; height:40px;"></div>
            <div style="flex:1">
                <b id="peer-name" style="font-size:16px;">Пилот</b><br>
                <small id="peer-status" style="color:var(--accent); font-size:11px;">на связи</small>
            </div>
            <i class="fas fa-ellipsis-v" style="color:#8696a0; padding:10px;"></i>
        </div>
        <div id="chat-msgs" class="chat-bg"></div>
        <div style="padding:10px 15px; background:#080a0f; display:flex; gap:10px; align-items:center; padding-bottom: calc(10px + env(safe-area-inset-bottom));">
            <div style="flex:1; background:var(--glass); border-radius:25px; padding:5px 15px; border:1px solid var(--border); display:flex; align-items:center;">
                <input type="text" id="m-input" placeholder="Сообщение..." style="background:none; border:none; color:#fff; flex:1; padding:10px; outline:none;">
            </div>
            <button class="btn-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let myId = null, selId = null, searchTimeout;

    // --- ОПТИМИЗАЦИЯ ПОИСКА ---
    function debouncedSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => runSearch(), 300);
    }

    // --- НАВИГАЦИЯ ---
    function switchNav(type) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + type).classList.add('active');
        // Логика переключения контента...
    }

    // --- АВТОРИЗАЦИЯ ---
    function simulateAuth() {
        const val = document.getElementById('login-val').value;
        if(!val) return alert("Введите данные");
        // Для демо просто входим под случайным ID если нет реального
        auth.signInAnonymously().catch(e => alert(e.message));
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) {
            myId = u.uid;
            db.ref('users/' + u.uid).update({ online: true, name: u.displayName || 'Пилот ' + u.uid.substr(0,4) });
            loadUsers();
        }
    });

    // --- ПОИСК И СПИСОК ---
    function runSearch() {
        const q = document.getElementById('globalSearch').value.toLowerCase();
        db.ref('users').limitToFirst(50).once('value', snap => {
            const container = document.getElementById('chats-container');
            let html = '';
            snap.forEach(child => {
                const user = child.val();
                if(child.key !== myId && (user.name || '').toLowerCase().includes(q)) {
                    html += `
                    <div style="padding:15px 20px; display:flex; align-items:center; gap:15px; border-bottom:1px solid rgba(255,255,255,0.02);" onclick="openChat('${child.key}','${user.name}','${user.ava}')">
                        <div class="ava-box">${user.ava ? `<img src="${user.ava}">` : `<i class="fas fa-user-astronaut"></i>`}</div>
                        <div style="flex:1">
                            <b style="font-size:16px;">${user.name}</b><br>
                            <small style="color:#8696a0">На связи в системе</small>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = html;
        });
    }

    function loadUsers() { runSearch(); }

    // --- ЧАТ ---
    function openChat(id, name, ava) {
        selId = id;
        document.getElementById('peer-name').innerText = name;
        document.getElementById('peer-ava').innerHTML = ava ? `<img src="${ava}">` : `<i class="fas fa-user-astronaut"></i>`;
        const scr = document.getElementById('scr-chat');
        scr.classList.add('active');
        requestAnimationFrame(() => scr.classList.add('open'));
        
        const cid = [myId, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).limitToLast(30).on('value', snap => {
            const box = document.getElementById('chat-msgs');
            let msgHtml = '';
            snap.forEach(m => {
                const d = m.val();
                msgHtml += `<div class="bubble ${d.f === myId ? 'me' : 'he'}">${d.x}</div>`;
            });
            box.innerHTML = msgHtml;
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() {
        const scr = document.getElementById('scr-chat');
        scr.classList.remove('open');
        setTimeout(() => scr.classList.remove('active'), 300);
    }

    function sendMsg() {
        const inp = document.getElementById('m-input');
        if(!inp.value.trim()) return;
        const cid = [myId, selId].sort().join('_');
        db.ref('msgs/' + cid).push({ f: myId, x: inp.value, t: Date.now() });
        inp.value = '';
    }
</script>
</body>
</html>
