<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Elite v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #111b21; --header: #202c33; --accent: #00a2ff; --bg: #0b141a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #e9edef; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 400px; height: 100vh; background: var(--bg); position: relative; display: flex; flex-direction: column; }
        @media (min-height: 700px) { .app { height: 680px; border-radius: 15px; border: 1px solid #2a3942; } }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; background: var(--bg); z-index: 10; }
        .active { display: flex; }
        
        /* HEADER */
        .header { background: var(--header); height: 60px; padding: 0 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a3942; flex-shrink: 0; }
        .header h2 { font-size: 18px; flex: 1; }
        .btn-icon { color: #8696a0; font-size: 20px; cursor: pointer; padding: 5px; }

        /* LISTS */
        .scroll-area { flex: 1; overflow-y: auto; }
        .item { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c222d; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #394145; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; }
        .online { width: 12px; height: 12px; background: #00af9c; border: 2px solid var(--bg); border-radius: 50%; position: absolute; bottom: 0; right: 0; }

        /* PROFILE SCREEN */
        .profile-box { padding: 30px 20px; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; background: #394145; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid var(--accent); }
        input { width: 100%; background: #2a3942; border: 1px solid #3b4a54; padding: 12px; border-radius: 8px; color: white; margin-bottom: 15px; outline: none; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* CHAT */
        #scr-chat { transform: translateX(100%); transition: 0.3s; z-index: 30; }
        #scr-chat.open { transform: translateX(0); }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; position: relative; }
        .me { background: #005c4b; align-self: flex-end; }
        .he { background: #202c33; align-self: flex-start; }

        /* AUTH */
        .auth-screen { justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-auth" class="screen auth-screen">
        <h1 style="color:var(--accent); margin-bottom:30px;">MilkyWay Elite</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn-save" onclick="handleAuth(true)">ВОЙТИ</button>
        <p onclick="handleAuth(false)" style="margin-top:15px; font-size:13px; color:#8696a0; cursor:pointer;">Нет аккаунта? Регистрация</p>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div class="avatar" onclick="showScreen('scr-profile')">👤</div>
            <h2>Чаты</h2>
            <i class="fas fa-ellipsis-v btn-icon" onclick="showScreen('scr-profile')"></i>
        </div>
        <div id="contact-list" class="scroll-area"></div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header">
            <i class="fas fa-arrow-left btn-icon" onclick="showScreen('scr-main')"></i>
            <h2>Профиль</h2>
        </div>
        <div class="profile-box">
            <div class="profile-avatar">👤</div>
            <p style="color:#8696a0; margin-bottom:10px; font-size:12px;">Ваше имя в поиске:</p>
            <input type="text" id="prof-name" placeholder="Введите имя">
            <button class="btn-save" onclick="saveProfile()">СОХРАНИТЬ</button>
            <button onclick="firebase.auth().signOut()" style="margin-top:30px; background:none; border:1px solid #ea0038; color:#ea0038; padding:10px; width:100%; border-radius:8px; cursor:pointer;">ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header">
            <i class="fas fa-arrow-left btn-icon" onclick="closeChat()"></i>
            <div class="avatar" style="width:35px; height:35px;">👤</div>
            <div style="flex:1"><b id="chat-user-name">Загрузка...</b></div>
        </div>
        <div id="chat-msgs" class="msgs"></div>
        <div class="header" style="background:var(--bg); border-top:1px solid #2a3942;">
            <input type="text" id="m-inp" placeholder="Сообщение" style="margin:0; border-radius:20px;">
            <i class="fas fa-paper-plane" style="color:var(--accent); cursor:pointer;" onclick="send()"></i>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let currentChatId = null;

    // --- НАВИГАЦИЯ ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- АВТОРИЗАЦИЯ ---
    async function handleAuth(login) {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
        try {
            if(login) await auth.signInWithEmailAndPassword(e, p);
            else {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + res.user.uid).set({ name: e.split('@')[0], email: e, status: 'online' });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            showScreen('scr-main');
            db.ref('users/' + u.uid).on('value', s => { 
                if(s.val()) document.getElementById('prof-name').value = s.val().name || ''; 
            });
            db.ref('users/' + u.uid + '/status').set('online');
            db.ref('users/' + u.uid + '/status').onDisconnect().set('offline');
            loadContacts();
        } else showScreen('scr-auth');
    });

    // --- ПРОФИЛЬ ---
    function saveProfile() {
        const newName = document.getElementById('prof-name').value;
        if(!newName) return alert("Введите имя");
        db.ref('users/' + auth.currentUser.uid).update({ name: newName })
          .then(() => alert("Сохранено!"));
    }

    // --- КОНТАКТЫ ---
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contact-list'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    const d = u.val();
                    const name = d.name || d.email || "Аноним";
                    list.innerHTML += `
                    <div class="item" onclick="openChat('${u.key}','${name}')">
                        <div class="avatar">👤 ${d.status==='online'?'<div class="online"></div>':''}</div>
                        <div><b>${name}</b><br><small style="color:#8696a0">${d.status==='online'?'в сети':'не в сети'}</small></div>
                    </div>`;
                }
            });
        });
    }

    // --- ЧАТ ---
    function openChat(id, name) {
        currentChatId = id;
        document.getElementById('chat-user-name').innerText = name;
        const scrChat = document.getElementById('scr-chat');
        scrChat.classList.add('active', 'open');
        
        const cid = [auth.currentUser.uid, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-msgs'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="msg ${d.f === auth.currentUser.uid ? 'me' : 'he'}">${d.t}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }

    function send() {
        const txt = document.getElementById('m-inp').value; if(!txt) return;
        const cid = [auth.currentUser.uid, currentChatId].sort().join('_');
        db.ref('msgs/' + cid).push({ f: auth.currentUser.uid, t: txt, ts: Date.now() });
        document.getElementById('m-inp').value = '';
    }
</script>
</body>
</html>
