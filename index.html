<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Final Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0e14; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app { width: 350px; height: 600px; background: #141923; border: 1px solid #1f2a3d; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; }
        .active { display: flex; }
        .logo { font-size: 28px; color: #00a2ff; text-align: center; margin: 40px 0; font-weight: bold; }
        input { background: #1c222d; border: 1px solid #30363d; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { background: #00a2ff; border: none; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .user-item { padding: 15px; border-bottom: 1px solid #1f2a3d; cursor: pointer; }
        #chat-view { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #141923; transition: 0.3s; display: flex; flex-direction: column; z-index: 5; }
        #chat-view.open { left: 0; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .m { padding: 8px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .m.me { background: #00a2ff; align-self: flex-end; }
        .m.he { background: #1c222d; align-self: flex-start; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth" class="screen active">
        <div class="logo">MilkyWay</div>
        <input type="email" id="e" placeholder="Почта">
        <input type="password" id="p" placeholder="Пароль (от 6 знаков)">
        <button onclick="sign(true)">ВОЙТИ</button>
        <button onclick="sign(false)" style="background:none; color:#555; font-size:12px;">Создать аккаунт</button>
    </div>

    <div id="main" class="screen" style="padding:0;">
        <div style="padding:15px; border-bottom:1px solid #1f2a3d; text-align:center; color:#00a2ff;">Чаты</div>
        <div id="list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="auth.signOut()" style="background:#ff4b4b; border-radius:0;">ВЫЙТИ</button>
    </div>

    <div id="chat-view">
        <div style="padding:15px; background:#1c222d; display:flex; justify-content:space-between;">
            <span onclick="closeChat()" style="cursor:pointer;">⬅ Назад</span>
            <span id="chat-title"></span>
        </div>
        <div id="msgs" class="messages"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="m-in" placeholder="Сообщение..." style="margin:0;">
            <button onclick="send()" style="width:60px;">➤</button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let curChat = null;

    async function sign(isIn) {
        const mail = document.getElementById('e').value, pass = document.getElementById('p').value;
        try {
            if(isIn) await auth.signInWithEmailAndPassword(mail, pass);
            else {
                const r = await auth.createUserWithEmailAndPassword(mail, pass);
                await db.ref('users/' + r.user.uid).set({ name: mail });
            }
        } catch(e) { alert(e.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('auth').classList.toggle('active', !u);
        document.getElementById('main').classList.toggle('active', !!u);
        if(u) loadUsers();
    });

    function loadUsers() {
        db.ref('users').on('value', s => {
            const l = document.getElementById('list'); l.innerHTML = '';
            s.forEach(user => {
                if(user.key !== auth.currentUser.uid) {
                    l.innerHTML += `<div class="user-item" onclick="openChat('${user.key}','${user.val().name}')">👤 ${user.val().name}</div>`;
                }
            });
        });
    }

    function openChat(id, name) {
        curChat = id; document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-view').classList.add('open');
        const cId = [auth.currentUser.uid, id].sort().join('_');
        db.ref('msgs/' + cId).on('value', s => {
            const mBox = document.getElementById('msgs'); mBox.innerHTML = '';
            s.forEach(m => {
                const isMe = m.val().from === auth.currentUser.uid;
                mBox.innerHTML += `<div class="m ${isMe?'me':'he'}">${m.val().txt}</div>`;
            });
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-view').classList.remove('open'); }

    function send() {
        const t = document.getElementById('m-in').value; if(!t) return;
        const cId = [auth.currentUser.uid, curChat].sort().join('_');
        db.ref('msgs/' + cId).push({ from: auth.currentUser.uid, txt: t });
        document.getElementById('m-in').value = '';
    }
</script>
</body>
</html>
