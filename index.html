<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay: Final Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #020408;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --ai-glow: #00ff88;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- VISUALS & ANIMATIONS --- */
        .comet { width: 35px; height: 35px; background: linear-gradient(45deg, var(--accent), var(--nebula)); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px var(--accent); } 50% { transform: scale(1.1); box-shadow: 0 0 25px var(--nebula); } }

        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 50; }
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; }
        .active { display: flex; }

        /* --- CHAT --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover; }
        
        .bubble { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; animation: slideIn 0.2s ease; word-wrap: break-word; }
        .m-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 2px; }
        .m-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .m-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }

        /* --- NAV --- */
        .nav { height: 75px; background: #080a0f; border-top: 1px solid var(--border); display: flex; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-t { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8696a0; gap: 5px; cursor: pointer; font-size: 11px; }
        .nav-t.active { color: var(--accent); }

        .cosmo-input { width: 100%; padding: 12px 15px; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; margin-bottom: 10px; }
        .ava { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; flex-shrink: 0; }
        .ava img { width: 100%; height: 100%; object-fit: cover; }
        .btn-prime { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 85px; }
        .item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <center>
            <div class="comet" style="margin-bottom: 20px;"><i class="fas fa-meteor"></i></div>
            <h2 style="color:var(--accent); margin-bottom:30px;">MILKYWAY</h2>
        </center>
        <div id="auth-box">
            <input type="email" id="reg-email" class="cosmo-input" placeholder="Космо-почта">
            <button onclick="step1Verify()" class="btn-prime">ПОЛУЧИТЬ КОД (ССЫЛКУ)</button>
        </div>
        <div id="pass-box" style="display:none; margin-top:20px;">
            <input type="password" id="reg-pass" class="cosmo-input" placeholder="Введите пароль">
            <button onclick="step2Login()" class="btn-prime">ВХОД / РЕГИСТРАЦИЯ</button>
        </div>
        <div id="auth-info" style="color:var(--ai-glow); font-size:12px; margin-top:15px; text-align:center;"></div>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="comet"><i class="fas fa-meteor"></i></div>
                    <b style="color:var(--accent); letter-spacing: 1px;">MILKYWAY</b>
                </div>
                <div style="display:flex; gap:18px; align-items:center;">
                    <i class="fas fa-robot" onclick="openChat('gemini_ai', 'Gemini AI')" style="color:var(--ai-glow); cursor:pointer; font-size:20px;"></i>
                    <i class="fas fa-cog" onclick="showSettings()" style="color:#8696a0; cursor:pointer; font-size:20px;"></i>
                </div>
            </div>
            <div style="margin-top:15px; display:flex; gap:8px;">
                <input type="text" id="universalSearch" class="cosmo-input" style="margin:0; flex:1;" placeholder="Поиск по ID или Email...">
                <button onclick="runGlobalSearch()" style="background:var(--accent); border:none; padding:0 15px; border-radius:10px;"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div id="view-chats" class="scroller"></div>
        <div id="view-contacts" class="scroller" style="display:none;"></div>
        <div id="view-calls" class="scroller" style="display:none; text-align:center; padding-top:50px; color:#8696a0;">Эфир пуст</div>
        <div id="view-status" class="scroller" style="display:none; text-align:center; padding-top:50px;">
            <i class="fas fa-satellite-dish" style="font-size:40px; color:var(--accent); animation: pulse 2s infinite;"></i>
            <p style="color:#8696a0; margin-top:15px;">Системы в норме</p>
        </div>

        <nav class="nav">
            <div class="nav-t active" onclick="tab('chats', this)"><i class="fas fa-comment"></i><span>Чаты</span></div>
            <div class="nav-t" onclick="tab('contacts', this)"><i class="fas fa-user-astronaut"></i><span>Контакты</span></div>
            <div class="nav-t" onclick="tab('calls', this)"><i class="fas fa-phone"></i><span>Звонки</span></div>
            <div class="nav-t" onclick="tab('status', this)"><i class="fas fa-star"></i><span>Статус</span></div>
        </nav>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer; font-size:18px;"></i>
            <div id="c-ava" class="ava" style="width:35px; height:35px;"></div>
            <div style="flex:1"><b id="c-name"></b></div>
            <i class="fas fa-video" style="color:var(--accent)"></i>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div style="padding:15px; background:#0a0f19; display:flex; gap:10px; align-items:center;">
            <label for="f-up" style="cursor:pointer; color:#8696a0;"><i class="fas fa-paperclip" style="font-size:20px;"></i></label>
            <input type="file" id="f-up" style="display:none;" onchange="handleFileUpload(this)">
            <input type="text" id="msg-input" class="cosmo-input" style="margin:0; flex:1; border-radius:25px;" placeholder="Сообщение...">
            <button class="ava" style="background:var(--accent); border:none; color:#000;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="scr-settings" class="screen" style="z-index:1100; background:#05070c;">
        <div class="header"><i class="fas fa-arrow-left" onclick="hideSettings()"></i> <b style="margin-left:10px;">МОЙ ПРОФИЛЬ</b></div>
        <div class="scroller" style="padding:25px; text-align:center;">
            <p id="display-id" style="font-size:11px; color:var(--accent); margin-bottom:20px; opacity:0.8;"></p>
            <input type="text" id="set-name" class="cosmo-input" placeholder="Имя Фамилия">
            <button onclick="saveMe()" class="btn-prime">ОБНОВИТЬ ДАННЫЕ</button>
            <button onclick="auth.signOut()" style="margin-top:40px; color:var(--danger); background:none; border:none;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE ---
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();

    let myId = null, selId = null, activeTab = 'chats', msgList = null;

    // --- AUTH FLOW (Email Verification) ---
    async function step1Verify() {
        const email = document.getElementById('reg-email').value;
        if(!email) return;
        document.getElementById('pass-box').style.display = 'block';
        document.getElementById('auth-info').innerText = "Введите пароль. Если вы новый пользователь, подтвердите почту после входа.";
    }

    async function step2Login() {
        const e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value;
        try {
            let res;
            try { res = await auth.signInWithEmailAndPassword(e, p); }
            catch { 
                res = await auth.createUserWithEmailAndPassword(e, p);
                db.ref('users/' + res.user.uid).set({ name: 'Пилот', email: e, ava: '' });
            }
            if(!res.user.emailVerified) {
                await res.user.sendEmailVerification();
                alert("Ссылка для подтверждения отправлена на почту!");
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) {
            myId = u.uid;
            document.getElementById('display-id').innerText = "ВАШ ID: " + myId;
            setupNotifications();
            syncGalacticData();
        }
    });

    // --- NOTIFICATIONS ---
    function setupNotifications() {
        if ("Notification" in window) Notification.requestPermission();
    }

    // --- DATA SYNC & PINNING ---
    function syncGalacticData() {
        db.ref('active_dialogues/' + myId).on('value', async snap => {
            if(activeTab !== 'chats') return;
            const container = document.getElementById('view-chats');
            container.innerHTML = '';
            let items = [];
            snap.forEach(c => { items.push({id: c.key, t: c.val()}); });
            items.sort((a,b) => b.t - a.t);

            for(let item of items) {
                const u = (await db.ref('users/'+item.id).once('value')).val() || (item.id === 'gemini_ai' ? {name:'Gemini AI', email:'AI System'} : null);
                if(u) container.innerHTML += renderUser(item.id, u, false);
            }
        });
    }

    function renderUser(id, d, isSearch) {
        return `
        <div class="item">
            <div class="ava" onclick="openChat('${id}','${d.name}')">
                ${d.ava ? `<img src="${d.ava}">` : '<i class="fas fa-user-astronaut"></i>'}
            </div>
            <div style="flex:1" onclick="openChat('${id}','${d.name}')">
                <b>${d.name}</b><br><small style="color:#8696a0">${d.email || 'Система'}</small>
            </div>
            ${isSearch ? `<i class="fas fa-user-plus" onclick="toContacts('${id}')" style="color:var(--accent); font-size:20px;"></i>` : ''}
        </div>`;
    }

    // --- SEARCH (ID & EMAIL) ---
    function runGlobalSearch() {
        const q = document.getElementById('universalSearch').value.trim();
        if(!q) return;
        const container = document.getElementById('view-chats');
        container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--accent);">Сканирование...</p>';

        db.ref('users').once('value', snap => {
            container.innerHTML = '';
            let found = false;
            snap.forEach(u => {
                const d = u.val();
                if(u.key === q || d.email === q) {
                    container.innerHTML += renderUser(u.key, d, true);
                    found = true;
                }
            });
            if(!found) container.innerHTML = '<p style="text-align:center; padding:20px;">Пилот не найден</p>';
        });
    }

    function toContacts(id) {
        db.ref('contacts/' + myId + '/' + id).set(true);
        alert("Добавлено в контакты!");
    }

    // --- MESSAGING ---
    function openChat(id, name) {
        selId = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('scr-chat').classList.add('open');
        document.getElementById('c-ava').innerHTML = '<i class="fas fa-user-astronaut"></i>';

        const cid = [myId, id].sort().join('_');
        if(msgList) db.ref('msgs/'+msgList).off();
        msgList = cid;

        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const status = d.s === 2 ? '**' : '*';
                
                let content = d.type === 'file' ? 
                    `<a href="${d.x}" download="file" style="color:var(--accent); text-decoration:none;"><i class="fas fa-file-download"></i> Файл</a>` : d.x;

                box.innerHTML += `
                <div class="bubble ${isMe?'m-me':'m-he'}">
                    ${content}
                    <div class="m-meta">${time} <span>${isMe ? status : ''}</span></div>
                </div>`;

                if(!isMe && d.s === 1) db.ref('msgs/'+cid+'/'+m.key).update({s:2});
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        pushToFirebase(inp.value, 'text');
        inp.value = '';
    }

    function handleFileUpload(input) {
        const file = input.files[0];
        if(!file) return;
        if(file.size > 20 * 1024 * 1024) { alert("Предел 20МБ!"); return; }
        const reader = new FileReader();
        reader.onload = (e) => pushToFirebase(e.target.result, 'file');
        reader.readAsDataURL(file);
    }

    function pushToFirebase(val, type) {
        const cid = [myId, selId].sort().join('_');
        const now = Date.now();
        db.ref('msgs/'+cid).push({ f: myId, x: val, t: now, s: 1, type: type });
        db.ref('active_dialogues/'+myId+'/'+selId).set(now);
        db.ref('active_dialogues/'+selId+'/'+myId).set(now);
        
        if(selId === 'gemini_ai') triggerGemini(val, cid);
    }

    // --- GEMINI AI (ROBOT) ---
    function triggerGemini(text, cid) {
        setTimeout(() => {
            const now = Date.now();
            const reply = "Сигнал получен. Я на связи. Чем могу помочь, Командир?";
            db.ref('msgs/'+cid).push({ f: 'gemini_ai', x: reply, t: now, s: 2, type: 'text' });
        }, 1000);
    }

    // --- TABS & UI ---
    function tab(name, el) {
        activeTab = name;
        document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        ['chats','contacts','calls','status'].forEach(v => document.getElementById('view-'+v).style.display = 'none');
        document.getElementById('view-'+name).style.display = 'block';
        if(name === 'chats') syncGalacticData();
    }

    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }
    function showSettings() { document.getElementById('scr-settings').classList.add('active'); }
    function hideSettings() { document.getElementById('scr-settings').classList.remove('active'); }
    function saveMe() {
        const n = document.getElementById('set-name').value;
        db.ref('users/'+myId).update({name: n}).then(() => hideSettings());
    }
</script>
</body>
</html>
