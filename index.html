<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Classic 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #0b0e14; --panel: #161b22; --border: #30363d; --text: #e6edf3; --wa-green: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: #010409; color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; height: 100vh; }

        /* Центрированный мобильный контейнер */
        .app-window {
            width: 100%; max-width: 450px; height: 100%; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .active { display: flex; }

        /* Шапка */
        header { 
            padding: 15px 20px; background: var(--panel); display: flex; 
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        /* Список чатов */
        .chat-item {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .chat-item:hover { background: #1c2128; }
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
        }

        /* Окно сообщений */
        #message-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0d1117; }
        .bubble { 
            max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative;
            word-wrap: break-word; line-height: 1.4;
        }
        .bubble.my { align-self: flex-end; background: #056162; color: white; border-top-right-radius: 2px; }
        .bubble.their { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
        
        .status-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 4px; opacity: 0.6; }
        .ticks { color: var(--accent); } /* Галочки */

        /* Ввод как в WhatsApp */
        .input-bar { 
            padding: 10px; background: var(--panel); display: flex; align-items: center; gap: 10px;
            border-top: 1px solid var(--border);
        }
        .msg-input { 
            flex: 1; background: var(--bg); border: none; padding: 10px 15px; 
            border-radius: 25px; color: white; outline: none;
        }

        /* FAB кнопка */
        .fab {
            position: absolute; bottom: 20px; right: 20px; width: 55px; height: 55px;
            border-radius: 50%; background: var(--accent); display: flex;
            align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer; z-index: 5;
        }

        /* Аудио-плеер */
        .audio-msg { display: flex; align-items: center; gap: 10px; min-width: 150px; }

        /* Авторизация */
        #auth-screen { justify-content: center; padding: 40px; text-align: center; background: var(--bg); }
        .auth-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-window">
    
    <div id="screen-auth" class="screen active">
        <h1 style="color: var(--accent); font-size: 40px; margin-bottom: 40px;">MilkyWay</h1>
        <input type="email" id="email" class="msg-input" placeholder="Email" style="margin-bottom: 10px; width: 100%;">
        <input type="password" id="pass" class="msg-input" placeholder="Пароль" style="margin-bottom: 10px; width: 100%;">
        <button class="auth-btn" onclick="handleAuth('login')">ВОЙТИ</button>
        <p onclick="handleAuth('reg')" style="margin-top: 20px; font-size: 12px; color: #8b949e; cursor: pointer;">Создать аккаунт пилота</p>
    </div>

    <div id="screen-list" class="screen">
        <header>
            <span style="font-weight: bold; font-size: 20px;">MilkyWay</span>
            <div style="display: flex; gap: 15px;">
                <i class="fas fa-search" onclick="findUser()"></i>
                <i class="fas fa-ellipsis-v" onclick="auth.signOut()"></i>
            </div>
        </header>
        <div id="chats-container" style="flex:1; overflow-y:auto;">
            </div>
        <div class="fab" onclick="findUser()"><i class="fas fa-comment-medical"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-arrow-left" onclick="showScreen('screen-list')"></i>
                <div class="avatar" id="chat-icon" style="width:35px; height:35px; font-size:14px;">?</div>
                <div style="line-height:1.1;">
                    <div id="chat-name" style="font-weight:bold; font-size:15px;">Загрузка...</div>
                    <small style="color:var(--wa-green); font-size:11px;" id="typing-status">в сети</small>
                </div>
            </div>
            <div style="display:flex; gap:18px;">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
            </div>
        </header>
        <div id="message-area"></div>
        <div class="input-bar">
            <i class="fas fa-plus" style="opacity: 0.6;"></i>
            <input type="text" id="msg-input" class="msg-input" placeholder="Сообщение" oninput="sendTyping()">
            <div id="send-btn-container">
                <i class="fas fa-microphone" id="mic-btn" onclick="toggleRecord()" style="color: var(--accent); font-size: 20px;"></i>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();
    let currentUser = null, activeChat = null, mediaRecorder, audioChunks = [];

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    function handleAuth(mode) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(mode === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/' + u.user.uid).set({ email: e, name: e.split('@')[0], status: 'online' });
            db.ref('users_by_email/' + btoa(e).replace(/=/g, "")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) { 
            currentUser = user; 
            showScreen('screen-list'); 
            initChatList(); 
        } else { 
            showScreen('screen-auth'); 
        }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- СПИСОК ЧАТОВ ---
    function initChatList() {
        const container = document.getElementById('chats-container');
        // Общий чат по умолчанию
        container.innerHTML = `
            <div class="chat-item" onclick="openChat('global', 'Общий чат')">
                <div class="avatar" style="background:#ff9500">🌍</div>
                <div style="flex:1">
                    <div style="font-weight:bold">Общий чат</div>
                    <small style="color:#8b949e">Все пилоты здесь</small>
                </div>
            </div>
        `;

        db.ref('users/' + currentUser.uid + '/contacts').on('value', snap => {
            snap.forEach(c => {
                const uid = c.key;
                db.ref('users/' + uid).once('value', uSnap => {
                    const u = uSnap.val();
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => openChat(uid, u.name);
                    div.innerHTML = `<div class="avatar">${u.name[0].toUpperCase()}</div><div><div style="font-weight:bold">${u.name}</div><small>На связи</small></div>`;
                    container.appendChild(div);
                });
            });
        });
    }

    function findUser() {
        const target = prompt("Введите Email пилота:");
        if(!target) return;
        db.ref('users_by_email/' + btoa(target).replace(/=/g, "")).once('value', s => {
            if(s.exists()) {
                db.ref('users/' + currentUser.uid + '/contacts/' + s.val()).set(true);
                openChat(s.val(), target.split('@')[0]);
            } else alert("Пилот не найден в этой галактике");
        });
    }

    // --- ОКНО ЧАТА ---
    function openChat(id, name) {
        activeChat = id === 'global' ? 'global' : [currentUser.uid, id].sort().join("_");
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-icon').innerText = name[0].toUpperCase();
        showScreen('screen-chat');
        listenMessages();
    }

    function listenMessages() {
        const area = document.getElementById('message-area');
        db.ref('messages/' + activeChat).off();
        area.innerHTML = '';
        
        db.ref('messages/' + activeChat).on('child_added', s => {
            const m = s.val();
            const bubble = document.createElement('div');
            bubble.className = `bubble ${m.sender === currentUser.uid ? 'my' : 'their'}`;
            
            if(m.type === 'audio') {
                bubble.innerHTML = `<div class="audio-msg"><i class="fas fa-play"></i><small>Голосовое сообщение</small></div>`;
                bubble.onclick = () => new Audio(m.content).play();
            } else {
                bubble.innerText = m.content;
            }
            
            const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            bubble.innerHTML += `<div class="status-meta">${time} ${m.sender === currentUser.uid ? '<i class="fas fa-check-double ticks"></i>' : ''}</div>`;
            
            area.appendChild(bubble);
            area.scrollTop = area.scrollHeight;
        });
    }

    function send(content, type = 'text') {
        if(!content) return;
        db.ref('messages/' + activeChat).push({
            sender: currentUser.uid,
            content: content,
            type: type,
            time: firebase.database.ServerValue.TIMESTAMP
        });
    }

    // --- ДОП. ФУНКЦИИ (WhatsApp Style) ---
    
    // Переключение иконки отправить/микрофон
    document.getElementById('msg-input').oninput = function() {
        const btn = document.getElementById('send-btn-container');
        if(this.value.length > 0) {
            btn.innerHTML = `<i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--accent); font-size:20px;"></i>`;
        } else {
            btn.innerHTML = `<i class="fas fa-microphone" id="mic-btn" onclick="toggleRecord()" style="color:var(--accent); font-size:20px;"></i>`;
        }
    };

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        send(inp.value);
        inp.value = '';
        inp.oninput();
    }

    // Голосовые сообщения
    async function toggleRecord() {
        const mic = document.getElementById('mic-btn');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            mic.style.color = 'red';
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const name = Date.now() + '.webm';
                const sRef = storage.ref('audio/' + name);
                await sRef.put(blob);
                const url = await sRef.getDownloadURL();
                send(url, 'audio');
                mic.style.color = var(--accent);
            };
        } else {
            mediaRecorder.stop();
            mic.style.color = var(--accent);
        }
    }

    // Индикатор "печатает..."
    function sendTyping() {
        db.ref('typing/' + activeChat + '/' + currentUser.uid).set(true);
        setTimeout(() => db.ref('typing/' + activeChat + '/' + currentUser.uid).remove(), 2000);
    }

    // Слушатель Enter
    document.getElementById('msg-input').onkeypress = e => { if(e.key === 'Enter') sendMsg(); };

</script>
</body>
</html>
