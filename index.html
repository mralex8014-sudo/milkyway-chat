<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Ultra Secure 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .app-container { width: 100%; max-width: 450px; background: #0b0e14; display: flex; flex-direction: column; position: relative; border: 1px solid #1c2128; }
        
        /* Авторизация */
        #auth-screen { padding: 40px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; z-index: 200; background: #020408; }
        .auth-input { width: 100%; background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        .btn-main { background: #00a2ff; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Шапка */
        header { padding: 15px; background: #0f172a; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1c2128; }
        .header-icons { display: flex; gap: 20px; color: #8b949e; }
        .header-icons i:hover { color: #00a2ff; cursor: pointer; }

        /* Чат */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: #00a2ff; border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #161b22; border-bottom-left-radius: 2px; }

        /* Футер (Кнопки!) */
        .footer { padding: 15px; background: #0f172a; display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: #00a2ff; width: 45px; height: 45px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Меню */
        #sidebar { position: absolute; left: -100%; top: 0; width: 80%; height: 100%; background: #0b0e14; z-index: 500; transition: 0.3s; padding: 20px; border-right: 1px solid #30363d; }
        .sidebar-open { left: 0 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <h1 style="margin-bottom:20px;">MilkyWay 🌌</h1>
        <input type="email" id="email" class="auth-input" placeholder="Email">
        <input type="password" id="pass" class="auth-input" placeholder="Пароль">
        <button class="btn-main" onclick="authOp('login')">Войти</button>
        <button style="background:none; border:none; color:#8b949e; margin-top:15px;" onclick="authOp('reg')">Регистрация</button>
    </div>

    <div id="sidebar">
        <i class="fas fa-arrow-left" onclick="toggleMenu()" style="cursor:pointer; margin-bottom:20px;"></i>
        <h3>Настройки</h3>
        <p style="margin-top:20px; font-size:12px; color:#8b949e;">Ваш UID:</p>
        <div id="my-uid" style="font-size:11px; background:#161b22; padding:10px; border-radius:8px; cursor:pointer;" onclick="copyUID()">загрузка...</div>
        <button class="btn-main" style="width:100%; margin-top:30px; background:#da3633;" onclick="auth.signOut()">Выйти</button>
    </div>

    <div id="chat-ui" style="display:none; flex-direction:column; height:100%;">
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer;"></i>
            <span id="chat-title">Общий чат</span>
            <div class="header-icons">
                <i class="fas fa-phone"></i>
                <i class="fas fa-video"></i>
            </div>
        </header>

        <div style="padding:10px; background:#161b22; display:flex; gap:5px;">
            <input type="text" id="target-uid" class="auth-input" style="margin:0; padding:8px; font-size:12px;" placeholder="ID друга">
            <button class="btn-main" style="padding:0 15px;" onclick="startPrivate()">Стыковка</button>
        </div>

        <div id="chat-window"></div>

        <div class="footer">
            <i class="fas fa-paperclip" style="color:#8b949e; cursor:pointer;"></i>
            <input type="text" id="msg-input" class="input-box" placeholder="Сообщение...">
            <button class="send-btn" onclick="send()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let user = null;
    let chatId = 'global_public_room';

    function authOp(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e, p).catch(alert);
        else auth.createUserWithEmailAndPassword(e, p).catch(alert);
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('my-uid').innerText = u.uid;
            listen(chatId);
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-ui').style.display = 'none';
        }
    });

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar-open'); }
    function copyUID() { navigator.clipboard.writeText(user.uid); alert("ID скопирован!"); }

    function startPrivate() {
        const target = document.getElementById('target-uid').value.trim();
        if(!target || target === user.uid) return;
        chatId = [user.uid, target].sort().join("_");
        document.getElementById('chat-title').innerText = "🔒 Приватный чат";
        listen(chatId);
    }

    function send() {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        db.ref('chats/' + chatId).push({ u: user.uid, t: txt, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const box = document.getElementById('chat-window');
        db.ref('chats/' + id).off();
        box.innerHTML = '';
        db.ref('chats/' + id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
