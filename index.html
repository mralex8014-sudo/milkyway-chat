<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay Galactic Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #030508;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--space-bg); color: #fff; 
            height: 100dvh; overflow: hidden; display: flex; justify-content: center; 
            background-image: radial-gradient(circle at center, #0a0a1a 0%, #030508 100%);
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: rgba(5, 7, 12, 0.9); display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* ЛОГОТИП С ЭМБЛЕМОЙ */
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .logo-emblem { 
            width: 40px; height: 40px; background: linear-gradient(45deg, var(--accent), var(--nebula));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--accent); } 50% { box-shadow: 0 0 25px var(--accent); } 100% { box-shadow: 0 0 10px var(--accent); } }
        
        .logo-text { font-size: 28px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; }
        .active { display: flex; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(20px); z-index: 50; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

        /* ПОИСК */
        .search-container { background: var(--glass); border-radius: 15px; padding: 8px 15px; display: flex; align-items: center; border: 1px solid var(--border); }
        .search-container input { background: none; border: none; color: #fff; flex: 1; padding: 5px; outline: none; }

        /* НИЖНЯЯ НАВИГАЦИЯ (ФИКС ДЛЯ МОБИЛОК) */
        .bottom-nav {
            height: 75px; background: rgba(5, 7, 12, 0.98); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            position: absolute; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { color: #8696a0; font-size: 11px; text-align: center; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-tab i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-tab.active { color: var(--accent); }

        /* ЧАТ */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.35s ease-out; background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
            background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=2072&auto=format&fit=crop'); /* Млечный путь */
            background-size: cover; background-position: center; position: relative;
        }
        .chat-wallpaper::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 0; }
        .bubble { z-index: 1; padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* ВВОД */
        .chat-input-bar { background: #0a0f19; padding: 12px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .input-pill { flex: 1; background: var(--glass); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        .input-pill input { background: none; border: none; color: #fff; flex: 1; padding: 10px; outline: none; }

        /* КНОПКИ ЗВОНКОВ И МЕНЮ */
        .chat-actions { display: flex; gap: 18px; align-items: center; color: var(--accent); }
        .chat-actions i { cursor: pointer; font-size: 18px; }

        /* DROPDOWN */
        .chat-menu { 
            position: absolute; top: 60px; right: 10px; background: #1a1f2b; border-radius: 12px; 
            width: 200px; display: none; flex-direction: column; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 2000;
        }
        .chat-menu div { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .chat-menu div:hover { background: var(--glass); }

        /* СПИСКИ */
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .user-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .ava-circle { width: 55px; height: 55px; border-radius: 50%; background: #222; object-fit: cover; border: 2px solid var(--accent); }

        /* ВЫЗОВ */
        .call-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(10,15,25,0.95); 
            z-index: 5000; display:none; flex-direction:column; align-items:center; justify-content:center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <div class="logo-box">
            <div class="logo-emblem"><i class="fas fa-meteor"></i></div>
            <span class="logo-text">MILKYWAY</span>
        </div>
        <input type="email" id="email" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:15px;" placeholder="Почта">
        <input type="password" id="pass" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:20px;" placeholder="Пароль">
        <button onclick="authRun(true)" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <p onclick="authRun(false)" style="text-align:center; color:var(--nebula); margin-top:25px; cursor:pointer;">Стать частью галактики</p>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div class="header-top">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="logo-emblem" style="width:25px; height:25px; font-size:12px;"><i class="fas fa-meteor"></i></div>
                    <span class="logo-text" style="font-size:20px;">MilkyWay</span>
                </div>
                <i class="fas fa-ellipsis-v" style="cursor:pointer; color:#8696a0;" onclick="toggleMainDrop()"></i>
                <div id="main-drop" class="chat-menu" style="top:50px;">
                    <div onclick="showSett()"><i class="fas fa-cog"></i> Настройки профиля</div>
                    <div onclick="auth.signOut()"><i class="fas fa-sign-out-alt"></i> Покинуть орбиту</div>
                </div>
            </div>
            <div class="search-container">
                <i class="fas fa-search" style="color:#8696a0;"></i>
                <input type="text" id="mainSearch" placeholder="Поиск пилотов..." oninput="filterList()">
            </div>
        </div>

        <div id="sect-chats" class="scroller">
            <div id="list-target"></div>
        </div>

        <div id="sect-status" class="scroller" style="display:none; padding:40px; text-align:center;">
            <i class="fas fa-circle-notch fa-3x" style="color:var(--nebula); margin-bottom:20px;"></i>
            <p style="color:#8696a0;">Ваши статусы появятся здесь</p>
        </div>

        <div id="sect-calls" class="scroller" style="display:none; padding:40px; text-align:center;">
            <i class="fas fa-phone-alt fa-3x" style="color:var(--accent); margin-bottom:20px;"></i>
            <p style="color:#8696a0;">Нет пропущенных вызовов</p>
        </div>

        <div class="bottom-nav">
            <div class="nav-tab" onclick="nav('status', this)"><i class="fas fa-spinner"></i>Статус</div>
            <div class="nav-tab active" onclick="nav('chats', this)"><i class="fas fa-comment-alt"></i>Чаты</div>
            <div class="nav-tab" onclick="nav('calls', this)"><i class="fas fa-phone"></i>Звонки</div>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px; height:70px;">
            <i class="fas fa-chevron-left" style="color:var(--accent); font-size:22px; cursor:pointer;" onclick="closeChat()"></i>
            <img id="c-ava" class="ava-circle" style="width:40px; height:40px;" src="https://via.placeholder.com/50">
            <div style="flex:1">
                <b id="c-name" style="font-size:16px;">Пилот</b><br>
                <small id="c-status" style="color:var(--accent); font-size:11px;">на связи</small>
            </div>
            <div class="chat-actions">
                <i class="fas fa-phone" onclick="startCall('аудио')"></i>
                <i class="fas fa-video" onclick="startCall('видео')"></i>
                <div style="position:relative">
                    <i class="fas fa-ellipsis-v" onclick="toggleChatMenu()"></i>
                    <div id="chat-drop" class="chat-menu">
                        <div onclick="editContact()"><i class="fas fa-user-edit"></i> Изменить контакт</div>
                        <div onclick="clearHistory()"><i class="fas fa-trash"></i> Очистить историю</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; color:var(--accent);">
                <i class="fas fa-paperclip" style="font-size:20px;"></i>
                <input type="file" hidden id="file-input" onchange="sendFile(this)">
            </label>
            <div class="input-pill">
                <input type="text" id="msg-input" placeholder="Сообщение...">
            </div>
            <i class="fas fa-paper-plane" style="color:var(--accent); font-size:24px;" onclick="sendText()"></i>
        </div>
    </div>

    <div id="call-ui" class="call-overlay">
        <div class="ava-circle" style="width:120px; height:120px; font-size:50px; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">👤</div>
        <h2 id="call-name">Имя</h2>
        <p id="call-type" style="color:var(--accent); margin-top:10px;">Установка связи...</p>
        <div style="margin-top:50px; display:flex; gap:30px;">
            <div onclick="endCall()" style="width:60px; height:60px; background:#ff4757; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-phone-slash"></i></div>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let selId = null, myId = null;

    // --- НАВИГАЦИЯ ---
    function nav(id, el) {
        document.querySelectorAll('.scroller').forEach(s => s.style.display = 'none');
        document.getElementById('sect-' + id).style.display = 'block';
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleMainDrop() { const m = document.getElementById('main-drop'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function toggleChatMenu() { const m = document.getElementById('chat-drop'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }

    // --- AUTH ---
    async function authRun(isLog) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isLog) await auth.signInWithEmailAndPassword(e, p);
            else {
                const r = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + r.user.uid).set({ name: e.split('@')[0], email: e, online: true, ava: '' });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) {
            myId = u.uid;
            db.ref('users/' + u.uid + '/online').set(true);
            db.ref('users/' + u.uid + '/online').onDisconnect().set(false);
            loadUsers();
        }
    });

    // --- СПИСОК ---
    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('list-target'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== myId) {
                    const d = u.val();
                    list.innerHTML += `
                    <div class="user-item" onclick="openChat('${u.key}','${d.name}','${d.ava}')">
                        <div style="position:relative">
                            <img class="ava-circle" src="${d.ava || 'https://via.placeholder.com/50'}">
                            ${d.online ? '<div style="width:12px; height:12px; background:#00ff88; border:2px solid #000; border-radius:50%; position:absolute; bottom:2px; right:2px;"></div>' : ''}
                        </div>
                        <div style="flex:1">
                            <b>${d.name}</b><br>
                            <small style="color:#8696a0">${d.email}</small>
                        </div>
                    </div>`;
                }
            });
        });
    }

    // --- ЧАТ ---
    function openChat(id, name, ava) {
        selId = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/50';
        document.getElementById('scr-chat').classList.add('open', 'active');
        
        const cid = [myId, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let content = d.x;
                if(d.type === 'file') {
                    if(d.fileType.includes('image')) content = `<img src="${d.x}" class="msg-img">`;
                    else content = `<a href="${d.x}" download style="color:var(--accent)">📁 Документ: ${d.fileName}</a>`;
                }
                box.innerHTML += `
                <div class="bubble ${isMe?'msg-me':'msg-he'}">
                    ${content}
                    <div style="font-size:10px; opacity:0.6; text-align:right; margin-top:5px;">${time} ${isMe?'<i class="fas fa-check-double" style="color:#00d2ff"></i>':''}</div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }

    function sendText() {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        saveMsg({ f: myId, x: inp.value, t: Date.now(), type: 'text' });
        inp.value = '';
    }

    function sendFile(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            saveMsg({ 
                f: myId, x: e.target.result, t: Date.now(), 
                type: 'file', fileType: file.type, fileName: file.name 
            });
        };
        reader.readAsDataURL(file);
    }

    function saveMsg(obj) {
        const cid = [myId, selId].sort().join('_');
        db.ref('msgs/' + cid).push(obj);
    }

    // --- ЗВОНКИ ---
    function startCall(type) {
        document.getElementById('call-name').innerText = document.getElementById('c-name').innerText;
        document.getElementById('call-type').innerText = `Межзвездный ${type}вызов...`;
        document.getElementById('call-ui').style.display = 'flex';
    }
    function endCall() { document.getElementById('call-ui').style.display = 'none'; }

    // --- ДОП ФУНКЦИИ ---
    function editContact() {
        const newName = prompt("Введите новое имя пилота:");
        if(newName) document.getElementById('c-name').innerText = newName;
        toggleChatMenu();
    }
</script>
</body>
</html>
