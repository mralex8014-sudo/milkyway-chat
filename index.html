<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Messenger 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00a2ff; 
            --bg: #0b0e14; 
            --sidebar-bg: #161b22; 
            --chat-bg: #0d1117;
            --border: #30363d; 
            --text: #e6edf3; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #010409; 
            color: var(--text); 
            font-family: -apple-system, sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* Общий каркас */
        .messenger-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Боковая панель */
        aside {
            width: 350px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 27, 34, 0.8);
        }

        .search-area { padding: 15px; }
        .search-box {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        /* Список контактов */
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }
        .contact-item:hover, .contact-item.active { background: #1c2128; }
        .contact-avatar {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Основная зона чата */
        main {
            flex: 1;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8b949e;
        }

        #chat-active {
            display: none; /* Скрыт пока не выбран чат */
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            background: var(--sidebar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 50% 50%, #161b22 1%, transparent 1%);
            background-size: 40px 40px;
        }

        /* Пузыри сообщений */
        .msg {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            position: relative;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.my { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg.their { align-self: flex-start; background: var(--sidebar-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; margin-top: 5px; opacity: 0.7; display: block; text-align: right; }

        /* Ввод сообщения */
        .chat-input-area {
            padding: 20px 30px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-field {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        /* Кнопки */
        .btn-icon {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(0, 162, 255, 0.1); }

        /* Экран авторизации - оверлей */
        #screen-auth {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--sidebar-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Скрытые элементы */
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            aside { width: 100%; }
            main { display: none; }
            .mobile-back { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="screen-auth">
        <div class="auth-card">
            <h1 style="color: var(--accent); margin-bottom: 30px;">MilkyWay 🌌</h1>
            <input type="email" id="email" class="search-box" style="margin-bottom:15px;" placeholder="Ваш Email">
            <input type="password" id="pass" class="search-box" style="margin-bottom:20px;" placeholder="Пароль">
            <button onclick="authOp('login')" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">Войти в систему</button>
            <p onclick="authOp('reg')" style="margin-top:20px; color:#8b949e; cursor:pointer; font-size:13px;">Регистрация пилота</p>
        </div>
    </div>

    <div class="messenger-wrapper">
        <aside id="sidebar-panel">
            <header>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="contact-avatar" id="user-initial" style="width:32px; height:32px; font-size:14px;">?</div>
                    <span style="font-weight:bold;">Чаты</span>
                </div>
                <button class="btn-icon" onclick="auth.signOut()"><i class="fas fa-sign-out-alt"></i></button>
            </header>
            
            <div class="search-area">
                <input type="text" class="search-box" placeholder="Поиск пилота по UID..." onkeypress="if(event.key==='Enter') startChatFromSearch(this.value)">
            </div>

            <div class="contact-list" id="contact-list">
                </div>
        </aside>

        <main>
            <div id="chat-placeholder">
                <i class="fas fa-rocket" style="font-size: 50px; margin-bottom: 20px; opacity: 0.2;"></i>
                <p>Выберите канал связи для начала стыковки</p>
            </div>

            <div id="chat-active">
                <div class="chat-header">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <button class="btn-icon mobile-back hidden" onclick="closeChatMobile()"><i class="fas fa-arrow-left"></i></button>
                        <div class="contact-avatar" id="active-avatar" style="width:40px; height:40px;">?</div>
                        <div>
                            <div id="active-name" style="font-weight:bold;">Пилот</div>
                            <div style="font-size:11px; color:#3fb950;">Канал защищен</div>
                        </div>
                    </div>
                    <div>
                        <button class="btn-icon"><i class="fas fa-phone"></i></button>
                        <button class="btn-icon"><i class="fas fa-video"></i></button>
                    </div>
                </div>

                <div id="messages"></div>

                <div class="chat-input-area">
                    <label for="file-input"><i class="fas fa-paperclip btn-icon"></i></label>
                    <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
                    <input type="text" id="msg-input" class="input-field" placeholder="Введите ваше сообщение...">
                    <button class="btn-icon" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();
    let user = null, activeChatId = '';

    // Авторизация
    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users_by_email/' + btoa(e).replace(/=/g, "")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { 
            user = u; 
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('user-initial').innerText = u.email[0].toUpperCase();
            loadContacts();
        } else { 
            document.getElementById('screen-auth').classList.remove('hidden'); 
        }
    });

    // Контакты
    function loadContacts() {
        db.ref('users/' + user.uid + '/contacts').on('value', snap => {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const cid = child.key;
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(cid);
                div.innerHTML = `
                    <div class="contact-avatar">${cid[0].toUpperCase()}</div>
                    <div style="overflow:hidden">
                        <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">Пилот ${cid.substring(0,8)}</div>
                        <div style="font-size:12px; color:#8b949e;">Нажмите для связи</div>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    function startChatFromSearch(uid) {
        if(!uid || uid === user.uid) return;
        db.ref('users/' + user.uid + '/contacts/' + uid).set(true);
        openChat(uid);
    }

    // Чат
    function openChat(contactUid) {
        activeChatId = [user.uid, contactUid].sort().join("_");
        document.getElementById('chat-placeholder').style.display = 'none';
        document.getElementById('chat-active').style.display = 'flex';
        document.getElementById('active-name').innerText = "Пилот: " + contactUid.substring(0,10);
        document.getElementById('active-avatar').innerText = contactUid[0].toUpperCase();
        
        if(window.innerWidth <= 768) {
            document.getElementById('sidebar-panel').classList.add('hidden');
            document.querySelector('main').style.display = 'flex';
        }

        listen(activeChatId);
    }

    function listen(chatId) {
        const m = document.getElementById('messages');
        db.ref('chats/' + chatId).off();
        m.innerHTML = '';
        db.ref('chats/' + chatId).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            
            if(d.type === 'image') div.innerHTML = `<img src="${d.t}" style="max-width:100%; border-radius:10px;">`;
            else div.innerText = d.t;
            
            div.innerHTML += `<span class="msg-time">${new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t) return;
        db.ref('chats/' + activeChatId).push({
            u: user.uid,
            t: t,
            type: 'text',
            time: firebase.database.ServerValue.TIMESTAMP
        });
        document.getElementById('msg-input').value = '';
    }

    function uploadFile(input) {
        const file = input.files[0];
        if(!file) return;
        const ref = storage.ref(`uploads/${activeChatId}/${Date.now()}_${file.name}`);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref('chats/' + activeChatId).push({
                u: user.uid,
                t: url,
                type: file.type.startsWith('image') ? 'image' : 'file',
                time: firebase.database.ServerValue.TIMESTAMP
            });
        });
    }

    function closeChatMobile() {
        document.getElementById('sidebar-panel').classList.remove('hidden');
        document.querySelector('main').style.display = 'none';
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
