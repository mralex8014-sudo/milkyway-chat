<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --space-dark: #05070a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--space-dark); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05070a 100%);
        }

        /* Общий контейнер */
        .app-shell { 
            width: 100%; max-width: 480px; height: 100%; background: rgba(10, 15, 25, 0.8);
            position: relative; display: flex; flex-direction: column; 
            border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 10; background: inherit; }
        .active { display: flex; }

        /* HEADER */
        .header { 
            height: 70px; padding: 0 20px; display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); flex-shrink: 0; z-index: 50;
        }
        .header h1 { 
            font-size: 20px; flex: 1; letter-spacing: 2px; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* АВАТАРЫ */
        .ava { 
            width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            position: relative; border: 2px solid var(--glass-border); transition: 0.3s;
        }
        .ava:hover { transform: scale(1.05); border-color: var(--neon-blue); }
        .status-dot { 
            width: 12px; height: 12px; background: #00ff88; border: 2px solid var(--space-dark);
            border-radius: 50%; position: absolute; bottom: 0; right: 0; box-shadow: 0 0 10px #00ff88;
        }

        /* СПИСОК ЧАТОВ */
        .chat-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .user-card { 
            padding: 15px 20px; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .user-card:hover { background: rgba(255,255,255,0.05); }
        .user-card b { display: block; font-size: 16px; margin-bottom: 2px; }
        .user-card span { font-size: 13px; color: #8696a0; }

        /* ОКНО ЧАТА */
        #scr-chat { transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        #scr-chat.open { transform: translateX(0); }
        
        .chat-bg { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-color: rgba(5, 7, 10, 0.9);
        }

        .bubble { 
            padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14.5px; 
            position: relative; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .me { background: var(--neon-blue); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .he { background: var(--glass); color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--glass-border); }
        .b-time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        /* ВВОД */
        .input-bar { 
            padding: 15px; display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border);
        }
        .input-bar input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; transition: 0.3s;
        }
        .input-bar input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }

        /* ОВЕРЛЕИ (МЕНЮ И ПРОФИЛЬ) */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--space-dark); z-index: 200; display: none; flex-direction: column;
        }
        .overlay.active { display: flex; animation: fadeIn 0.3s; }
        .p-content { padding: 40px 25px; text-align: center; }
        .p-big-ava { 
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            border: 4px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .btn-main { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; background: var(--neon-blue); color: #000;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="scr-auth" class="screen active" style="justify-content: center; padding: 30px;">
        <h1 style="font-size: 40px; text-align: center; color: var(--neon-blue); margin-bottom: 40px; letter-spacing: 5px;">MILKYWAY</h1>
        <input type="email" id="email" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; color:#fff; margin-bottom:15px;" placeholder="Email">
        <input type="password" id="pass" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; color:#fff; margin-bottom:20px;" placeholder="Пароль">
        <button class="btn-main" onclick="authGo(true)">ВОЙТИ</button>
        <p onclick="authGo(false)" style="text-align:center; margin-top:20px; color:var(--neon-blue); cursor:pointer; font-size:14px;">Создать звездный аккаунт</p>
    </div>

    <div id="scr-list" class="screen">
        <div class="header">
            <div class="ava" onclick="showOverlay('ov-me')">👤</div>
            <h1>MILKYWAY</h1>
            <i class="fas fa-cog" style="color:var(--neon-blue); cursor:pointer; font-size:20px;" onclick="showOverlay('ov-me')"></i>
        </div>
        <div id="user-list-box" class="chat-list"></div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header">
            <i class="fas fa-chevron-left" style="cursor:pointer; color:var(--neon-blue);" onclick="closeChat()"></i>
            <div class="ava" style="width:38px; height:38px;" onclick="viewOpponent()">👤</div>
            <div style="flex:1" onclick="viewOpponent()">
                <b id="chat-user-name" style="font-size:16px;">Чат</b><br>
                <small id="chat-typing" style="color:var(--neon-blue); font-size:11px; font-weight:bold;"></small>
            </div>
        </div>
        <div id="msg-box" class="chat-bg"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Введите сообщение..." oninput="handleTyping()">
            <i class="fas fa-paper-plane" style="color:var(--neon-blue); font-size:22px; cursor:pointer;" onclick="send()"></i>
        </div>
    </div>

    <div id="ov-me" class="overlay">
        <div class="header">
            <i class="fas fa-times" style="color:var(--neon-blue); cursor:pointer;" onclick="hideOverlay('ov-me')"></i>
            <h1>ПРОФИЛЬ</h1>
        </div>
        <div class="p-content">
            <div class="p-big-ava">👤</div>
            <p style="color:#8696a0; margin-bottom:10px;">Ваш позывной в системе:</p>
            <input type="text" id="my-name-field" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:10px; color:#fff; margin-bottom:20px;" placeholder="Ваше имя">
            <button class="btn-main" onclick="updateName()">ОБНОВИТЬ</button>
            <button onclick="auth.signOut()" style="margin-top:20px; background:none; border:1px solid #ff4757; color:#ff4757;" class="btn-main">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>
    </div>

    <div id="ov-op" class="overlay">
        <div class="header">
            <i class="fas fa-times" style="color:var(--neon-blue); cursor:pointer;" onclick="hideOverlay('ov-op')"></i>
            <h1>ИНФОРМАЦИЯ</h1>
        </div>
        <div class="p-content">
            <div class="p-big-ava">👤</div>
            <h2 id="op-name-display" style="color:var(--neon-blue); margin-bottom:5px;">Имя</h2>
            <p id="op-email-display" style="color:#8696a0; margin-bottom:20px;"></p>
            <div id="op-status-info" style="font-weight:bold; letter-spacing:1px;"></div>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let currentPeerId = null, tTimer, peerData = {};

    function showOverlay(id) { document.getElementById(id).classList.add('active'); }
    function hideOverlay(id) { document.getElementById(id).classList.remove('active'); }

    async function authGo(isLogin) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(e, p);
            else {
                const r = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + r.user.uid).set({ name: e.split('@')[0], email: e, status: 'online' });
            }
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-list').classList.toggle('active', !!u);
        if(u) {
            db.ref('users/' + u.uid + '/status').set('online');
            db.ref('users/' + u.uid + '/status').onDisconnect().set('offline');
            db.ref('users/' + u.uid).on('value', s => { if(s.val()) document.getElementById('my-name-field').value = s.val().name || ''; });
            loadUsers();
        }
    });

    function updateName() {
        const n = document.getElementById('my-name-field').value;
        db.ref('users/' + auth.currentUser.uid).update({ name: n }).then(() => alert("Имя обновлено!"));
    }

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list-box'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    const d = u.val();
                    list.innerHTML += `
                    <div class="user-card" onclick="openChat('${u.key}','${d.name || d.email}')">
                        <div class="ava">👤 ${d.status==='online'?'<div class="status-dot"></div>':''}</div>
                        <div style="flex:1">
                            <b>${d.name || d.email}</b>
                            <span>${d.status==='online'?'Сейчас на орбите':'Вне зоны доступа'}</span>
                        </div>
                    </div>`;
                }
            });
        });
    }

    function openChat(id, name) {
        currentPeerId = id;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('scr-chat').classList.add('open', 'active');
        
        db.ref('users/' + id).once('value', s => { peerData = s.val(); peerData.id = id; });

        const cid = [auth.currentUser.uid, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('msg-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === auth.currentUser.uid;
                const time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                box.innerHTML += `<div class="bubble ${isMe?'me':'he'}">${d.x}<div class="b-time">${time}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        db.ref('typing/' + id + '/' + auth.currentUser.uid).on('value', s => {
            document.getElementById('chat-typing').innerText = s.val() ? 'печатает...' : '';
        });
    }

    function viewOpponent() {
        document.getElementById('op-name-display').innerText = peerData.name || 'Пользователь';
        document.getElementById('op-email-display').innerText = peerData.email || '';
        document.getElementById('op-status-info').innerText = peerData.status === 'online' ? '● В СЕТИ' : '○ ОФФЛАЙН';
        document.getElementById('op-status-info').style.color = peerData.status === 'online' ? '#00ff88' : '#8696a0';
        showOverlay('ov-op');
    }

    function closeChat() { document.getElementById('scr-chat').classList.remove('open'); }

    function send() {
        const val = document.getElementById('m-input').value; if(!val.trim()) return;
        const cid = [auth.currentUser.uid, currentPeerId].sort().join('_');
        db.ref('msgs/' + cid).push({ f: auth.currentUser.uid, x: val, t: Date.now() });
        document.getElementById('m-input').value = '';
        db.ref('typing/' + auth.currentUser.uid + '/' + currentPeerId).set(false);
    }

    function handleTyping() {
        db.ref('typing/' + auth.currentUser.uid + '/' + currentPeerId).set(true);
        clearTimeout(tTimer);
        tTimer = setTimeout(() => db.ref('typing/' + auth.currentUser.uid + '/' + currentPeerId).set(false), 2000);
    }
</script>
</body>
</html>
