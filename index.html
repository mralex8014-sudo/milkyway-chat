<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Original Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН ИЗ ПРЕДЫДУЩИХ СООБЩЕНИЙ */
        body { background-color: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 350px; height: 600px; background: rgba(20, 25, 35, 0.95); border: 1px solid #1f2a3d; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 162, 255, 0.2); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2a3d; }
        h1 { margin: 0; font-size: 24px; color: #00a2ff; }
        .search-box { padding: 15px; display: flex; gap: 10px; flex-direction: column; }
        input { background: #161b22; border: 1px solid #30363d; padding: 10px; border-radius: 8px; color: white; outline: none; }
        button { background: #00a2ff; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }
        .contact-item { display: flex; padding: 15px; border-bottom: 1px solid #161b22; cursor: pointer; transition: 0.3s; align-items: center; }
        .contact-item:hover { background: #1c2128; }
        .avatar { font-size: 30px; margin-right: 15px; }
        .msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: #004d7a; }
        .th { align-self: flex-start; background: #1c2128; }
        .tick { font-size: 10px; margin-left: 5px; color: #8b949e; }
        .blue { color: #00a2ff; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active">
        <header><h1>MilkyWay</h1></header>
        <div class="search-box">
            <input type="text" id="contact-input" placeholder="email@example.com или +7...">
            <div id="recaptcha-container"></div>
            <button onclick="sendCode()">ПОЛУЧИТЬ КОД</button>
            <div id="otp-area" style="display:none; margin-top:10px; flex-direction:column; gap:10px;">
                <input type="text" id="otp-val" placeholder="Код из сообщения">
                <button onclick="verify()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <header><h1>MilkyWay</h1></header>
        <div class="contacts-list" id="contacts"></div>
        <button onclick="firebase.auth().signOut()" style="margin:10px; background:#ff4b4b;">ВЫЙТИ</button>
    </div>

    <div id="scr-chat" class="screen">
        <header style="display:flex; align-items:center;">
            <i class="fas fa-arrow-left" onclick="showMain()" style="cursor:pointer; margin-right:15px; color:#00a2ff"></i>
            <span id="chat-with" class="name">Чат</span>
        </header>
        <div class="msg-area" id="msg-area"></div>
        <div class="search-box" style="flex-direction:row;">
            <input type="text" id="m-text" style="flex:1" placeholder="Сообщение...">
            <button onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });

    async function sendCode() {
        const val = document.getElementById('contact-input').value;
        if(val.includes('@')) {
            await auth.sendSignInLinkToEmail(val, { url: window.location.href, handleCodeInApp: true });
            window.localStorage.setItem('emailForSignIn', val);
            alert("Ссылка отправлена на почту!");
        } else {
            window.confirmationResult = await auth.signInWithPhoneNumber(val, window.recaptchaVerifier);
            document.getElementById('otp-area').style.display = 'flex';
        }
    }

    async function verify() {
        const code = document.getElementById('otp-val').value;
        await window.confirmationResult.confirm(code);
    }

    // Обработка входа по ссылке
    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Введите email');
        auth.signInWithEmailLink(email, window.location.href).then(() => window.localStorage.removeItem('emailForSignIn'));
    }

    auth.onAuthStateChanged(user => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(user) {
            document.getElementById('scr-main').classList.add('active');
            db.ref('users/' + user.uid).update({ name: user.email || user.phoneNumber });
            loadContacts();
        } else {
            document.getElementById('scr-auth').classList.add('active');
        }
    });

    function loadContacts() {
        db.ref('users').on('value', snap => {
            const c = document.getElementById('contacts'); c.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    c.innerHTML += `<div class="contact-item" onclick="openChat('${u.key}', '${u.val().name}')"><div class="avatar">👤</div><div><div class="name">${u.val().name}</div><div class="last-msg">Нажми, чтобы начать</div></div></div>`;
                }
            });
        });
    }

    let activeId = null;
    function openChat(id, name) {
        activeId = id; document.getElementById('chat-with').innerText = name;
        document.getElementById('scr-main').classList.remove('active');
        document.getElementById('scr-chat').classList.add('active');
        loadMsgs();
    }

    function showMain() {
        document.getElementById('scr-chat').classList.remove('active');
        document.getElementById('scr-main').classList.add('active');
    }

    function send() {
        const t = document.getElementById('m-text'); if(!t.value) return;
        const cid = [auth.currentUser.uid, activeId].sort().join('_');
        const enc = CryptoJS.AES.encrypt(t.value, 'secret').toString();
        db.ref('msgs/' + cid).push({ from: auth.currentUser.uid, data: enc, time: Date.now(), read: false });
        t.value = '';
    }

    function loadMsgs() {
        const cid = [auth.currentUser.uid, activeId].sort().join('_');
        db.ref('msgs/' + cid).on('value', snap => {
            const a = document.getElementById('msg-area'); a.innerHTML = '';
            snap.forEach(m => {
                const d = m.val(); const isMe = d.from === auth.currentUser.uid;
                if(!isMe && !d.read) m.ref.update({read: true});
                const dec = CryptoJS.AES.decrypt(d.data, 'secret').toString(CryptoJS.enc.Utf8);
                a.innerHTML += `<div class="bubble ${isMe ? 'my' : 'th'}">${dec} <i class="fas fa-check-double tick ${d.read ? 'blue' : ''}"></i></div>`;
            });
            a.scrollTop = a.scrollHeight;
        });
    }
</script>
</body>
</html>
