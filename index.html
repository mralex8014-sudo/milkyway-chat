<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ТВОЙ НЕИЗМЕННЫЙ ДИЗАЙН */
        body {
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 350px;
            height: 600px;
            background: rgba(20, 25, 35, 0.95);
            border: 1px solid #1f2a3d;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1f2a3d;
        }

        h1 { margin: 0; font-size: 24px; color: #00a2ff; }

        .search-box {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 8px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        button {
            background: #00a2ff;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            padding: 15px;
            border-bottom: 1px solid #161b22;
            cursor: pointer;
            transition: 0.3s;
            align-items: center;
        }

        .contact-item:hover { background: #1c2128; }

        .avatar { font-size: 30px; margin-right: 15px; }

        .name { font-weight: bold; }
        .last-msg { font-size: 12px; color: #8b949e; }

        /* СКРЫТЫЕ ЭЛЕМЕНТЫ ДЛЯ ФУНКЦИЙ */
        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }
        
        #chat-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e14; z-index: 100;
        }

        .msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; }
        .bubble.my { align-self: flex-end; background: #004d7a; }
        .bubble.th { align-self: flex-start; background: #1c2128; }
        
        .tick { font-size: 10px; margin-left: 5px; color: #8b949e; }
        .tick.blue { color: #00a2ff; }

        .status-badge { width: 10px; height: 10px; border-radius: 50%; background: #00a2ff; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="scr-auth" class="screen active">
        <header><h1>MilkyWay</h1></header>
        <div class="search-box" style="flex-direction: column; gap: 15px; margin-top: 50px;">
            <input type="text" id="auth-val" placeholder="Номер или Email">
            <button onclick="sendOTP()">ПОЛУЧИТЬ КОД</button>
            <div id="otp-area" style="display: none; gap: 10px; flex-direction: column;">
                <input type="text" id="otp-code" placeholder="6-значный код">
                <button onclick="verifyOTP()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <header><h1>MilkyWay</h1></header>
        <div class="search-box">
            <input type="text" placeholder="Поиск контактов...">
        </div>
        <div style="padding: 10px 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #161b22;">
            <div class="avatar" style="font-size: 20px; border: 2px solid #00a2ff; border-radius: 50%; padding: 5px;">➕</div>
            <div id="status-list" style="display: flex; gap: 10px;"></div>
        </div>
        <div class="contacts-list" id="contacts"></div>
    </div>

    <div id="chat-window" class="screen">
        <header style="display: flex; align-items: center; justify-content: space-between;">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor: pointer; color: #00a2ff;"></i>
            <span id="chat-title" class="name">Чат</span>
            <div style="display: flex; gap: 15px; color: #00a2ff;">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
            </div>
        </header>
        <div class="msg-area" id="msg-area"></div>
        <div class="search-box" style="background: #161b22;">
            <button style="background: transparent; padding: 5px;"><i class="fas fa-plus"></i></button>
            <input type="text" id="m-text" placeholder="Сообщение...">
            <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let me = null;
    let activeChat = null;
    const E2EE_KEY = 'mw-secret-global-key'; // В реальности ключи генерируются для пары

    // 1. OTP & AUTH
    function sendOTP() {
        const val = document.getElementById('auth-val').value;
        if(!val) return;
        document.getElementById('otp-area').style.display = 'flex';
        alert("Код отправлен на " + val);
    }

    function verifyOTP() {
        const code = document.getElementById('otp-code').value;
        const val = document.getElementById('auth-val').value;
        if(code.length === 6) {
            auth.signInAnonymously().then(res => {
                db.ref('users/' + res.user.uid).set({
                    id: val,
                    name: val.split('@')[0],
                    about: "Использую MilkyWay",
                    lastSeen: Date.now()
                });
            });
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-main').classList.add('active');
            loadContacts();
        }
    });

    // 2. CONTACTS & SYNC
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contacts');
            list.innerHTML = '';
            snap.forEach(child => {
                if(child.key !== me.uid) {
                    const u = child.val();
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${child.key}', '${u.name}')">
                            <div class="avatar">👤</div>
                            <div class="info">
                                <div class="name">${u.name}</div>
                                <div class="last-msg">${u.about}</div>
                            </div>
                        </div>
                    `;
                }
            });
        });
    }

    // 3. MESSAGING & E2EE & TICKS
    function openChat(id, name) {
        activeChat = id;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-window').classList.add('active');
        renderMsgs();
    }

    function closeChat() {
        document.getElementById('chat-window').classList.remove('active');
    }

    function sendMsg() {
        const txt = document.getElementById('m-text');
        if(!txt.value) return;

        // E2EE Encryption
        const encrypted = CryptoJS.AES.encrypt(txt.value, E2EE_KEY).toString();

        const chatId = [me.uid, activeChat].sort().join('_');
        db.ref('msgs/' + chatId).push({
            from: me.uid,
            data: encrypted,
            type: 'text',
            time: Date.now(),
            status: 1 // 1: Сервер (1 серая), 2: Доставлено (2 серых), 3: Прочитано (2 синих)
        });
        txt.value = '';
    }

    function renderMsgs() {
        const chatId = [me.uid, activeChat].sort().join('_');
        const area = document.getElementById('msg-area');
        
        db.ref('msgs/' + chatId).on('value', snap => {
            area.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const isMe = m.from === me.uid;
                
                // Дешифровка E2EE
                const decrypted = CryptoJS.AES.decrypt(m.data, E2EE_KEY).toString(CryptoJS.enc.Utf8);

                // Статус прочитано
                if(!isMe && m.status < 3) {
                    db.ref('msgs/' + chatId + '/' + child.key).update({status: 3});
                }

                let tickHtml = m.status === 3 ? '<i class="fas fa-check-double tick blue"></i>' : 
                               (m.status === 2 ? '<i class="fas fa-check-double tick"></i>' : '<i class="fas fa-check tick"></i>');

                area.innerHTML += `
                    <div class="bubble ${isMe ? 'my' : 'th'}">
                        ${decrypted}
                        <div style="text-align:right">${tickHtml}</div>
                    </div>
                `;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // 4. STORIES (Auto-delete 24h)
    function cleanOldStories() {
        const now = Date.now();
        db.ref('stories').once('value', snap => {
            snap.forEach(s => {
                if(now - s.val().time > 86400000) s.ref.remove();
            });
        });
    }
    setInterval(cleanOldStories, 3600000); // Раз в час
</script>
</body>
</html>
