<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Iron</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #05070a; --panel: #0d1117; --border: #1f2937; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* ОСНОВНОЙ КОНТЕЙНЕР (ВСЕГДА ПО ЦЕНТРУ И НЕУБИВАЕМ) */
        .app-shell { 
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            background: var(--bg); position: relative; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* БОКОВОЕ МЕНЮ (ТЕПЕРЬ ВНЕ ПОТОКА) */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 300px; height: 100%;
            background: var(--panel); z-index: 9999; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 2px solid var(--neon); padding: 40px 25px;
        }
        .sidebar.open { left: 0; box-shadow: 50px 0 100px rgba(0,0,0,0.9); }
        
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); z-index: 9998; display: none; backdrop-filter: blur(5px);
        }

        /* ШАПКА */
        header { 
            padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .logo-neon { font-size: 22px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .active { display: flex; }

        /* ЧАТЫ И СООБЩЕНИЯ */
        #chat-list, #msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-row { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .av { width: 45px; height: 45px; border-radius: 50%; background: var(--neon); color: #000; display: grid; place-items: center; font-weight: bold; }

        /* ВВОД */
        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; }
        
        /* КНОПКИ */
        .btn-neon { color: var(--neon); font-size: 22px; cursor: pointer; transition: 0.3s; }
        .btn-neon:hover { transform: scale(1.1); text-shadow: 0 0 10px var(--neon); }
        .fab { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--neon); border-radius: 50%; display: grid; place-items: center; color: #000; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px var(--neon); }

        /* АВТОРИЗАЦИЯ */
        .auth-screen { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center; }
        .auth-screen input { margin-bottom: 15px; border-radius: 10px; text-align: center; }
        .btn-go { padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>

<div id="ovl" class="overlay" onclick="tglM()"></div>
<div id="side" class="sidebar">
    <div class="logo-neon" style="margin-bottom:40px;">MilkyWay</div>
    <div style="display:flex; flex-direction:column; gap:25px; font-size:18px;">
        <div onclick="alert('Профиль')"><i class="fas fa-user-circle"></i> Профиль</div>
        <div onclick="alert('Настройки')"><i class="fas fa-cog"></i> Настройки</div>
        <div onclick="auth.signOut()" style="color:#ff4b4b; margin-top:30px;"><i class="fas fa-power-off"></i> Покинуть систему</div>
    </div>
</div>

<div class="app-shell">
    <div id="scr-auth" class="screen active">
        <div class="auth-screen">
            <div class="logo-neon" style="font-size:45px; margin-bottom:40px;">MilkyWay</div>
            <input type="email" id="email" placeholder="Электронная почта">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-go" onclick="authOp('login')">ВОЙТИ В АККАУНТ</button>
            <p onclick="authOp('reg')" style="margin-top:25px; color:var(--neon); cursor:pointer; font-size:14px;">Создать новый аккаунт</p>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <header>
            <i class="fas fa-bars btn-neon" onclick="tglM()"></i>
            <div class="logo-neon">Центр связи</div>
            <div style="width:22px;"></div>
        </header>
        <div id="chat-list"></div>
        <div class="fab" onclick="addU()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left btn-neon" onclick="sh('scr-main')"></i>
            <b id="chat-title">Чат</b>
            <i class="fas fa-paperclip btn-neon" onclick="alert('Скоро!')"></i>
        </header>
        <div id="msgs"></div>
        <div class="input-bar">
            <input type="text" id="m-in" placeholder="Введите сообщение...">
            <i class="fas fa-paper-plane btn-neon" onclick="snd()"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let me = null, cur = null;

    function tglM() {
        const s = document.getElementById('side'), o = document.getElementById('ovl');
        const open = s.classList.toggle('open');
        o.style.display = open ? 'block' : 'none';
    }

    function sh(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('side').classList.remove('open');
        document.getElementById('ovl').style.display = 'none';
    }

    function authOp(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Введите данные!");
        if(t === 'login') auth.signInWithEmailAndPassword(e,p).catch(a => alert("Ошибка: " + a.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
            db.ref('lookup/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
        }).catch(a => alert("Ошибка: " + a.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { me = u; sh('scr-main'); load(); }
        else sh('scr-auth');
    });

    function load() {
        const l = document.getElementById('chat-list');
        l.innerHTML = `<div class="chat-row" onclick="opC('global','Общий канал')"><div class="av">G</div><b>Глобальный чат</b></div>`;
        db.ref('users/'+me.uid+'/contacts').on('value', s => {
            s.forEach(c => {
                db.ref('users/'+c.key).once('value', us => {
                    const d = us.val();
                    const div = document.createElement('div'); div.className = 'chat-row';
                    div.onclick = () => opC(c.key, d.name);
                    div.innerHTML = `<div class="av">${d.name[0].toUpperCase()}</div><b>${d.name}</b>`;
                    l.appendChild(div);
                });
            });
        });
    }

    function opC(id, name) {
        cur = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = name;
        sh('scr-chat');
        db.ref('msgs/'+cur).off();
        const mBox = document.getElementById('msgs'); mBox.innerHTML = '';
        db.ref('msgs/'+cur).on('child_added', s => {
            const m = s.val();
            const d = document.createElement('div');
            d.style = `max-width:80%; padding:10px; border-radius:12px; margin-bottom:8px; font-size:14px; ${m.f === me.uid ? 'align-self:flex-end; background:#005c4b;' : 'align-self:flex-start; background:#202c33;'}`;
            d.innerText = m.t;
            mBox.appendChild(d); mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function snd() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        db.ref('msgs/'+cur).push({f: me.uid, t: i.value});
        i.value = '';
    }

    function addU() {
        const e = prompt("Email:");
        if(e) db.ref('lookup/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+me.uid+'/contacts/'+s.val()).set(true);
            else alert("Не найден!");
        });
    }
    document.getElementById('m-in').onkeypress = e => { if(e.key==='Enter') snd(); };
</script>
</body>
</html>
