<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay: AI Evolution</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #020408;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --ai-glow: #00ff88;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- ЛОГОТИП С КОМЕТОЙ --- */
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .comet { 
            width: 35px; height: 35px; background: linear-gradient(45deg, var(--accent), var(--nebula));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; position: relative;
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px var(--accent); } 50% { transform: scale(1.1); box-shadow: 0 0 20px var(--nebula); } 100% { transform: scale(1); box-shadow: 0 0 10px var(--accent); } }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; }
        .active { display: flex; }

        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }

        /* --- ЧАТ --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.3s ease; background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover; }
        
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .m-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 4px; }
        .m-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* --- КНОПКА РАКЕТА --- */
        .rocket-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: #000; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .rocket-btn:active { transform: translateY(-15px) scale(1.1); box-shadow: 0 10px 20px var(--accent); }

        /* --- НАВИГАЦИЯ --- */
        .nav { height: 75px; background: #080a0f; border-top: 1px solid var(--border); display: flex; position: absolute; bottom: 0; width: 100%; z-index: 100; }
        .nav-t { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8696a0; gap: 4px; cursor: pointer; }
        .nav-t.active { color: var(--accent); }

        .cosmo-input { width: 100%; padding: 12px 15px; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; margin-bottom: 10px; }
        .ava { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; flex-shrink: 0; }
        .ava img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <center>
            <div class="comet"><i class="fas fa-meteor"></i></div>
            <h2 style="margin:20px 0; letter-spacing:3px;">MILKYWAY</h2>
        </center>
        <input type="email" id="email" class="cosmo-input" placeholder="Космическая почта">
        <input type="password" id="pass" class="cosmo-input" placeholder="Пароль">
        <button onclick="authRun()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; color:#000;">ЗАПУСК СИСТЕМ</button>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div class="header-brand">
                    <div class="comet"><i class="fas fa-meteor"></i></div>
                    <span style="font-weight:900; color:var(--accent);">MILKYWAY</span>
                </div>
                <div style="display:flex; gap:15px;">
                    <i class="fas fa-robot" onclick="openChat('gemini_ai', 'Gemini AI')" style="color:var(--ai-glow); cursor:pointer;"></i>
                    <i class="fas fa-user-circle" onclick="showSettings()" style="color:#8696a0; cursor:pointer; font-size:20px;"></i>
                </div>
            </div>
            <div style="background:var(--glass); border-radius:10px; padding:8px 15px; display:flex; align-items:center; border:1px solid var(--border);">
                <i class="fas fa-search" style="color:#8696a0; margin-right:10px;"></i>
                <input type="text" id="gSearch" placeholder="Найти пилота..." oninput="handleSearch()" style="background:none; border:none; color:#fff; flex:1; outline:none;">
            </div>
        </div>

        <div id="view-chats" class="scroller"></div>
        <div id="view-contacts" class="scroller" style="display:none;"></div>
        <div id="view-status" class="scroller" style="display:none; text-align:center; padding:100px;">
            <i class="fas fa-star" style="font-size:40px; color:var(--accent); animation: pulse 2s infinite;"></i>
            <p style="color:#8696a0; margin-top:15px;">Радар активен</p>
        </div>

        <nav class="nav">
            <div class="nav-t active" onclick="tab('chats', this)"><i class="fas fa-comment"></i><span>Чаты</span></div>
            <div class="nav-t" onclick="tab('contacts', this)"><i class="fas fa-address-book"></i><span>Контакты</span></div>
            <div class="nav-t" onclick="tab('status', this)"><i class="fas fa-star"></i><span>Статус</span></div>
        </nav>
    </div>

    <div id="scr-settings" class="screen" style="z-index:1100; background:#05070c;">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="hideSettings()" style="color:var(--accent); cursor:pointer; margin-right:15px;"></i>
            <b>ПРОФИЛЬ</b>
        </div>
        <div class="scroller" style="padding:25px; text-align:center;">
            <div class="ava" style="width:100px; height:100px; margin:0 auto 15px;" onclick="document.getElementById('file-in').click()">
                <img id="p-img" style="display:none; border-radius:50%;">
                <i class="fas fa-camera" id="p-icon"></i>
            </div>
            <input type="file" id="file-in" style="display:none;" onchange="uploadAva(this)">
            <input type="text" id="set-name" class="cosmo-input" placeholder="Имя">
            <input type="text" id="set-nick" class="cosmo-input" placeholder="Никнейм">
            <input type="date" id="set-dob" class="cosmo-input">
            <button onclick="saveProfile()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:#000; font-weight:bold;">ОБНОВИТЬ</button>
            <button onclick="auth.signOut()" style="margin-top:20px; color:var(--danger); background:none; border:none;">ВЫЙТИ</button>
        </div>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer;"></i>
            <div id="c-ava" class="ava" style="width:35px; height:35px;"></div>
            <div style="flex:1"><b id="c-name"></b><br><small id="c-info" style="font-size:10px; color:#8696a0;"></small></div>
            <div style="display:flex; gap:15px; color:var(--accent);"><i class="fas fa-phone"></i><i class="fas fa-video"></i></div>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div style="padding:15px; background:#0a0f19; display:flex; gap:10px; align-items:center;">
            <i class="fas fa-paperclip" style="color:#8696a0;"></i>
            <input type="text" id="msg-input" class="cosmo-input" placeholder="Связь..." style="margin:0; flex:1; border-radius:25px;">
            <button class="rocket-btn" onclick="send()"><i class="fas fa-shuttle-space"></i></button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let myId = null, selId = null, activeTab = 'chats';

    // --- AUTH ---
    async function authRun() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return;
        try { await auth.signInWithEmailAndPassword(e, p); } catch {
            const r = await auth.createUserWithEmailAndPassword(e, p);
            db.ref('users/' + r.user.uid).set({ name: 'Пилот', nickname: 'id'+Math.floor(Math.random()*999), ava: '', dob: '' });
        }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) { myId = u.uid; sync(); loadMyProfile(); }
    });

    // --- PROFILE ---
    function loadMyProfile() {
        db.ref('users/' + myId).on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('set-name').value = d.name || '';
            document.getElementById('set-nick').value = d.nickname || '';
            document.getElementById('set-dob').value = d.dob || '';
            if(d.ava) {
                document.getElementById('p-img').src = d.ava;
                document.getElementById('p-img').style.display = 'block';
                document.getElementById('p-icon').style.display = 'none';
            }
        });
    }

    function uploadAva(input) {
        const reader = new FileReader();
        reader.onload = (e) => db.ref('users/' + myId).update({ ava: e.target.result });
        reader.readAsDataURL(input.files[0]);
    }

    function saveProfile() {
        db.ref('users/' + myId).update({
            name: document.getElementById('set-name').value,
            nickname: document.getElementById('set-nick').value,
            dob: document.getElementById('set-dob').value
        }).then(() => hideSettings());
    }

    // --- LOGIC (SEARCH & MESSAGING) ---
    function handleSearch() {
        const q = document.getElementById('gSearch').value.toLowerCase().trim();
        const container = document.getElementById('view-' + activeTab);
        
        if(!q) { sync(); return; }
        
        db.ref('users').once('value', snap => {
            container.innerHTML = '';
            let found = false;
            snap.forEach(u => {
                const d = u.val();
                if(u.key !== myId && ((d.name||'').toLowerCase().includes(q) || (d.nickname||'').toLowerCase().includes(q))) {
                    container.innerHTML += renderUser(u.key, d, true);
                    found = true;
                }
            });
            if(!found) container.innerHTML = '<p style="text-align:center; padding:20px; color:#8696a0;">Пилот не найден</p>';
        });
    }

    function sync() {
        db.ref('active_dialogues/' + myId).on('value', snap => {
            const container = document.getElementById('view-chats');
            container.innerHTML = '';
            snap.forEach(c => {
                db.ref('users/' + c.key).once('value', u => {
                    if(u.exists()) container.innerHTML += renderUser(c.key, u.val());
                });
            });
        });
    }

    function renderUser(id, d, isS) {
        const photo = d.ava ? `<img src="${d.ava}" style="width:100%;height:100%;border-radius:50%">` : `<i class="fas fa-user-astronaut"></i>`;
        return `<div class="item">
            <div class="ava" onclick="openChat('${id}','${d.name}')">${photo}</div>
            <div style="flex:1" onclick="openChat('${id}','${d.name}')">
                <b>${d.name || 'Пилот'}</b><br><small style="color:#8696a0">@${d.nickname || ''}</small>
            </div>
            ${isS ? `<i class="fas fa-plus-circle" style="color:var(--accent)" onclick="addContact('${id}')"></i>` : ''}
        </div>`;
    }

    function addContact(id) { db.ref(`users/${myId}/contacts/${id}`).set(true); alert("Контакт добавлен!"); }

    // --- CHAT & GEMINI AI ---
    function openChat(id, name) {
        selId = id;
        document.getElementById('c-name').innerText = name;
        const scr = document.getElementById('scr-chat');
        scr.style.display = 'flex';
        setTimeout(() => scr.classList.add('open'), 10);

        db.ref('users/' + id).once('value', snap => {
            const d = snap.val() || {nickname: 'ai', dob: '∞'};
            document.getElementById('c-info').innerText = `@${d.nickname} | ${d.dob}`;
            document.getElementById('c-ava').innerHTML = d.ava ? `<img src="${d.ava}" style="width:100%;height:100%;border-radius:50%">` : `<i class="fas fa-user-astronaut"></i>`;
        });

        const cid = [myId, id].sort().join('_');
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                box.innerHTML += `<div class="bubble ${isMe?'m-me':'m-he'}">${d.x}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        const text = inp.value;
        const cid = [myId, selId].sort().join('_');
        const mKey = db.ref('msgs/' + cid).push().key;

        db.ref(`msgs/${cid}/${mKey}`).set({ f: myId, x: text, t: Date.now() });
        db.ref(`active_dialogues/${myId}/${selId}`).set(Date.now());
        db.ref(`active_dialogues/${selId}/${myId}`).set(Date.now());

        if(selId === 'gemini_ai') geminiCore(text, cid);
        inp.value = '';
    }

    function geminiCore(q, cid) {
        // Симуляция анализа ИИ
        setTimeout(() => {
            let reply = "Командир, я проанализировал ваш запрос. ";
            if(q.toLowerCase().includes("привет")) reply += "Рад видеть вас на мостике! Системы MilkyWay к вашим услугам.";
            else if(q.toLowerCase().includes("как")) reply += "Мои алгоритмы работают на 100%. В космосе всё спокойно.";
            else reply += "Данные приняты. Я постоянно совершенствую свою нейросеть, чтобы помогать вам эффективнее.";
            
            const rKey = db.ref('msgs/' + cid).push().key;
            db.ref(`msgs/${cid}/${rKey}`).set({ f: 'gemini_ai', x: reply, t: Date.now() });
        }, 1500);
    }

    function closeChat() {
        const scr = document.getElementById('scr-chat');
        scr.classList.remove('open');
        setTimeout(() => { scr.style.display = 'none'; selId = null; }, 300);
    }

    function tab(name, el) {
        ['chats', 'contacts', 'status'].forEach(t => document.getElementById('view-'+t).style.display = 'none');
        document.getElementById('view-'+name).style.display = 'block';
        document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        activeTab = name;
    }

    function showSettings() { document.getElementById('scr-settings').classList.add('active'); }
    function hideSettings() { document.getElementById('scr-settings').classList.remove('active'); }
</script>
</body>
</html>
