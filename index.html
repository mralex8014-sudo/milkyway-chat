<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Original</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ТВОЙ ОРИГИНАЛЬНЫЙ ДИЗАЙН */
        body {
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 350px;
            height: 650px; /* Немного увеличил для вкладок */
            background: rgba(20, 25, 35, 0.95);
            border: 1px solid #1f2a3d;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #1f2a3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 22px; color: #00a2ff; text-transform: uppercase; letter-spacing: 1px; }

        /* ВКЛАДКИ (WHATSAPP STYLE) */
        .tabs { display: flex; background: #161b22; border-bottom: 1px solid #1f2a3d; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 11px; color: #8b949e; cursor: pointer; font-weight: bold; }
        .tab.active { color: #00a2ff; border-bottom: 2px solid #00a2ff; }

        /* ЭКРАНЫ */
        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .active-screen { display: flex; }

        /* СПИСОК ЧАТОВ */
        .contacts-list { flex: 1; overflow-y: auto; }
        .contact-item {
            display: flex; padding: 12px 15px; border-bottom: 1px solid #161b22;
            cursor: pointer; transition: 0.3s; align-items: center;
        }
        .contact-item:hover { background: #1c2128; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #232d3b; display: grid; place-items: center; margin-right: 12px; font-size: 20px; }

        /* ОКНО ЧАТА */
        #chat-window { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0b0e14; z-index: 100; display: none; flex-direction: column;
        }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; }
        .bubble.my { align-self: flex-end; background: #004d7a; }
        .bubble.th { align-self: flex-start; background: #1c2128; }
        
        /* ГАЛОЧКИ */
        .status-bar { font-size: 10px; display: flex; justify-content: flex-end; margin-top: 4px; color: #8b949e; }
        .blue-ticks { color: #00a2ff; }

        /* ВВОД СООБЩЕНИЯ */
        .input-box { padding: 15px; display: flex; gap: 8px; background: #161b22; align-items: center; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 8px 12px; border-radius: 20px; color: white; outline: none; }
        button { background: #00a2ff; border: none; color: white; padding: 8px 15px; border-radius: 50%; cursor: pointer; }

        /* OTP АВТОРИЗАЦИЯ */
        .auth-screen { padding: 30px; text-align: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active-screen auth-screen">
        <h1 style="margin-bottom: 30px;">MilkyWay</h1>
        <p style="font-size: 14px; color: #8b949e; margin-bottom: 20px;">Вход по номеру телефона (OTP)</p>
        <input type="text" id="phone" placeholder="+7 900 000 00 00" style="margin-bottom: 10px; text-align: center;">
        <button onclick="sendOTP()" style="border-radius: 8px; width: 100%;">ПОЛУЧИТЬ КОД</button>
    </div>

    <div id="scr-main" class="screen">
        <header>
            <i class="fas fa-bars" style="color:#00a2ff"></i>
            <h1>MilkyWay</h1>
            <i class="fas fa-search" style="color:#8b949e"></i>
        </header>
        <div class="tabs">
            <div class="tab active">ЧАТЫ</div>
            <div class="tab" onclick="alert('Статусы 24ч')">СТАТУС</div>
            <div class="tab" onclick="alert('VoIP Звонки')">ЗВОНКИ</div>
        </div>
        <div class="contacts-list" id="contacts-list">
            </div>
    </div>

    <div id="chat-window">
        <header>
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <span id="chat-user-name" class="name">Контакт</span>
            <div style="display:flex; gap:15px;">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
            </div>
        </header>
        <div class="msg-box" id="msg-box"></div>
        <div class="input-box">
            <i class="far fa-smile" style="color:#8b949e"></i>
            <input type="text" id="m-text" placeholder="Сообщение...">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    // ТВОЙ КОНФИГ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let me = null, activeChat = null;

    // E2EE ШИФРОВАНИЕ
    const passPhrase = 'milkyway-secure-key';
    const encrypt = (msg) => CryptoJS.AES.encrypt(msg, passPhrase).toString();
    const decrypt = (hash) => CryptoJS.AES.decrypt(hash, passPhrase).toString(CryptoJS.enc.Utf8);

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    // Имитация OTP
    function sendOTP() {
        const phone = document.getElementById('phone').value;
        if(phone.length < 10) return alert("Введите номер!");
        const code = prompt("Введите 6-значный код из SMS:");
        if(code) {
            auth.signInAnonymously().then(() => {
                alert("Номер подтвержден!");
            });
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            showScreen('scr-main');
            loadContacts();
        } else {
            showScreen('scr-auth');
        }
    });

    function loadContacts() {
        const list = document.getElementById('contacts-list');
        list.innerHTML = '';
        db.ref('users').once('value', snap => {
            snap.forEach(u => {
                if(u.key !== me.uid) {
                    const data = u.val();
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${u.key}', '${data.name}')">
                            <div class="avatar">👤</div>
                            <div class="info">
                                <div class="name">${data.name}</div>
                                <div class="last-msg">E2EE защищено...</div>
                            </div>
                        </div>
                    `;
                }
            });
        });
    }

    function openChat(id, name) {
        activeChat = id;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        renderMessages();
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
        db.ref('messages/' + activeChat).off();
    }

    function sendMessage() {
        const input = document.getElementById('m-text');
        if(!input.value) return;

        db.ref('messages/' + activeChat).push({
            sender: me.uid,
            text: encrypt(input.value), // Шифруем перед отправкой
            time: Date.now(),
            read: false
        });
        input.value = '';
    }

    function renderMessages() {
        const box = document.getElementById('msg-box');
        box.innerHTML = '';
        db.ref('messages/' + activeChat).on('child_added', snap => {
            const m = snap.val();
            const isMe = m.sender === me.uid;
            
            // Логика галочек: если не я отправил, ставим "прочитано"
            if(!isMe && !m.read) db.ref('messages/' + activeChat + '/' + snap.key).update({read: true});

            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'my' : 'th'}`;
            div.innerHTML = `
                ${decrypt(m.text)}
                <div class="status-bar">
                    ${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                    ${isMe ? `<i class="fas fa-check-double ${m.read ? 'blue-ticks' : ''}" style="margin-left:5px"></i>` : ''}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
