<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Iron 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #0b0e14; --panel: #161b22; --text: #e6edf3; --border: #30363d; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #010409; color: var(--text); font-family: sans-serif; 
            display: grid; place-items: center; height: 100vh; overflow: hidden; 
        }

        /* Жесткая рамка приложения */
        .app-frame { 
            width: 100vw; max-width: 420px; height: 100vh; 
            background: var(--bg); display: flex; flex-direction: column; 
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active { display: flex; }

        /* Фикс полей ввода */
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; height: 45px; background: #000; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; padding: 0 15px; outline: none; font-size: 15px;
        }

        header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0d1117; }
        
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: #056162; }
        .their { align-self: flex-start; background: #202c33; }
        
        .meta { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        .bar { padding: 10px; background: var(--panel); display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        
        .chat-row { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .circle { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-frame">
    <div id="scr-auth" class="screen active" style="padding: 30px; justify-content: center; gap: 15px;">
        <h1 style="text-align: center; color: var(--accent); margin-bottom: 20px;">MilkyWay</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn-main" onclick="doAuth('login')">ВОЙТИ</button>
        <p onclick="doAuth('reg')" style="text-align: center; font-size: 12px; opacity: 0.5; cursor: pointer;">Регистрация</p>
    </div>

    <div id="scr-list" class="screen">
        <header><b>Чаты</b> <i class="fas fa-sign-out-alt" onclick="auth.signOut()"></i></header>
        <div id="list-cont" style="flex: 1; overflow-y: auto;"></div>
        <div onclick="addContact()" style="position: absolute; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--accent); border-radius: 50%; display: grid; place-items: center; cursor: pointer; box-shadow: 0 4px 12px #000;"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-arrow-left" onclick="show('scr-list')"></i>
                <b id="chat-t">Чат</b>
            </div>
            <div style="display:flex; gap:15px; opacity: 0.7;">
                <i class="fas fa-phone"></i><i class="fas fa-video"></i>
            </div>
        </header>
        <div id="msg-box"></div>
        <div class="bar">
            <label><i class="fas fa-paperclip"></i><input type="file" id="f-up" hidden onchange="upFile()"></label>
            <input type="text" id="m-in" placeholder="Сообщение...">
            <i class="fas fa-paper-plane" onclick="send()" style="color:var(--accent); font-size: 20px;"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database(), st = firebase.storage();
    let me = null, curChat = null;

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function doAuth(mode) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(mode === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
            db.ref('map/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { me = u; show('scr-list'); load(); }
        else show('scr-auth');
    });

    function load() {
        const c = document.getElementById('list-cont');
        c.innerHTML = `<div class="chat-row" onclick="openC('global','Общий чат')"><div class="circle">G</div><b>Общий чат</b></div>`;
        db.ref('users/'+me.uid+'/contacts').on('value', s => {
            s.forEach(child => {
                db.ref('users/'+child.key).once('value', us => {
                    const d = us.val();
                    const r = document.createElement('div');
                    r.className = 'chat-row';
                    r.onclick = () => openC(child.key, d.name);
                    r.innerHTML = `<div class="circle">${d.name[0].toUpperCase()}</div><b>${d.name}</b>`;
                    c.appendChild(r);
                });
            });
        });
    }

    function openC(id, name) {
        curChat = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('chat-t').innerText = name;
        show('scr-chat');
        db.ref('msgs/'+curChat).off();
        const box = document.getElementById('msg-box');
        box.innerHTML = '';
        db.ref('msgs/'+curChat).on('child_added', s => {
            const m = s.val();
            const d = document.createElement('div');
            d.className = `bubble ${m.from === me.uid ? 'my' : 'their'}`;
            let time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            let content = m.type === 'img' ? `<img src="${m.url}" style="width:100%; border-radius:8px;">` : m.txt;
            d.innerHTML = `${content} <span class="meta">${time} ${m.from === me.uid ? '✓✓' : ''}</span>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        db.ref('msgs/'+curChat).push({from: me.uid, txt: i.value, time: Date.now(), type: 'text'});
        i.value = '';
    }

    function upFile() {
        const f = document.getElementById('f-up').files[0];
        if(!f) return;
        st.ref('files/'+Date.now()).put(f).then(s => s.ref.getDownloadURL()).then(url => {
            db.ref('msgs/'+curChat).push({from: me.uid, url: url, time: Date.now(), type: 'img'});
        });
    }

    function addContact() {
        const e = prompt("Email:");
        if(e) db.ref('map/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+me.uid+'/contacts/'+s.val()).set(true);
        });
    }
    document.getElementById('m-in').onkeypress = e => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
