<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Messenger 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at top, #1a2a3d 0%, #05070a 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; display: flex; justify-content: center; overflow: hidden;
        }

        /* Эффект звезд */
        body::after {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; pointer-events: none;
        }

        .app-container { 
            width: 100%; max-width: 450px; background: rgba(10, 15, 25, 0.8); 
            display: flex; flex-direction: column; position: relative; 
            backdrop-filter: blur(20px); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            z-index: 10;
        }

        /* --- ЛОГОТИП MilkyWay --- */
        .main-logo-area {
            padding: 30px 20px 10px; text-align: center;
        }
        .logo-text {
            font-size: 32px; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 162, 255, 0.3);
        }

        /* --- СКРЫТОЕ МЕНЮ --- */
        #sidebar {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .sidebar-drawer {
            width: 280px; height: 100%; background: #0a0f19;
            transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; border-right: 1px solid var(--accent);
        }
        #sidebar.open { visibility: visible; opacity: 1; }
        #sidebar.open .sidebar-drawer { transform: translateX(0); }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active-screen { display: flex; }

        header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }

        /* --- КАРТОЧКИ ЧАТОВ --- */
        .chat-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .chat-card {
            margin: 10px 15px; padding: 16px; background: var(--glass); 
            border-radius: 15px; display: flex; align-items: center; 
            cursor: pointer; border: 1px solid var(--border); transition: 0.2s;
        }
        .chat-card:hover { background: rgba(0, 162, 255, 0.1); border-color: var(--accent); }
        .avatar { width: 52px; height: 52px; background: linear-gradient(45deg, #00a2ff, #0055ff); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* --- ОКНО ЧАТА --- */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #1c2128; border-bottom-left-radius: 2px; border: 1px solid var(--border); }

        /* --- ФУТЕР ВВОДА --- */
        .footer { padding: 15px; background: #0a0f19; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .input-pill { flex: 1; background: #161b22; border: 1px solid var(--border); padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; transition: 0.3s; }
        .btn-round:hover { transform: scale(1.05); }

        .fab { position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(0,162,255,0.4); cursor: pointer; z-index: 99; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sidebar" onclick="toggleMenu()">
        <div class="sidebar-drawer" onclick="event.stopPropagation()">
            <h2 class="logo-text" style="font-size: 24px; margin-bottom: 30px;">Settings</h2>
            <p style="color:#8b949e; font-size:12px;">Твой бортовой номер (UID):</p>
            <div onclick="copyUID()" id="my-uid" style="background:#161b22; padding:12px; border-radius:10px; margin:10px 0; font-size:11px; cursor:pointer; border:1px solid #30363d; word-break:break-all;">...</div>
            <button onclick="auth.signOut()" style="width:100%; padding:12px; border-radius:10px; border:none; background:#da3633; color:white; font-weight:bold; margin-top:30px; cursor:pointer;">Выход</button>
        </div>
    </div>

    <div id="screen-auth" class="screen active-screen" style="justify-content:center; padding:40px; text-align:center;">
        <div class="logo-text" style="font-size: 48px; margin-bottom: 10px;">MilkyWay</div>
        <p style="color:#8b949e; margin-bottom:40px;">Ваш личный космос</p>
        <input type="email" id="email" class="input-pill" style="margin-bottom:10px; width:100%;" placeholder="Email">
        <input type="password" id="pass" class="input-pill" style="margin-bottom:20px; width:100%;" placeholder="Пароль">
        <button onclick="authOp('login')" class="btn-round" style="width:100%; border-radius:12px; font-weight:bold;">Войти</button>
        <p onclick="authOp('reg')" style="color:#8b949e; margin-top:20px; cursor:pointer; font-size:14px;">Создать аккаунт</p>
    </div>

    <div id="screen-main" class="screen">
        <div class="main-logo-area">
            <div class="logo-text">MilkyWay</div>
        </div>
        <header>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer; font-size:20px; color:var(--accent);"></i>
            <span style="color:#8b949e; font-size: 14px; text-transform: uppercase;">Чаты</span>
            <i class="fas fa-search" onclick="newChat()" style="cursor:pointer; color:var(--accent);"></i>
        </header>
        <div class="chat-list">
            <div class="chat-card" onclick="openChat('global_public_room', 'Общий чат 🌍')">
                <div class="avatar">🚀</div>
                <div><div style="font-weight:bold;">Общий чат</div><div style="font-size:12px; color:#8b949e;">На борту все пользователи</div></div>
            </div>
            <div id="chat-list-dynamic"></div>
        </div>
        <div class="fab" onclick="newChat()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" onclick="showScreen('screen-main')" style="cursor:pointer; color:var(--accent);"></i>
            <span id="chat-title" style="font-weight:bold;">Чат</span>
            <div style="display:flex; gap:15px;"><i class="fas fa-phone"></i><i class="fas fa-video"></i></div>
        </header>
        <div id="messages"></div>
        <div class="footer">
            <i class="fas fa-paperclip" style="color:#8b949e; font-size:20px;"></i>
            <input type="text" id="msg-input" class="input-pill" placeholder="Сообщение...">
            <button class="btn-round" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, activeChat = '';

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert("Ошибка: " + err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(() => {
            // Сохраняем email в базе при регистрации для поиска
            db.ref('users_by_email/' + btoa(e)).set(auth.currentUser.uid);
            alert("Аккаунт создан!");
        }).catch(err => alert("Ошибка: " + err.message));
    }

    auth.onAuthStateChanged(u => {
        if(u) { 
            user = u; 
            document.getElementById('my-uid').innerText = u.uid; 
            showScreen('screen-main');
            loadContacts();
        } else { showScreen('screen-auth'); }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    // ПОИСК ПО НОМЕРУ (UID) ИЛИ ПОЧТЕ
    function newChat() {
        const input = prompt("Введите номер (UID) или Почту собеседника:");
        if(!input) return;

        if(input.includes('@')) {
            // Поиск по почте
            db.ref('users_by_email/' + btoa(input)).once('value', s => {
                if(s.exists()) startChat(s.val());
                else alert("Пользователь с такой почтой не найден");
            });
        } else {
            // Поиск по UID
            startChat(input);
        }
    }

    function startChat(targetId) {
        if(targetId === user.uid) return;
        db.ref('users/' + user.uid + '/contacts/' + targetId).set(true);
        openChat([user.uid, targetId].sort().join("_"), "Приватный чат 🔒");
    }

    function loadContacts() {
        const list = document.getElementById('chat-list-dynamic');
        db.ref('users/' + user.uid + '/contacts').on('value', snap => {
            list.innerHTML = '';
            snap.forEach(child => {
                const contactId = child.key;
                const chatId = [user.uid, contactId].sort().join("_");
                const div = document.createElement('div');
                div.className = 'chat-card';
                div.onclick = () => openChat(chatId, "Пилот: " + contactId.substring(0,6));
                div.innerHTML = `<div class="avatar">👽</div><div><div style="font-weight:bold;">Пилот ${contactId.substring(0,5)}</div><div style="font-size:12px; color:#8b949e;">Связь установлена</div></div>`;
                list.appendChild(div);
            });
        });
    }

    function openChat(id, name) {
        activeChat = id; document.getElementById('chat-title').innerText = name;
        showScreen('screen-chat'); listen(id);
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t) return;
        db.ref('chats/'+activeChat).push({ u: user.uid, t: t, time: Date.now() });
        document.getElementById('msg-input').value = '';
    }

    function listen(id) {
        const m = document.getElementById('messages');
        db.ref('chats/'+id).off(); m.innerHTML = '';
        db.ref('chats/'+id).limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            m.appendChild(div); m.scrollTop = m.scrollHeight;
        });
    }

    function copyUID() { navigator.clipboard.writeText(user.uid); alert("Номер скопирован!"); }
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
