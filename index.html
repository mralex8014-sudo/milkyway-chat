<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Messenger 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020408; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; background: #0b0e14; display: flex; flex-direction: column; height: 100vh; border: 1px solid #30363d; position: relative; }
        
        /* Авторизация */
        #auth-form { display: flex; flex-direction: column; height: 100%; padding: 40px 20px; justify-content: center; text-align: center; }
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        
        .input { background: #161b22; border: 1px solid #30363d; padding: 14px; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 16px; width: 100%; }
        .btn { background: #00a2ff; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #0081cc; }
        
        /* Чат */
        header { padding: 15px; background: #0f172a; border-bottom: 1px solid #1c2128; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #05070a; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .my { align-self: flex-end; background: #00a2ff; color: white; border-bottom-right-radius: 2px; }
        .their { align-self: flex-start; background: #161b22; color: #e6edf3; border-bottom-left-radius: 2px; }
        
        .controls { padding: 10px; background: #161b22; border-top: 1px solid #30363d; }
        .uid-info { font-size: 11px; color: #8b949e; text-align: center; margin-bottom: 10px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 5px; }
        .input-area { display: flex; gap: 8px; padding: 10px; background: #0f172a; }
        #msg-text { flex: 1; margin: 0; }
    </style>
</head>
<body>

<div class="app">
    <div id="auth-form">
        <h1 style="margin-bottom: 30px; font-size: 32px;">MilkyWay 🌌</h1>
        <input type="email" id="email" class="input" placeholder="Email">
        <input type="password" id="pass" class="input" placeholder="Пароль">
        <button class="btn" onclick="authOp('login')">Войти</button>
        <button class="btn" style="background:none; color:#8b949e; margin-top:10px;" onclick="authOp('reg')">Нет аккаунта? Регистрация</button>
    </div>

    <div id="chat-ui">
        <header>
            <h3 id="chat-status" style="font-size: 18px;">Общий чат</h3>
        </header>
        
        <div class="controls">
            <div class="uid-info" id="my-uid" onclick="copyUID()">Загрузка вашего ID...</div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="target-uid" class="input" style="margin:0; font-size:12px; padding:8px;" placeholder="Вставьте UID друга">
                <button class="btn" style="padding:8px 15px;" onclick="startPrivate()">Найти</button>
            </div>
        </div>

        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="msg-text" class="input" placeholder="Напишите сообщение...">
            <button class="btn" style="padding: 0 20px;" onclick="send()">></button>
        </div>
    </div>
</div>

<script>
    // Твои настройки Firebase (Проверь их по скриншоту в консоли!)
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    // Инициализация
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();
    let user = null;
    let currentChatId = 'global';

    // Функции входа
    function authOp(type) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        if(!email || !pass) return alert("Введите почту и пароль");

        if(type === 'login') {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Ошибка входа: " + e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => alert("Ошибка регистрации: " + e.message));
        }
    }

    // Следим за состоянием входа
    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('my-uid').innerText = "Ваш UID (клик): " + u.uid;
            listen('global');
        } else {
            document.getElementById('auth-form').style.display = 'flex';
            document.getElementById('chat-ui').style.display = 'none';
        }
    });

    function copyUID() {
        navigator.clipboard.writeText(user.uid);
        alert("UID скопирован! Отправьте его другу.");
    }

    // Переход в приватный чат
    function startPrivate() {
        const target = document.getElementById('target-uid').value.trim();
        if(!target) return alert("Введите UID");
        if(target === user.uid) return alert("Это ваш собственный UID");
        
        currentChatId = [user.uid, target].sort().join("_");
        document.getElementById('chat-status').innerText = "🔒 Приватный чат";
        listen(currentChatId);
    }

    // Отправка
    function send() {
        const txt = document.getElementById('msg-text').value.trim();
        if(!txt) return;
        
        db.ref('chats/' + currentChatId).push({
            u: user.uid,
            t: txt,
            time: Date.now()
        }).then(() => {
            document.getElementById('msg-text').value = '';
        }).catch(e => alert("Ошибка отправки: Попробуйте обновить Правила (Rules) в Firebase!"));
    }

    // Слушатель сообщений
    function listen(id) {
        const box = document.getElementById('messages');
        db.ref('chats/' + id).off(); // Отключаем старый чат
        box.innerHTML = '';
        
        db.ref('chats/' + id).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (d.u === user.uid ? 'my' : 'their');
            div.innerText = d.t;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    }

    // Отправка по Enter
    document.getElementById('msg-text').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
    });
</script>
</body>
</html>
