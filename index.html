<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Stable 🌌</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1. ГЛОБАЛЬНЫЕ НАСТРОЙКИ - НЕ ТРОГАТЬ ДЛЯ СОХРАНЕНИЯ ДИЗАЙНА */
        :root { 
            --accent: #00a2ff; 
            --bg: #0b0e14; 
            --panel: #161b22; 
            --border: #30363d; 
            --text: #e6edf3; 
            --my-msg: #056162;
            --their-msg: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #010409; 
            color: var(--text); 
            font-family: -apple-system, sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden;
        }

        /* Основной контейнер-телефон */
        .app-window {
            width: 100%; 
            max-width: 450px; 
            height: 100%; 
            background: var(--bg);
            display: flex; 
            flex-direction: column; 
            position: relative;
            border-left: 1px solid var(--border); 
            border-right: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* 2. ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active { display: flex; }

        header { 
            padding: 15px 20px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--border);
            min-height: 60px;
        }

        /* 3. КОНТЕНТ */
        #message-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #0d1117; 
        }

        .bubble { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 14px; 
            font-size: 14px; 
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .bubble.my { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 2px; }
        .bubble.their { align-self: flex-start; background: var(--their-msg); border-top-left-radius: 2px; }

        .chat-item {
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            border-bottom: 1px solid var(--border); 
            cursor: pointer;
        }

        .avatar { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* 4. ИНПУТ */
        .input-bar { 
            padding: 10px 15px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        .msg-input { 
            flex: 1; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            padding: 10px 18px; 
            border-radius: 25px; 
            color: white; 
            outline: none;
            font-size: 15px;
        }

        .fab {
            position: absolute; bottom: 25px; right: 25px; width: 56px; height: 56px;
            border-radius: 50%; background: var(--accent); display: flex;
            align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .ticks { color: #00e5ff; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="app-window">
    <div id="screen-auth" class="screen active" style="justify-content: center; padding: 40px; text-align: center;">
        <h1 style="color: var(--accent); margin-bottom: 30px;">MilkyWay</h1>
        <input type="email" id="email" class="msg-input" placeholder="Email" style="width:100%; margin-bottom:10px;">
        <input type="password" id="pass" class="msg-input" placeholder="Пароль" style="width:100%; margin-bottom:20px;">
        <button onclick="handleAuth('login')" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">ВОЙТИ</button>
        <p onclick="handleAuth('reg')" style="margin-top:20px; font-size:12px; opacity:0.6; cursor:pointer;">Регистрация</p>
    </div>

    <div id="screen-list" class="screen">
        <header>
            <span style="font-weight:bold;">Чаты</span>
            <i class="fas fa-sign-out-alt" onclick="auth.signOut()"></i>
        </header>
        <div id="chats-container" style="flex:1; overflow-y:auto;"></div>
        <div class="fab" onclick="findUser()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="screen-chat" class="screen">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <i class="fas fa-arrow-left" onclick="showScreen('screen-list')"></i>
                <div class="avatar" id="chat-icon" style="width:35px; height:35px; font-size:14px;">?</div>
                <div id="chat-name" style="font-weight:bold; font-size:15px;">Чат</div>
            </div>
            <i class="fas fa-video"></i>
        </header>
        <div id="message-area"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" class="msg-input" placeholder="Сообщение">
            <div id="action-btn" onclick="sendMsg()"><i class="fas fa-paper-plane" style="color:var(--accent); font-size:20px;"></i></div>
        </div>
    </div>
</div>

<script>
    // Твои настройки Firebase (оставляем без изменений)
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let currentUser = null, activeChat = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleAuth(mode) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(mode === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/' + u.user.uid).set({ name: e.split('@')[0] });
            db.ref('users_by_email/' + btoa(e).replace(/=/g, "")).set(u.user.uid);
        }).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) { currentUser = user; showScreen('screen-list'); initChatList(); }
        else showScreen('screen-auth');
    });

    function initChatList() {
        const container = document.getElementById('chats-container');
        container.innerHTML = `<div class="chat-item" onclick="openChat('global', 'Общий чат')"><div class="avatar">🌍</div><div><b>Общий чат</b><br><small>Все пилоты</small></div></div>`;
        db.ref('users/' + currentUser.uid + '/contacts').on('value', snap => {
            snap.forEach(c => {
                db.ref('users/' + c.key).once('value', uSnap => {
                    const u = uSnap.val();
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => openChat(c.key, u.name);
                    div.innerHTML = `<div class="avatar">${u.name[0]}</div><div><b>${u.name}</b></div>`;
                    container.appendChild(div);
                });
            });
        });
    }

    function openChat(id, name) {
        activeChat = id === 'global' ? 'global' : [currentUser.uid, id].sort().join("_");
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-icon').innerText = name[0];
        showScreen('screen-chat');
        listenMessages();
    }

    function listenMessages() {
        const area = document.getElementById('message-area');
        db.ref('messages/' + activeChat).off(); area.innerHTML = '';
        db.ref('messages/' + activeChat).on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = `bubble ${m.sender === currentUser.uid ? 'my' : 'their'}`;
            div.innerHTML = `${m.content} <i class="fas fa-check-double ticks"></i>`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        db.ref('messages/' + activeChat).push({
            sender: currentUser.uid,
            content: inp.value,
            time: Date.now()
        });
        inp.value = '';
    }

    function findUser() {
        const email = prompt("Email пилота:");
        if(email) {
            db.ref('users_by_email/' + btoa(email).replace(/=/g, "")).once('value', s => {
                if(s.exists()) db.ref('users/' + currentUser.uid + '/contacts/' + s.val()).set(true);
                else alert("Не найден");
            });
        }
    }
    
    document.getElementById('msg-input').onkeypress = e => { if(e.key==='Enter') sendMsg(); };
</script>
</body>
</html>
