<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilkyWay Final Frontier</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --space-bg: #030508;
            --accent: #00d2ff;
            --nebula: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--space-bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 500px; height: 100dvh; position: relative;
            background: #05070c; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- ЭМБЛЕМА И ЛОГО --- */
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .logo-emblem { 
            width: 45px; height: 45px; background: linear-gradient(45deg, var(--accent), var(--nebula));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent); animation: comet-flicker 2s infinite alternate; font-size: 20px;
        }
        @keyframes comet-flicker {
            0% { box-shadow: 0 0 10px var(--accent); transform: scale(1); }
            100% { box-shadow: 0 0 25px var(--nebula); transform: scale(1.05); }
        }
        .logo-text { font-size: 28px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: #fff; }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; background: inherit; z-index: 10; will-change: transform; }
        .active { display: flex; }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .header { padding: 15px 20px; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); z-index: 50; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }

        /* --- СПИСКИ И КОНТЕНТ --- */
        .scroller { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .empty-state { padding: 50px 20px; text-align: center; color: #8696a0; }

        /* --- НИЖНЯЯ НАВИГАЦИЯ --- */
        .bottom-nav {
            height: 75px; background: #080a0f; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            position: absolute; bottom: 0; width: 100%; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #8696a0; cursor: pointer; flex: 1; height: 100%; gap: 5px; transition: 0.3s;
        }
        .nav-tab i { font-size: 20px; }
        .nav-tab span { font-size: 11px; font-weight: 500; }
        .nav-tab.active { color: var(--accent); text-shadow: 0 0 10px rgba(0,210,255,0.3); }

        /* --- ЧАТ --- */
        #scr-chat { z-index: 1000; transform: translateX(100%); transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); background: #000; }
        #scr-chat.open { transform: translateX(0); }
        .chat-wallpaper { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background: url('https://w0.peakpx.com/wallpaper/596/633/HD-wallpaper-whatsapp-dark-space-background.jpg') center/cover;
            position: relative;
        }
        .chat-wallpaper::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 0; }
        
        .bubble { z-index: 1; padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-me { background: var(--nebula); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-he { background: rgba(30, 39, 46, 0.95); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* --- ВВОД В ЧАТЕ --- */
        .chat-input-bar { background: #0a0f19; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .input-pill { flex: 1; background: var(--glass); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); }
        .input-pill input { background: none; border: none; color: #fff; flex: 1; padding: 10px; outline: none; }

        /* --- ЗВОНОК OVERLAY --- */
        .call-ui { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(5,7,12,0.98); z-index: 2000; display:none; flex-direction:column; align-items:center; justify-content:center; }

        /* --- АВАТАРЫ --- */
        .ava-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); background: #1a1f2b; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ava-circle i { font-size: 20px; color: var(--accent); }
        .ava-circle img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active" style="justify-content:center; padding:40px;">
        <div class="logo-box">
            <div class="logo-emblem"><i class="fas fa-meteor"></i></div>
            <span class="logo-text">MilkyWay</span>
        </div>
        <input type="email" id="email" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:15px;" placeholder="Ваш Email">
        <input type="password" id="pass" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:20px;" placeholder="Пароль">
        <button onclick="authRun()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer; color:#000;">ВОЙТИ В ГАЛАКТИКУ</button>
    </div>

    <div id="scr-main" class="screen">
        <div class="header">
            <div class="header-top">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="logo-emblem" style="width:30px; height:30px; font-size:14px;"><i class="fas fa-meteor"></i></div>
                    <span class="logo-text" style="font-size:20px;">MilkyWay</span>
                </div>
                <div style="display:flex; gap:15px; color:#8696a0; font-size:20px;">
                    <i class="fas fa-search"></i>
                    <i class="fas fa-cog" onclick="showSettings()" style="cursor:pointer;"></i>
                </div>
            </div>
        </div>

        <div id="sect-chats" class="scroller">
            <div id="list-target"></div>
        </div>

        <div id="sect-status" class="scroller" style="display:none;">
            <div class="empty-state">
                <div class="logo-emblem" style="margin: 0 auto 20px; box-shadow:none;"><i class="fas fa-circle-notch"></i></div>
                <p>Ваши истории появятся здесь после запуска первого спутника</p>
            </div>
        </div>

        <div id="sect-calls" class="scroller" style="display:none;">
            <div class="empty-state">
                <i class="fas fa-phone-alt fa-3x" style="margin-bottom:20px; color:var(--nebula);"></i>
                <p>Журнал вызовов пуст</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-tab active" onclick="switchTab('chats', this)">
                <i class="fas fa-comment-alt"></i>
                <span>Чаты</span>
            </div>
            <div class="nav-tab" onclick="switchTab('status', this)">
                <i class="fas fa-spinner"></i>
                <span>Статус</span>
            </div>
            <div class="nav-tab" onclick="switchTab('calls', this)">
                <i class="fas fa-phone-alt"></i>
                <span>Звонки</span>
            </div>
        </nav>
    </div>

    <div id="scr-chat" class="screen">
        <div class="header" style="display:flex; align-items:center; gap:12px; height:70px;">
            <i class="fas fa-arrow-left" style="color:var(--accent); font-size:22px; cursor:pointer; padding:5px;" onclick="closeChat()"></i>
            <div id="c-ava" class="ava-circle" style="width:40px; height:40px;"></div>
            <div style="flex:1">
                <b id="c-name" style="font-size:16px;">Пилот</b><br>
                <small id="c-status" style="color:var(--accent); font-size:11px;">в сети</small>
            </div>
            <div style="display:flex; gap:18px; color:var(--accent); font-size:18px;">
                <i class="fas fa-phone" onclick="startCall('аудио')"></i>
                <i class="fas fa-video" onclick="startCall('видео')"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div id="chat-box" class="chat-wallpaper"></div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; color:var(--accent);">
                <i class="fas fa-paperclip" style="font-size:22px;"></i>
                <input type="file" hidden id="file-in" onchange="sendFile(this)">
            </label>
            <div class="input-pill">
                <input type="text" id="msg-input" placeholder="Космическая связь...">
            </div>
            <button onclick="sendText()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:#000;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="call-ui" class="call-ui">
        <div class="logo-emblem" style="width:100px; height:100px; font-size:40px;"><i class="fas fa-user-astronaut"></i></div>
        <h2 id="call-name" style="margin-top:20px;">Пилот</h2>
        <p id="call-type" style="color:var(--accent); margin-top:10px;">Вызов...</p>
        <div onclick="endCall()" style="margin-top:50px; width:65px; height:65px; background:#ff4757; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-phone-slash fa-lg"></i></div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.database();
    let myId = null, selId = null;

    // --- НАВИГАЦИЯ МЕЖДУ ВКЛАДКАМИ ---
    function switchTab(id, el) {
        document.getElementById('sect-chats').style.display = 'none';
        document.getElementById('sect-status').style.display = 'none';
        document.getElementById('sect-calls').style.display = 'none';
        
        document.getElementById('sect-' + id).style.display = 'block';
        
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    // --- AUTH ---
    async function authRun() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch {
            await auth.createUserWithEmailAndPassword(e, p);
            await db.ref('users/' + auth.currentUser.uid).set({ name: e.split('@')[0], email: e, online: true });
        }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('scr-auth').classList.toggle('active', !u);
        document.getElementById('scr-main').classList.toggle('active', !!u);
        if(u) { myId = u.uid; loadUsers(); }
    });

    // --- СПИСОК ---
    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('list-target'); list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== myId) {
                    const d = u.val();
                    list.innerHTML += `
                    <div style="padding:15px 20px; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--border);" onclick="openChat('${u.key}','${d.name}','${d.ava}')">
                        <div class="ava-circle">${d.ava ? `<img src="${d.ava}">` : `<i class="fas fa-user-astronaut"></i>`}</div>
                        <div><b>${d.name}</b><br><small style="color:#8696a0">На связи</small></div>
                    </div>`;
                }
            });
        });
    }

    // --- ЧАТ ---
    function openChat(id, name, ava) {
        selId = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').innerHTML = ava ? `<img src="${ava}">` : `<i class="fas fa-user-astronaut"></i>`;
        document.getElementById('scr-chat').classList.add('open', 'active');
        
        const cid = [myId, id].sort().join('_');
        db.ref('msgs/' + cid).off();
        db.ref('msgs/' + cid).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.f === myId;
                let content = d.x;
                if(d.type === 'file') content = `<img src="${d.x}" style="max-width:200px; border-radius:10px;">`;
                box.innerHTML += `<div class="bubble ${isMe?'msg-me':'msg-he'}">${content}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { 
        document.getElementById('scr-chat').classList.remove('open');
        setTimeout(() => document.getElementById('scr-chat').classList.remove('active'), 350);
    }

    function sendText() {
        const inp = document.getElementById('msg-input'); if(!inp.value.trim()) return;
        saveMsg({ f: myId, x: inp.value, t: Date.now() });
        inp.value = '';
    }

    function sendFile(input) {
        const file = input.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = (e) => saveMsg({ f: myId, x: e.target.result, t: Date.now(), type: 'file' });
        r.readAsDataURL(file);
    }

    function saveMsg(o) {
        const cid = [myId, selId].sort().join('_');
        db.ref('msgs/' + cid).push(o);
    }

    // --- ЗВОНКИ ---
    function startCall(t) {
        document.getElementById('call-name').innerText = document.getElementById('c-name').innerText;
        document.getElementById('call-type').innerText = t + '-связь устанавливается...';
        document.getElementById('call-ui').style.display = 'flex';
    }
    function endCall() { document.getElementById('call-ui').style.display = 'none'; }
    function showSettings() { alert("Настройки MilkyWay: \n- Изменение ID\n- Смена темы\n- Безопасность"); }
</script>
</body>
</html>
