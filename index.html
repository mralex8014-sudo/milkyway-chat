<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Elite</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0b0e14; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .app-container { 
            width: 360px; 
            height: 640px; 
            background: #141923; 
            border: 1px solid #1f2a3d; 
            border-radius: 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 50px rgba(0, 162, 255, 0.15);
            overflow: hidden;
            position: relative;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 25px; 
        }
        .active { display: flex; }

        .logo { 
            font-size: 32px; 
            font-weight: bold; 
            color: #00a2ff; 
            margin-bottom: 50px; 
            text-shadow: 0 0 15px rgba(0, 162, 255, 0.5); 
        }

        .input-group { width: 100%; margin-bottom: 15px; }
        
        input { 
            width: 100%; 
            background: #1c222d; 
            border: 1px solid #30363d; 
            padding: 15px; 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            text-align: center;
            transition: 0.3s;
        }
        input:focus { border-color: #00a2ff; box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }

        button { 
            width: 100%; 
            background: #00a2ff; 
            border: none; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
        }
        button:hover { background: #0081cc; }

        .switch-btn { 
            margin-top: 20px; 
            color: #888; 
            font-size: 13px; 
            cursor: pointer; 
            text-decoration: underline; 
        }

        /* Список чатов */
        header { width: 100%; padding: 20px; border-bottom: 1px solid #1f2a3d; text-align: center; }
        .user-list { flex: 1; width: 100%; overflow-y: auto; }
        .user-item { padding: 20px; border-bottom: 1px solid #1c222d; cursor: pointer; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" class="screen active">
        <div class="logo">MilkyWay</div>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email (mr.alex8014@gmail.com)">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Пароль">
        </div>
        
        <button id="auth-btn" onclick="handleAuth()">ВОЙТИ</button>
        <div class="switch-btn" id="toggle-txt" onclick="toggleMode()">Нет аккаунта? Регистрация</div>
    </div>

    <div id="scr-main" class="screen" style="padding: 0;">
        <header><h2 style="margin:0; color:#00a2ff; font-size: 20px;">Чаты</h2></header>
        <div class="user-list" id="users"></div>
        <button onclick="auth.signOut()" style="background:#ff4b4b; border-radius:0; margin:0;">ВЫЙТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-btn').innerText = isLogin ? "ВОЙТИ" : "СОЗДАТЬ АККАУНТ";
        document.getElementById('toggle-txt').innerText = isLogin ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        if(!email || !pass) return alert("Заполни все поля");

        try {
            if(isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({ email: email, status: "online" });
            }
        } catch (e) {
            alert("Ошибка: " + e.message);
        }
    }

    auth.onAuthStateChanged(user => {
        document.getElementById('scr-auth').classList.toggle('active', !user);
        document.getElementById('scr-main').classList.toggle('active', !!user);
        if(user) loadUsers();
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users');
            list.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    list.innerHTML += `<div class="user-item">👤 ${u.val().email}</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
