<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00a2ff; --bg: #0b0e14; --panel: #161b22; --text: #e6edf3; --border: #30363d; }
        body { margin: 0; background: #000; color: var(--text); font-family: sans-serif; display: flex; justify-content: center; height: 100vh; }
        
        .app { width: 100%; max-width: 450px; background: var(--bg); display: flex; flex-direction: column; border: 1px solid var(--border); }
        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }

        header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #chat-list, #messages { flex: 1; overflow-y: auto; padding: 10px; }
        
        .chat-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .msg { max-width: 80%; padding: 10px; border-radius: 10px; margin-bottom: 8px; line-height: 1.4; }
        .my { align-self: flex-end; background: #056162; }
        .their { align-self: flex-start; background: #202c33; }

        .input-area { padding: 10px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 5px; color: #fff; outline: none; }
        
        .btn-main { width: 100%; padding: 12px; background: var(--accent); border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-login" class="screen active" style="padding:40px; justify-content:center; gap:10px;">
        <h1 style="text-align:center; color:var(--accent); margin-bottom:20px;">MilkyWay</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn-main" onclick="authOp('login')">ВОЙТИ</button>
        <button onclick="authOp('reg')" style="background:none; border:none; color:var(--accent); cursor:pointer;">Регистрация</button>
    </div>

    <div id="scr-main" class="screen">
        <header>
            <b>Чаты</b>
            <i class="fas fa-sign-out-alt" style="cursor:pointer;" onclick="auth.signOut()"></i>
        </header>
        <div id="chat-list"></div>
        <button class="btn-main" onclick="addUser()" style="border-radius:0;">+ Добавить пилота</button>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="show('scr-main')"></i>
            <b id="chat-title">Чат</b>
            <div style="width:20px;"></div>
        </header>
        <div id="messages" style="display:flex; flex-direction:column;"></div>
        <div class="input-area">
            <input type="text" id="m-input" placeholder="Сообщение...">
            <button onclick="send()" style="background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let user = null, chatId = null;

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function authOp(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') {
            auth.signInWithEmailAndPassword(e,p).catch(a => alert(a.message));
        } else {
            auth.createUserWithEmailAndPassword(e,p).then(u => {
                db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
                db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
            }).catch(a => alert(a.message));
        }
    }

    auth.onAuthStateChanged(u => {
        if(u) { user = u; show('scr-main'); loadChats(); }
        else { show('scr-login'); }
    });

    function loadChats() {
        const list = document.getElementById('chat-list');
        list.innerHTML = `<div class="chat-item" onclick="openChat('global','Общий чат')"><div class="avatar">G</div><b>Общий чат</b></div>`;
        db.ref('users/'+user.uid+'/contacts').on('value', s => {
            s.forEach(c => {
                db.ref('users/'+c.key).once('value', uS => {
                    const ud = uS.val();
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => openChat(c.key, ud.name);
                    div.innerHTML = `<div class="avatar">${ud.name[0].toUpperCase()}</div><b>${ud.name}</b>`;
                    list.appendChild(div);
                });
            });
        });
    }

    function openChat(id, name) {
        chatId = id === 'global' ? 'global' : [user.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = name;
        show('scr-chat');
        db.ref('msgs/'+chatId).off();
        const area = document.getElementById('messages');
        area.innerHTML = '';
        db.ref('msgs/'+chatId).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = `msg ${d.from === user.uid ? 'my' : 'their'}`;
            div.innerText = d.txt;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });
    }

    function send() {
        const i = document.getElementById('m-input');
        if(!i.value.trim()) return;
        db.ref('msgs/'+chatId).push({from: user.uid, txt: i.value, time: Date.now()});
        i.value = '';
    }

    function addUser() {
        const e = prompt("Email:");
        if(e) db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+user.uid+'/contacts/'+s.val()).set(true);
            else alert("Пользователь не найден");
        });
    }

    document.getElementById('m-input').onkeypress = e => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
