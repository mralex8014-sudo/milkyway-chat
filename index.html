<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkyWay Elite Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ТВОЙ ДИЗАЙН ИЗ СКРИНШОТОВ */
        body { background: #0b0e14; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 350px; height: 600px; background: rgba(20, 25, 35, 0.95); border: 1px solid #1f2a3d; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #1f2a3d; }
        h1 { margin: 0; font-size: 24px; color: #00a2ff; }
        .content { padding: 20px; display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        input { background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: #00a2ff; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #scr-main, #otp-block { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-auth" style="height:100%">
        <header><h1>MilkyWay</h1></header>
        <div class="content">
            <input type="text" id="phone" placeholder="+79001234567">
            <div id="captcha-box" style="margin: 0 auto;"></div>
            <button id="send-btn" onclick="sendSMS()">ПОЛУЧИТЬ КОД</button>

            <div id="otp-block" style="flex-direction: column; gap: 10px;">
                <input type="text" id="code" placeholder="Код из SMS">
                <button onclick="confirmCode()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="scr-main" style="height:100%">
        <header><h1>Чаты</h1></header>
        <div id="u-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <button onclick="auth.signOut()" style="margin:10px; background:#ff4b4b;">ВЫЙТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Прямой рендер капчи
    window.onload = () => {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('captcha-box', {
            'size': 'normal' // Сделаем её видимой, чтобы точно сработало
        });
        window.recaptchaVerifier.render();
    };

    async function sendSMS() {
        const p = document.getElementById('phone').value;
        if(!p) return alert("Введите номер!");
        
        try {
            const verifier = window.recaptchaVerifier;
            window.confirmResult = await auth.signInWithPhoneNumber(p, verifier);
            document.getElementById('otp-block').style.display = 'flex';
            document.getElementById('send-btn').style.display = 'none';
            alert("SMS отправлено!");
        } catch (e) {
            alert("Ошибка: " + e.message);
            location.reload(); // Перезагрузка при ошибке капчи
        }
    }

    async function confirmCode() {
        const c = document.getElementById('code').value;
        try {
            await window.confirmResult.confirm(c);
        } catch (e) { alert("Код неверный!"); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('scr-main').style.display = 'flex';
            db.ref('users/' + user.uid).set({ name: user.phoneNumber || user.email });
            loadUsers();
        } else {
            document.getElementById('scr-auth').style.display = 'flex';
            document.getElementById('scr-main').style.display = 'none';
        }
    });

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const l = document.getElementById('u-list'); l.innerHTML = '';
            snap.forEach(u => {
                if(u.key !== auth.currentUser.uid) {
                    l.innerHTML += `<div style="padding:15px; border-bottom:1px solid #1f2a3d;">👤 ${u.val().name}</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
