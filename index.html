<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MilkyWay Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --space: #0b0e14; --glass: rgba(22, 27, 34, 0.9); --border: #30363d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: var(--space); position: relative; display: flex; flex-direction: column; }
        
        /* ГЛАВНЫЙ НЕОНОВЫЙ ХЕДЕР */
        header { 
            padding: 18px; background: var(--glass); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15);
        }
        .logo-neon { 
            font-size: 24px; font-weight: 800; color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.7); letter-spacing: 1px;
        }

        /* БОКОВОЕ МЕНЮ (SIDEBAR) */
        .sidebar {
            position: absolute; top: 0; left: -100%; width: 80%; height: 100%;
            background: #0d1117; z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border); padding: 30px 20px;
        }
        .sidebar.open { left: 0; box-shadow: 50px 0 100px rgba(0,0,0,0.9); }
        .sidebar-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 99;
        }
        .sidebar-item { padding: 15px; display: flex; align-items: center; gap: 15px; font-size: 18px; cursor: pointer; border-radius: 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active { display: flex; }

        /* СПИСОК ЧАТОВ */
        #chat-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .chat-row { 
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .avatar-circle { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* ПЛЮСИК В КРУЖКЕ (FAB) */
        .fab {
            position: absolute; bottom: 30px; right: 25px; width: 60px; height: 60px;
            background: var(--neon); border-radius: 50%; display: grid; place-items: center;
            font-size: 24px; color: #fff; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); transition: 0.3s;
        }
        .fab:active { transform: scale(0.9); }

        /* ЧАТ */
        #msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .rcvd { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }

        .input-zone { padding: 15px; background: #161b22; display: flex; gap: 12px; align-items: center; }
        .input-zone input { 
            flex: 1; background: #010409; border: 1px solid var(--border); 
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none;
        }

        /* АВТОРИЗАЦИЯ */
        .auth-box { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .auth-box input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; 
        }
        .btn-action { padding: 15px; background: var(--neon); border: none; border-radius: 10px; font-weight: bold; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>
    
    <div id="side-menu" class="sidebar">
        <div class="logo-neon" style="margin-bottom:40px;">MilkyWay</div>
        <div class="sidebar-item" onclick="alert('Профиль пилота')"><i class="fas fa-user-astronaut"></i> Мой аккаунт</div>
        <div class="sidebar-item" onclick="alert('Настройки связи')"><i class="fas fa-cog"></i> Настройки</div>
        <div class="sidebar-item" onclick="auth.signOut()" style="margin-top:auto; color:#ff4b4b;"><i class="fas fa-power-off"></i> Выйти</div>
    </div>

    <div id="scr-auth" class="screen active">
        <div class="auth-box">
            <div class="logo-neon" style="text-align:center; font-size:40px; margin-bottom:40px;">MilkyWay</div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-action" onclick="handleAuth('login')">ВОЙТИ</button>
            <p onclick="handleAuth('reg')" style="text-align:center; margin-top:20px; font-size:12px; color:var(--neon); cursor:pointer;">Регистрация</p>
        </div>
    </div>

    <div id="scr-list" class="screen">
        <header>
            <i class="fas fa-bars" style="font-size:22px; cursor:pointer;" onclick="toggleMenu()"></i>
            <div class="logo-neon">MilkyWay</div>
            <div style="width:22px;"></div>
        </header>
        <div id="chat-list"></div>
        <div class="fab" onclick="addNew()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="scr-chat" class="screen">
        <header>
            <i class="fas fa-arrow-left" onclick="show('scr-list')"></i>
            <b id="active-name">Чат</b>
            <i class="fas fa-ellipsis-v"></i>
        </header>
        <div id="msg-container"></div>
        <div class="input-zone">
            <input type="text" id="m-text" placeholder="Сообщение...">
            <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--neon); font-size:22px; cursor:pointer;"></i>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-bMCUsWhvoMO6uBMV9Z2NKZjvqFNwjeQ",
        authDomain: "wm-message.firebaseapp.com",
        databaseURL: "https://wm-message-default-rtdb.firebaseio.com",
        projectId: "wm-message",
        storageBucket: "wm-message.appspot.com",
        messagingSenderId: "573728159190",
        appId: "1:573728159190:web:96856417745778a487ed53"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let me = null, activeChat = null;

    function toggleMenu() {
        const m = document.getElementById('side-menu');
        const o = document.getElementById('overlay');
        m.classList.toggle('open');
        o.style.display = m.classList.contains('open') ? 'block' : 'none';
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 'scr-list') { document.getElementById('side-menu').classList.remove('open'); document.getElementById('overlay').style.display='none'; }
    }

    function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(type === 'login') auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
        else auth.createUserWithEmailAndPassword(e,p).then(u => {
            db.ref('users/'+u.user.uid).set({name: e.split('@')[0]});
            db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).set(u.user.uid);
        });
    }

    auth.onAuthStateChanged(u => {
        if(u) { me = u; show('scr-list'); loadChats(); }
        else show('scr-auth');
    });

    function loadChats() {
        const list = document.getElementById('chat-list');
        list.innerHTML = `<div class="chat-row" onclick="openC('global','Общий чат')"><div class="avatar-circle">G</div><b>Общий чат</b></div>`;
        db.ref('users/'+me.uid+'/contacts').on('value', s => {
            s.forEach(c => {
                db.ref('users/'+c.key).once('value', us => {
                    const d = us.val();
                    const div = document.createElement('div'); div.className = 'chat-row';
                    div.onclick = () => openC(c.key, d.name);
                    div.innerHTML = `<div class="avatar-circle">${d.name[0].toUpperCase()}</div><b>${d.name}</b>`;
                    list.appendChild(div);
                });
            });
        });
    }

    function openC(id, name) {
        activeChat = id === 'global' ? 'global' : [me.uid, id].sort().join("_");
        document.getElementById('active-name').innerText = name;
        show('scr-chat');
        db.ref('msgs/'+activeChat).off();
        const container = document.getElementById('msg-container'); container.innerHTML = '';
        db.ref('msgs/'+activeChat).on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = `bubble ${m.from === me.uid ? 'sent' : 'rcvd'}`;
            div.innerText = m.txt;
            container.appendChild(div); container.scrollTop = container.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('m-text');
        if(!i.value.trim()) return;
        db.ref('msgs/'+activeChat).push({from: me.uid, txt: i.value, time: Date.now()});
        i.value = '';
    }

    function addNew() {
        const e = prompt("Email нового пилота:");
        if(e) db.ref('u_by_e/'+btoa(e).replace(/=/g,"")).once('value', s => {
            if(s.exists()) db.ref('users/'+me.uid+'/contacts/'+s.val()).set(true);
        });
    }
    document.getElementById('m-text').onkeypress = e => { if(e.key==='Enter') sendMsg(); };
</script>
</body>
</html>
